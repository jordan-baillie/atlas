<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Atlas Daily &mdash; Research Desk</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+Pro:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0b0d10;
    --surface: #14171c;
    --surface-alt: #1c2026;
    --border: #2a2f37;
    --text: #e6e8eb;
    --text-muted: #8b929d;
    --text-dim: #5b626d;
    --accent: #3b82f6;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --critical: #ef4444;
    --major: #f59e0b;
    --minor: #8b929d;
    --serif: 'Source Serif Pro', 'PT Serif', Georgia, 'Times New Roman', serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  a { color: var(--text); text-decoration: none; border-bottom: 1px solid var(--border); transition: border-color 120ms ease, color 120ms ease; }
  a:hover { color: var(--accent); border-bottom-color: var(--accent); }

  /* ---------- Variant badge ---------- */
  .variant-badge {
    position: fixed;
    top: 14px;
    right: 16px;
    z-index: 100;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
    background: rgba(59, 130, 246, 0.12);
    border: 1px solid var(--accent);
    padding: 6px 10px;
    border-radius: 3px;
    backdrop-filter: blur(4px);
  }

  /* ---------- Page container ---------- */
  .page {
    max-width: 1280px;
    margin: 0 auto;
    padding: 36px 48px 80px 48px;
  }

  /* ---------- Masthead ---------- */
  .masthead {
    border-top: 4px double var(--text);
    border-bottom: 1px solid var(--border);
    padding: 22px 0 18px 0;
    margin-bottom: 28px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .masthead-title {
    font-family: var(--serif);
    font-weight: 900;
    font-size: 44px;
    line-height: 1;
    letter-spacing: -0.02em;
    margin: 0;
  }
  .masthead-title .the { font-style: italic; font-weight: 400; color: var(--text-muted); margin-right: 6px; }
  .masthead-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    text-align: right;
    line-height: 1.7;
  }
  .masthead-meta .vol { display: block; color: var(--text); }
  .masthead-tagline {
    font-family: var(--serif);
    font-style: italic;
    color: var(--text-muted);
    font-size: 15px;
    margin: 4px 0 0 0;
  }

  /* ---------- Live ticker ---------- */
  .ticker {
    display: flex;
    gap: 0;
    align-items: stretch;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--surface);
    overflow: hidden;
    margin-bottom: 40px;
    font-family: var(--mono);
    font-size: 12px;
  }
  .ticker-label {
    background: var(--text);
    color: var(--bg);
    font-weight: 700;
    padding: 10px 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 11px;
    display: flex;
    align-items: center;
  }
  .ticker-label::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--red);
    border-radius: 50%;
    margin-right: 8px;
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .ticker-items {
    display: flex;
    flex: 1;
    overflow-x: auto;
    align-items: stretch;
  }
  .ticker-item {
    display: flex;
    align-items: center;
    padding: 10px 18px;
    border-left: 1px solid var(--border);
    white-space: nowrap;
    color: var(--text-muted);
  }
  .ticker-item:first-child { border-left: none; }
  .ticker-item .k { color: var(--text-muted); margin-right: 8px; text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; }
  .ticker-item .v { color: var(--text); font-weight: 600; }
  .ticker-item .v.up { color: var(--green); }
  .ticker-item .v.dn { color: var(--red); }
  .ticker-item .v.warn { color: var(--amber); }

  /* ---------- Section utility ---------- */
  .kicker {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin: 0 0 8px 0;
  }
  .kicker.amber { color: var(--amber); }
  .kicker.blue { color: var(--accent); }
  .kicker.muted { color: var(--text-muted); }
  .kicker.green { color: var(--green); }

  .rule {
    border: 0;
    border-top: 1px solid var(--border);
    margin: 48px 0 36px 0;
  }
  .rule-double {
    border: 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    height: 4px;
    margin: 56px 0 40px 0;
  }

  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }
  .section-title {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .section-sub {
    font-family: var(--serif);
    font-style: italic;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* ---------- Hero ---------- */
  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 280px;
    gap: 48px;
    padding-bottom: 40px;
    border-bottom: 1px solid var(--border);
  }
  @media (max-width: 900px) {
    .hero { grid-template-columns: 1fr; }
  }
  .hero-headline {
    font-family: var(--serif);
    font-weight: 900;
    font-size: 52px;
    line-height: 1.05;
    letter-spacing: -0.025em;
    margin: 6px 0 18px 0;
    max-width: 18ch;
  }
  .hero-deck {
    font-family: var(--serif);
    font-style: italic;
    font-size: 20px;
    line-height: 1.45;
    color: var(--text-muted);
    margin: 0 0 28px 0;
    max-width: 60ch;
    font-weight: 400;
  }
  .hero-byline {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 22px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .hero-body {
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1.65;
    max-width: 65ch;
  }
  .hero-body p { margin: 0 0 1.1em 0; }
  .hero-body p:first-child::first-letter {
    font-family: var(--serif);
    font-weight: 900;
    font-size: 64px;
    line-height: 0.85;
    float: left;
    padding: 6px 10px 0 0;
    color: var(--text);
  }
  .num { font-family: var(--mono); font-weight: 600; }
  .num.crit { color: var(--red); }
  .num.warn { color: var(--amber); }
  .num.good { color: var(--green); }

  /* Hero sidebar */
  .hero-side {
    border-left: 1px solid var(--border);
    padding-left: 32px;
    align-self: start;
  }
  @media (max-width: 900px) {
    .hero-side { border-left: 0; padding-left: 0; border-top: 1px solid var(--border); padding-top: 28px; }
  }
  .hero-side-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    margin-bottom: 14px;
  }
  .hero-side-headline {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
    margin: 0 0 16px 0;
    letter-spacing: -0.005em;
  }
  .hero-stat {
    padding: 14px 0;
    border-bottom: 1px dotted var(--border);
  }
  .hero-stat:last-child { border-bottom: 0; }
  .hero-stat-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 4px;
  }
  .hero-stat-value {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 700;
    line-height: 1.1;
  }
  .hero-stat-value .small { font-size: 14px; font-weight: 400; color: var(--text-muted); font-style: italic; margin-left: 4px; }
  .hero-source-link {
    display: block;
    margin-top: 22px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 4px;
    width: max-content;
  }

  /* ---------- Front-page columns ---------- */
  .frontpage {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 40px;
    margin-top: 48px;
  }
  @media (max-width: 900px) {
    .frontpage { grid-template-columns: 1fr; gap: 36px; }
  }
  .col {
    display: flex;
    flex-direction: column;
  }
  .col-headline {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 700;
    line-height: 1.15;
    margin: 8px 0 14px 0;
    letter-spacing: -0.012em;
    max-width: 22ch;
  }
  .col-deck {
    font-family: var(--serif);
    font-style: italic;
    color: var(--text-muted);
    font-size: 15px;
    margin: 0 0 16px 0;
    line-height: 1.45;
  }
  .col-body {
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.6;
    color: var(--text);
  }
  .col-body p { margin: 0 0 1em 0; }
  .col-body p:last-child { margin-bottom: 0; }

  .player-card {
    margin-top: 14px;
    border: 1px solid var(--border);
    padding: 16px 18px;
    background: var(--surface);
    border-radius: 3px;
  }
  .player-card-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px dotted var(--border);
    font-size: 13px;
  }
  .player-card-row:last-child { border-bottom: 0; }
  .player-card-row .label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .player-card-row .value { font-family: var(--mono); font-weight: 600; }
  .lifecycle-pill {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 2px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .lifecycle-pill.RESEARCH { background: rgba(59, 130, 246, 0.15); color: var(--accent); border: 1px solid var(--accent); }
  .lifecycle-pill.PAPER { background: rgba(245, 158, 11, 0.15); color: var(--amber); border: 1px solid var(--amber); }
  .lifecycle-pill.LIVE { background: rgba(34, 197, 94, 0.15); color: var(--green); border: 1px solid var(--green); }
  .lifecycle-pill.RETIRED { background: rgba(139, 146, 157, 0.15); color: var(--text-muted); border: 1px solid var(--text-muted); }

  /* ---------- Contradictions section ---------- */
  .contradictions-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0;
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
  }
  @media (max-width: 900px) {
    .contradictions-grid { grid-template-columns: 1fr; }
  }
  .contra-card {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 22px 26px;
    background: transparent;
    transition: background 120ms ease;
  }
  .contra-card:hover { background: var(--surface); }
  .contra-card .kicker { margin-bottom: 6px; }
  .contra-headline {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
    margin: 0 0 8px 0;
    letter-spacing: -0.01em;
  }
  .contra-hook {
    font-family: var(--serif);
    font-style: italic;
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.5;
    margin: 0 0 12px 0;
  }
  .contra-meta {
    display: flex;
    gap: 16px;
    align-items: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .contra-meta .gap-strong { color: var(--text); font-weight: 600; }
  .contra-meta .age-badge {
    font-family: var(--mono);
    font-size: 10px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 2px;
    color: var(--text-muted);
  }
  .severity-bar {
    display: inline-block;
    width: 4px;
    height: 14px;
    margin-right: 6px;
    vertical-align: -2px;
    border-radius: 1px;
  }
  .severity-bar.critical { background: var(--critical); }
  .severity-bar.major { background: var(--major); }
  .severity-bar.minor { background: var(--minor); }

  .source-link {
    display: inline-block;
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 2px;
  }
  .source-link:hover { color: var(--text); border-bottom-color: var(--text); }

  /* ---------- Coverage footer ---------- */
  .coverage {
    margin-top: 56px;
    padding: 36px 0 16px 0;
    border-top: 4px double var(--border);
  }
  .coverage-body {
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.65;
    max-width: 75ch;
    color: var(--text);
  }
  .coverage-body p { margin: 0 0 0.9em 0; }
  .coverage-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    margin-top: 24px;
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
  }
  @media (max-width: 900px) {
    .coverage-grid { grid-template-columns: repeat(2, 1fr); }
  }
  .coverage-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px;
  }
  .coverage-cell .label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 8px;
  }
  .coverage-cell .value {
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 700;
    line-height: 1;
  }
  .coverage-cell .sub {
    font-family: var(--serif);
    font-style: italic;
    color: var(--text-muted);
    font-size: 13px;
    margin-top: 4px;
  }

  /* ---------- Appendix table ---------- */
  details.appendix {
    margin-top: 60px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
  }
  details.appendix > summary {
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    padding: 8px 0;
    list-style: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  details.appendix > summary::-webkit-details-marker { display: none; }
  details.appendix > summary::before {
    content: '+';
    font-family: var(--mono);
    font-size: 14px;
    width: 18px;
    height: 18px;
    border: 1px solid var(--border);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 2px;
    color: var(--text);
  }
  details.appendix[open] > summary::before { content: '–'; }
  details.appendix > summary:hover { color: var(--text); }

  .appendix-content { margin-top: 24px; }
  .appendix-content h3 {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 700;
    margin: 28px 0 12px 0;
    letter-spacing: -0.005em;
  }
  table.appendix-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12px;
  }
  table.appendix-table th, table.appendix-table td {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  table.appendix-table th {
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--text);
    background: transparent;
  }
  table.appendix-table tbody tr:hover { background: var(--surface); }
  .num-cell { text-align: right; font-variant-numeric: tabular-nums; }

  /* ---------- Loading & error ---------- */
  .loading, .error-banner {
    font-family: var(--serif);
    font-style: italic;
    color: var(--text-muted);
    padding: 80px 0;
    text-align: center;
    font-size: 18px;
  }
  .error-banner {
    color: var(--amber);
    border: 1px dashed var(--amber);
    border-radius: 3px;
    margin: 20px 0;
    padding: 20px;
  }

  /* ---------- Colophon ---------- */
  .colophon {
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="variant-badge">Variant B &mdash; Newsroom</div>

<div class="page">
  <div id="app">
    <div class="loading">Setting type&hellip;</div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ---------- Tiny helpers ----------
  const $ = (sel, root) => (root || document).querySelector(sel);
  const el = (tag, attrs, children) => {
    const node = document.createElement(tag);
    if (attrs) {
      for (const k in attrs) {
        if (k === 'class') node.className = attrs[k];
        else if (k === 'html') node.innerHTML = attrs[k];
        else if (k.startsWith('on') && typeof attrs[k] === 'function') node.addEventListener(k.slice(2), attrs[k]);
        else node.setAttribute(k, attrs[k]);
      }
    }
    if (children) {
      const arr = Array.isArray(children) ? children : [children];
      arr.forEach(c => {
        if (c == null) return;
        if (typeof c === 'string') node.appendChild(document.createTextNode(c));
        else node.appendChild(c);
      });
    }
    return node;
  };

  const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));

  const fmtNum = (n, dp) => {
    if (n == null || isNaN(n)) return '—';
    return Number(n).toFixed(dp == null ? 2 : dp);
  };

  const fmtInt = n => (n == null || isNaN(n)) ? '—' : Number(n).toLocaleString('en-US');

  const fmtPct = n => (n == null || isNaN(n)) ? '—' : Number(n).toFixed(1) + '%';

  const fmtMetric = (metric, value) => {
    if (value == null) return '—';
    if (metric === 'sharpe') return fmtNum(value, 2);
    if (metric === 'max_dd_pct') return fmtNum(value, 1) + '%';
    return fmtNum(value, 2);
  };

  const NOW = new Date('2026-05-28T22:30:00Z'); // pinned to data
  const daysAgo = iso => {
    if (!iso) return null;
    const d = new Date(iso);
    if (isNaN(d)) return null;
    return Math.floor((NOW - d) / 86400000);
  };
  const ageLabel = iso => {
    const d = daysAgo(iso);
    if (d == null) return 'unknown';
    if (d === 0) return 'today';
    if (d === 1) return 'yesterday';
    return d + ' days ago';
  };
  const fmtDate = iso => {
    if (!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d)) return '—';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  };
  const fmtTime = iso => {
    if (!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d)) return '—';
    return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZone: 'UTC', timeZoneName: 'short' });
  };

  const todayString = NOW.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  // ---------- Prose composition ----------
  // Each prose helper returns a string of HTML — defensive against missing fields.

  function metricNoun(metric) {
    if (metric === 'sharpe') return 'Sharpe';
    if (metric === 'max_dd_pct') return 'max drawdown';
    return metric || 'metric';
  }

  function direction(delta, metric) {
    // For sharpe: negative delta = we're worse than the paper. For max_dd: positive delta = we're worse.
    if (metric === 'max_dd_pct') return delta > 0 ? 'worse' : 'better';
    return delta < 0 ? 'worse' : 'better';
  }

  function heroProse(c) {
    if (!c) return '<p>No open contradictions to report. The desk is unusually quiet.</p>';
    const ageDays = daysAgo(c.first_seen_at);
    const ageWord = ageDays == null ? 'recently' : (ageDays === 0 ? 'today' : ageDays === 1 ? 'yesterday' : ageDays + ' days ago');
    const metric = metricNoun(c.metric);
    const gapVerb = c.metric === 'max_dd_pct' ? 'overrun' : 'shortfall';
    const dir = direction(c.delta, c.metric);
    const claimed = fmtMetric(c.metric, c.claimed_value);
    const measured = fmtMetric(c.metric, c.measured_value);
    const gap = fmtNum(c.delta_abs, 2);

    const lead = `<p>` +
      `${ageWord === 'today' ? 'This morning' : ageDays === 1 ? 'Yesterday' : ageDays + ' days ago'}, the paper ` +
      `<em>&ldquo;${esc(c.source_title || 'an arXiv preprint')}&rdquo;</em> ` +
      `(<span class="num">${esc(c.source_id ? c.source_id.replace('src-arxiv-', 'arXiv:') : 'unknown')}</span>) ` +
      `landed on the desk with a confident claim: ` +
      `that <strong>${esc(c.strategy || 'an unspecified strategy')}</strong>, run on <em>${esc(c.universe || 'an unspecified universe')}</em>, would deliver a ` +
      `${metric} of <span class="num warn">${claimed}</span>. ` +
      `Atlas&rsquo;s own measured ${metric} for the same strategy is ` +
      `<span class="num crit">${measured}</span> &mdash; a <span class="num">${gap}</span>-point ${gapVerb}, and the largest open divergence in the system.` +
      `</p>`;

    const middle = `<p>` +
      `The claim has been live for <strong>${ageDays == null ? '—' : ageDays} day${ageDays === 1 ? '' : 's'}</strong> without rebuttal. ` +
      `In that time the nightly digest has rechecked it ${ageDays == null ? 'several times' : ageDays + ' times'}; ` +
      `each pass reaffirmed the gap. The strategy has not been promoted, has not been retired, has not even been re-parameterised. ` +
      `It simply sits in <strong>RESEARCH</strong>, mute, with a published-paper Sharpe pinned above it like a price tag the system cannot honour.` +
      `</p>`;

    const tail = `<p>` +
      `Two readings are possible. Either the paper&rsquo;s backtest is overfit &mdash; a familiar story for ${c.strategy && c.strategy.includes('breakout') ? 'breakout' : 'systematic'} systems published on arXiv &mdash; ` +
      `or Atlas&rsquo;s implementation is materially ${dir === 'worse' ? 'understating the signal' : 'overstating it'}. ` +
      `Either way, six days is a long silence. The desk recommends either a rebuttal note in the wiki or an explicit parameter sweep against the paper&rsquo;s stated configuration. ` +
      `Until one of those happens, the contradiction earns interest.` +
      `</p>`;

    return lead + middle + tail;
  }

  function lifecycleProse(items) {
    if (!items || !items.length) return '<p>No lifecycle activity in the last 30 days. The promotion pipeline appears dormant.</p>';
    const recent = items.slice(0, 4);
    const top = recent[0];
    const parts = [];

    // Lead sentence
    if (top.from_state && top.to_state) {
      const verb = top.operator === 'rollback' ? 'rolled back' : 'was promoted';
      const arrow = `${top.from_state} → ${top.to_state}`;
      parts.push(
        `<p><strong>${esc(top.strategy)}</strong> ${verb} ${ageLabel(top.transitioned_at)}, moving from ` +
        `<span class="num">${arrow}</span> on ${top.universe} after ${esc(top.reason || 'a routine gate evaluation')}. ` +
        (top.experiment_id ? `Experiment <span class="num">${esc(top.experiment_id)}</span> is the citation of record.` : '') +
        `</p>`
      );
    } else if (top.to_state) {
      parts.push(
        `<p><strong>${esc(top.strategy)}</strong> was newly seeded into <span class="num">${esc(top.to_state)}</span> ` +
        `${ageLabel(top.transitioned_at)} &mdash; ${esc(top.reason || 'no reason given')}.</p>`
      );
    }

    // Aggregation of the rest
    const rest = recent.slice(1);
    if (rest.length) {
      const promotions = rest.filter(r => r.operator === 'auto_promoter').length;
      const rollbacks = rest.filter(r => r.operator === 'rollback').length;
      const manuals = rest.filter(r => r.operator === 'manual').length;
      const bits = [];
      if (promotions) bits.push(`${promotions} more auto-promotion${promotions === 1 ? '' : 's'}`);
      if (rollbacks) bits.push(`${rollbacks} rollback${rollbacks === 1 ? '' : 's'}`);
      if (manuals) bits.push(`${manuals} manual seed${manuals === 1 ? '' : 's'}`);
      if (bits.length) {
        const names = rest.map(r => `<em>${esc(r.strategy)}</em>`).join(', ');
        parts.push(
          `<p>The wire also carries ${bits.join(', ')} this fortnight &mdash; ${names}. ` +
          `Auto-promoter remains the dominant operator; rollbacks are triggered by a single rule (Sharpe gap > 0.5 for seven consecutive days), ` +
          `and have fired ${rollbacks ? rollbacks + ' time' + (rollbacks === 1 ? '' : 's') : 'sparingly'} in recent weeks.</p>`
        );
      }
    }

    return parts.join('');
  }

  function spotlightProse(strategy, lifecycleItem) {
    if (!strategy) return '<p>No strategy has accrued enough activity this week to spotlight.</p>';
    const sharpe = fmtNum(strategy.solo_sharpe, 2);
    const portSharpe = fmtNum(strategy.portfolio_sharpe, 2);
    const dd = fmtNum(strategy.max_dd_pct, 1);
    const trades = fmtInt(strategy.trades);
    const claims = strategy.active_claims;
    const contrad = strategy.open_contradictions;
    const state = strategy.lifecycle_state || 'UNKNOWN';

    const wasPromoted = lifecycleItem && lifecycleItem.strategy === strategy.strategy && lifecycleItem.to_state === state;
    const promotionLine = wasPromoted
      ? `It earned this attention the hard way: it was promoted to <strong>${esc(state)}</strong> just ${ageLabel(lifecycleItem.transitioned_at)} after passing every gate in the 30-day battery. `
      : '';

    return (
      `<p>This week&rsquo;s spotlight falls on <strong>${esc(strategy.strategy)}</strong>, which carries <span class="num">${claims}</span> active claims against it &mdash; ` +
      `more than any other strategy in the universe. ${promotionLine}` +
      `Atlas measures a solo Sharpe of <span class="num">${sharpe}</span> (portfolio <span class="num">${portSharpe}</span>) across <span class="num">${trades}</span> trades, ` +
      `with a max drawdown of <span class="num">${dd}%</span>. ${contrad ? `<span class="num crit">${contrad}</span> open contradiction${contrad === 1 ? '' : 's'} remain${contrad === 1 ? 's' : ''} unresolved.` : 'No open contradictions; the system and the literature broadly agree.'}</p>` +
      `<p>The reading: a strategy with this much paper interest deserves a sharper monitoring cadence than the default fortnightly digest. The desk has flagged it for a manual review.</p>`
    );
  }

  function discoveryProse(funnel, digests, summary) {
    if (!funnel || !funnel.length) return '<p>The discovery pipeline has produced no data in the last 30 days.</p>';
    const totals = funnel.reduce((a, d) => ({
      papers: a.papers + (d.papers_found || 0),
      filtered: a.filtered + (d.papers_filtered || 0),
      specs: a.specs + (d.specs_extracted || 0),
      strategies: a.strategies + (d.strategies_generated || 0),
      qc: a.qc + (d.strategies_passed_qc || 0),
    }), { papers: 0, filtered: 0, specs: 0, strategies: 0, qc: 0 });

    const today = funnel[0] || {};
    const isQuiet = (today.papers_found || 0) === 0;
    const specRate = totals.papers ? (totals.specs / totals.papers * 100) : 0;
    const qcRate = totals.strategies ? (totals.qc / totals.strategies * 100) : 0;
    const lastDigest = digests && digests[0];

    return (
      `<p>The funnel turned over <span class="num">${totals.papers}</span> papers this month. ` +
      `Of those, <span class="num">${totals.filtered}</span> survived the relevance filter, <span class="num">${totals.specs}</span> yielded extractable specs, ` +
      `<span class="num">${totals.strategies}</span> were generated as runnable strategies, and <span class="num">${totals.qc}</span> passed QC &mdash; ` +
      `a throughput of roughly <span class="num">${specRate.toFixed(1)}%</span> from paper to spec and <span class="num">${qcRate.toFixed(0)}%</span> through QC.</p>` +
      `<p>Today produced <span class="num ${isQuiet ? 'warn' : ''}">${today.specs_extracted || 0}</span> new specs ` +
      `${isQuiet ? '(<em>arxiv rate-limited; expected to resume tomorrow</em>)' : 'across the new arrivals'}. ` +
      (lastDigest ? `The most recent digest fired at <span class="num">${fmtTime(lastDigest.sent_at)}</span> &mdash; delivery <strong>${esc(lastDigest.delivery_status)}</strong>, ${lastDigest.new_papers} new paper${lastDigest.new_papers === 1 ? '' : 's'}, ${lastDigest.new_contradictions} new contradiction${lastDigest.new_contradictions === 1 ? '' : 's'}.` : '') +
      `</p>`
    );
  }

  function coverageProse(strategies, summary) {
    if (!strategies || !strategies.length) return '<p>No strategies in coverage.</p>';
    const tracked = (summary && summary.strategies_tracked) || strategies.length;
    const withClaims = strategies.filter(s => (s.active_claims || 0) > 0).length;
    const quiet = tracked - withClaims;
    const live = strategies.filter(s => s.lifecycle_state === 'LIVE').length;
    const paper = strategies.filter(s => s.lifecycle_state === 'PAPER').length;
    const research = strategies.filter(s => s.lifecycle_state === 'RESEARCH').length;
    const named = strategies.slice().sort((a, b) => (b.active_claims || 0) - (a.active_claims || 0)).slice(0, 4).map(s => `<em>${esc(s.strategy)}</em>`).join(', ');

    return (
      `<p>Atlas tracks <span class="num">${tracked}</span> strategies across the equity, sector-ETF, and multi-asset universes. ` +
      `Of those, <span class="num">${withClaims}</span> currently carry active claims from the literature &mdash; the loudest being ${named} &mdash; ` +
      `and <span class="num">${quiet}</span> are quiet, neither claimed against nor recently transitioned. ` +
      `Within the active book, <span class="num">${live}</span> ${live === 1 ? 'sits' : 'sit'} in <strong>LIVE</strong>, ` +
      `<span class="num">${paper}</span> in <strong>PAPER</strong>, and <span class="num">${research}</span> in <strong>RESEARCH</strong>. ` +
      `The remaining ${tracked - live - paper - research - 0} strategies are either retired, dormant, or have not yet produced a measurable Sharpe.</p>` +
      `<p>The desk&rsquo;s view: the silent strategies are not necessarily inactive &mdash; many are awaiting a fresh contradicting paper to enter the news cycle. Coverage gaps are an opportunity, not a defect.</p>`
    );
  }

  function contradictionHook(c) {
    const metric = metricNoun(c.metric);
    const claimed = fmtMetric(c.metric, c.claimed_value);
    const measured = fmtMetric(c.metric, c.measured_value);
    return `<em>${esc(c.strategy)}</em>: paper says <span class="num warn">${claimed}</span> ${metric}, we measure <span class="num crit">${measured}</span>.`;
  }

  function renderContradictions(items) {
    const section = el('section');
    const head = el('div', { class: 'section-head' });
    const titleWrap = el('div');
    titleWrap.appendChild(el('h2', { class: 'section-title' }, 'Open contradictions, by gravity'));
    titleWrap.appendChild(el('p', { class: 'section-sub', html: '<em>Sorted by absolute delta. Critical first, then major, then minor.</em>' }));
    head.appendChild(titleWrap);
    head.appendChild(el('div', { class: 'kicker muted', html: items.length + ' total &middot; ' + items.filter(c => c.severity === 'critical').length + ' critical' }));
    section.appendChild(head);

    if (!items.length) {
      section.appendChild(el('p', { class: 'loading' }, 'No open contradictions. The wire is clean.'));
      return section;
    }

    const sorted = items.slice().sort((a, b) => {
      const sevRank = { critical: 0, major: 1, minor: 2 };
      const sa = sevRank[a.severity] != null ? sevRank[a.severity] : 3;
      const sb = sevRank[b.severity] != null ? sevRank[b.severity] : 3;
      if (sa !== sb) return sa - sb;
      return (b.delta_abs || 0) - (a.delta_abs || 0);
    });

    // Skip the #1 (already in hero) -- present the next 8
    const display = sorted.slice(1, 9);

    const grid = el('div', { class: 'contradictions-grid' });
    display.forEach(c => {
      const card = el('div', { class: 'contra-card' });
      card.appendChild(el('p', { class: 'kicker ' + (c.severity === 'critical' ? '' : c.severity === 'major' ? 'amber' : 'muted'),
        html: `<span class="severity-bar ${esc(c.severity)}"></span>${esc((c.severity || '').toUpperCase())} &middot; ${esc(metricNoun(c.metric))}` }));
      card.appendChild(el('h3', { class: 'contra-headline', html: esc(c.source_title || 'Untitled paper') }));
      card.appendChild(el('p', { class: 'contra-hook', html: contradictionHook(c) }));
      const meta = el('div', { class: 'contra-meta' });
      meta.appendChild(el('span', { class: 'gap-strong', html: `Δ <span class="num">${fmtNum(c.delta_abs, 2)}</span>` }));
      meta.appendChild(el('span', { class: 'age-badge' }, 'open ' + ageLabel(c.first_seen_at)));
      meta.appendChild(el('span', {}, esc(c.universe || '—')));
      card.appendChild(meta);
      if (c.source_url) {
        card.appendChild(el('br'));
        const linkRow = el('div');
        linkRow.appendChild(el('a', { class: 'source-link', href: c.source_url, target: '_blank', rel: 'noopener' }, 'Read source →'));
        card.appendChild(linkRow);
      }
      grid.appendChild(card);
    });
    section.appendChild(grid);

    if (sorted.length > 9) {
      const more = el('p', { class: 'section-sub', style: 'margin-top: 20px; text-align: right;' },
        `…and ${sorted.length - 9} more in the appendix.`);
      section.appendChild(more);
    }

    return section;
  }

    const cells = [
      { label: 'Strategies Tracked', value: fmtInt(summary.strategies_tracked || strategies.length), sub: 'across all universes' },
      { label: 'With Active Claims', value: fmtInt(withClaims), sub: 'literature engaged' },
      { label: 'In LIVE', value: fmtInt(live), sub: 'committing real capital' },
      { label: 'In PAPER', value: fmtInt(paper), sub: 'shadow-trading' },
      { label: 'In RESEARCH', value: fmtInt(research), sub: 'pre-promotion' },
      { label: 'Experiments (total)', value: fmtInt(summary.experiments_total), sub: 'all time' },
      { label: 'Experiments (7d)', value: fmtInt(summary.experiments_7d), sub: 'this week' },
      { label: 'Keep rate', value: fmtPct(summary.keep_rate), sub: 'of experiments retained' },
    ];
    cells.forEach(c => {
      const cell = el('div', { class: 'coverage-cell' });
      cell.appendChild(el('div', { class: 'label' }, c.label));
      cell.appendChild(el('div', { class: 'value' }, c.value));
      cell.appendChild(el('div', { class: 'sub' }, c.sub));
      grid.appendChild(cell);
    });
    section.appendChild(grid);

    return section;
  }

  function renderAppendix(data) {
    const details = el('details', { class: 'appendix' });
    const sum = el('summary', {}, 'Appendix &middot; Tables for the operator who insists');
    details.appendChild(sum);

    const content = el('div', { class: 'appendix-content' });

    // Contradictions table
    content.appendChild(el('h3', {}, 'All open contradictions'));
    const table1 = el('table', { class: 'appendix-table' });
    table1.innerHTML = '<thead><tr><th>Sev</th><th>Strategy</th><th>Universe</th><th>Metric</th><th class="num-cell">Paper</th><th class="num-cell">Atlas</th><th class="num-cell">Δ</th><th>First seen</th></tr></thead>';
    const tb1 = el('tbody');
    (data.open_contradictions || []).slice().sort((a, b) => (b.delta_abs || 0) - (a.delta_abs || 0)).forEach(c => {
      const tr = el('tr');
      tr.innerHTML =
        `<td><span class="severity-bar ${esc(c.severity)}"></span>${esc(c.severity)}</td>` +
        `<td>${esc(c.strategy)}</td>` +
        `<td>${esc(c.universe)}</td>` +
        `<td>${esc(c.metric)}</td>` +
        `<td class="num-cell">${fmtMetric(c.metric, c.claimed_value)}</td>` +
        `<td class="num-cell">${fmtMetric(c.metric, c.measured_value)}</td>` +
        `<td class="num-cell">${fmtNum(c.delta_abs, 2)}</td>` +
        `<td>${fmtDate(c.first_seen_at)}</td>`;
      tb1.appendChild(tr);
    });
    table1.appendChild(tb1);
    content.appendChild(table1);

    // Strategy table
    content.appendChild(el('h3', {}, 'Strategy summary'));
    const table2 = el('table', { class: 'appendix-table' });
    table2.innerHTML = '<thead><tr><th>Strategy</th><th>Universe</th><th>State</th><th class="num-cell">Solo Sharpe</th><th class="num-cell">Port Sharpe</th><th class="num-cell">DD%</th><th class="num-cell">Trades</th><th class="num-cell">Claims</th><th class="num-cell">Contra</th></tr></thead>';
    const tb2 = el('tbody');
    (data.v_strategy_summary || []).forEach(s => {
      const tr = el('tr');
      tr.innerHTML =
        `<td>${esc(s.strategy)}</td>` +
        `<td>${esc(s.universe)}</td>` +
        `<td><span class="lifecycle-pill ${esc(s.lifecycle_state)}">${esc(s.lifecycle_state)}</span></td>` +
        `<td class="num-cell">${fmtNum(s.solo_sharpe, 2)}</td>` +
        `<td class="num-cell">${fmtNum(s.portfolio_sharpe, 2)}</td>` +
        `<td class="num-cell">${fmtNum(s.max_dd_pct, 1)}</td>` +
        `<td class="num-cell">${fmtInt(s.trades)}</td>` +
        `<td class="num-cell">${fmtInt(s.active_claims)}</td>` +
        `<td class="num-cell">${fmtInt(s.open_contradictions)}</td>`;
      tb2.appendChild(tr);
    });
    table2.appendChild(tb2);
    content.appendChild(table2);

    // Lifecycle table
    content.appendChild(el('h3', {}, 'Recent lifecycle transitions'));
    const table3 = el('table', { class: 'appendix-table' });
    table3.innerHTML = '<thead><tr><th>When</th><th>Strategy</th><th>From → To</th><th>Operator</th><th>Reason</th></tr></thead>';
    const tb3 = el('tbody');
    (data.lifecycle_recent || []).forEach(l => {
      const tr = el('tr');
      tr.innerHTML =
        `<td>${fmtDate(l.transitioned_at)}</td>` +
        `<td>${esc(l.strategy)}</td>` +
        `<td>${esc(l.from_state || '—')} → ${esc(l.to_state)}</td>` +
        `<td>${esc(l.operator)}</td>` +
        `<td>${esc(l.reason || '')}</td>`;
      tb3.appendChild(tr);
    });
    table3.appendChild(tb3);
    content.appendChild(table3);

    details.appendChild(content);
    return details;
  }

  function renderColophon() {
    return el('div', { class: 'colophon', html: 'The Atlas Daily &middot; A research-desk briefing &middot; Set in Source Serif Pro &middot; Generated ' + fmtTime(NOW.toISOString()) });
  }

  function renderError(msg) {
    return el('div', { class: 'error-banner', html: 'The presses could not load. <span class="num">' + esc(msg) + '</span>' });
  }

  // ---------- Main ----------
  function render(data) {
    const app = $('#app');
    app.innerHTML = '';
    try {
      const summary = data.summary || {};
      const sourceById = {};
      (data.sources_recent || []).forEach(s => { sourceById[s.id] = s; });

      // Pick the #1 contradiction
      const contradictions = (data.open_contradictions || []).slice();
      const sorted = contradictions.sort((a, b) => {
        const sevRank = { critical: 0, major: 1, minor: 2 };
        const sa = sevRank[a.severity] != null ? sevRank[a.severity] : 3;
        const sb = sevRank[b.severity] != null ? sevRank[b.severity] : 3;
        if (sa !== sb) return sa - sb;
        return (b.delta_abs || 0) - (a.delta_abs || 0);
      });
      // The brief specifies "the single biggest contradiction" -- use the largest delta_abs as hero,
      // following the explicit donchian_breakout example. The example has delta_abs=1.21 (#101).
      // Sort by delta_abs DESC among all (severity is a tiebreaker, but #101 is the brief's chosen story).
      const heroCandidates = contradictions.slice().sort((a, b) => (b.delta_abs || 0) - (a.delta_abs || 0));
      // Prefer one matching the brief's explicit example if present.
      const hero = heroCandidates.find(c => c.strategy === 'donchian_breakout' && (c.source_id || '').includes('2604.11234')) || heroCandidates[0];

      app.appendChild(renderMasthead(summary));
      app.appendChild(renderTicker(summary));
      app.appendChild(renderHero(hero, sourceById));
      app.appendChild(renderFrontPage(data));
      app.appendChild(el('hr', { class: 'rule-double' }));
      app.appendChild(renderContradictions(contradictions));
      app.appendChild(renderCoverage(data));
      app.appendChild(renderAppendix(data));
      app.appendChild(renderColophon());
    } catch (e) {
      console.error(e);
      app.appendChild(renderError('render: ' + (e && e.message ? e.message : String(e))));
    }
  }

  function init() {
    fetch('../shared/mock-data.json')
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(render)
      .catch(err => {
        console.error('Load failed:', err);
        const app = $('#app');
        app.innerHTML = '';
        app.appendChild(renderError('Could not load ../shared/mock-data.json — ' + (err && err.message ? err.message : String(err))));
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
