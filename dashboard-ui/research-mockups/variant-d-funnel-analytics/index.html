<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atlas Research — Funnel Analytics (Variant D)</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <style>
    :root {
      --bg: #0b0d10;
      --surface: #14171c;
      --surface-alt: #1c2026;
      --surface-hover: #232830;
      --border: #2a2f37;
      --border-strong: #3a414c;
      --text: #e6e8eb;
      --text-muted: #8b929d;
      --text-dim: #5d6470;
      --accent: #3b82f6;
      --accent-soft: rgba(59, 130, 246, 0.15);
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --critical: #ef4444;
      --major: #f59e0b;
      --minor: #8b929d;

      /* Sequential blue/teal palette for funnel stages */
      --stage-1: #1e3a8a;
      --stage-2: #2563eb;
      --stage-3: #0ea5e9;
      --stage-4: #06b6d4;
      --stage-5: #14b8a6;

      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
    body { font-size: 14px; line-height: 1.5; min-height: 100vh; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code, .mono { font-family: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace; }

    /* ---------- Top bar ---------- */
    header.topbar {
      position: sticky; top: 0; z-index: 30;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      background: rgba(11, 13, 16, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    .brand { display: flex; gap: 16px; align-items: baseline; }
    .brand h1 { font-size: 18px; margin: 0; font-weight: 600; letter-spacing: -0.01em; }
    .brand .sub { color: var(--text-muted); font-size: 13px; }
    .badge {
      padding: 6px 12px; border-radius: 999px;
      background: var(--accent-soft); color: var(--accent);
      border: 1px solid rgba(59, 130, 246, 0.35);
      font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
    }
    .topbar-meta { display: flex; gap: 18px; align-items: center; color: var(--text-muted); font-size: 12px; }
    .topbar-meta .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }

    /* ---------- Layout ---------- */
    main { padding: 24px 28px 80px; max-width: 1500px; margin: 0 auto; }
    section { margin-bottom: 28px; }
    .section-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 12px;
    }
    .section-head h2 {
      margin: 0; font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); font-weight: 600;
    }
    .section-head .hint { color: var(--text-dim); font-size: 12px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }
    .card.tight { padding: 14px 16px; }

    /* ---------- Funnel ---------- */
    .funnel-wrap { padding: 24px; }
    .funnel-stages {
      display: flex; align-items: stretch; gap: 0;
      height: 200px;
      margin-bottom: 16px;
      position: relative;
    }
    .funnel-stage {
      flex: 1 1 0;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 14px 8px;
      position: relative;
      cursor: pointer;
      transition: background 0.15s ease;
      border-right: 1px solid rgba(255,255,255,0.04);
    }
    .funnel-stage:last-child { border-right: none; }
    .funnel-stage:hover .funnel-shape { filter: brightness(1.15); }
    .funnel-stage.active .funnel-shape { filter: brightness(1.25); }
    .funnel-stage.active .stage-label { color: var(--text); }
    .funnel-stage.dimmed { opacity: 0.45; }

    .funnel-shape {
      position: absolute; left: 0; right: 0; top: 0; bottom: 0;
      z-index: 0;
      transition: filter 0.15s ease;
    }
    .funnel-stage-content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      text-align: center;
    }
    .stage-label {
      font-size: 12px; color: rgba(255,255,255,0.85);
      text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
    }
    .stage-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px; font-weight: 700; color: white;
      line-height: 1;
    }
    .stage-meta {
      font-size: 11px; color: rgba(255,255,255,0.7);
      font-family: 'JetBrains Mono', monospace;
    }

    .funnel-arrows {
      display: flex; margin-top: 10px;
      padding: 0 4px;
    }
    .funnel-arrow {
      flex: 1 1 0;
      display: flex; justify-content: center; align-items: center;
      font-size: 12px; color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .funnel-arrow:first-child, .funnel-arrow:last-child { flex: 0.5; }
    .funnel-arrow .drop {
      padding: 4px 10px; border-radius: 999px;
      background: var(--surface-alt); border: 1px solid var(--border);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .funnel-arrow .drop.bad { color: var(--amber); border-color: rgba(245, 158, 11, 0.3); }
    .funnel-arrow .drop.good { color: var(--green); border-color: rgba(34, 197, 94, 0.3); }
    .funnel-arrow .drop.neutral { color: var(--text-muted); }
    .arrow-glyph { color: var(--text-dim); }

    /* ---------- Stage health row ---------- */
    .stage-health-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-top: 8px;
    }
    .stage-health-card {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-alt);
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .stage-health-card:hover { border-color: var(--border-strong); background: var(--surface-hover); }
    .stage-health-card.active { border-color: var(--accent); background: rgba(59, 130, 246, 0.05); }
    .shc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .shc-name { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .shc-arrow { font-size: 14px; font-weight: 700; }
    .shc-arrow.up { color: var(--green); }
    .shc-arrow.down { color: var(--red); }
    .shc-arrow.flat { color: var(--text-muted); }
    .shc-value { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; }
    .shc-delta { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
    .shc-bar { height: 3px; border-radius: 2px; background: var(--border); margin-top: 10px; overflow: hidden; }
    .shc-bar > span { display: block; height: 100%; }

    /* ---------- Time series ---------- */
    .chart-container { position: relative; }
    .chart-container.tall { height: 320px; }
    .chart-container.medium { height: 260px; }
    .chart-container.short { height: 180px; }

    /* ---------- Two-chart row ---------- */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 1100px) {
      .charts-row { grid-template-columns: 1fr; }
      .stage-health-row { grid-template-columns: repeat(2, 1fr); }
    }

    /* ---------- Drill-in panel ---------- */
    .drill-panel {
      border: 1px solid var(--border); border-radius: 10px;
      background: var(--surface);
    }
    .drill-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }
    .drill-title {
      display: flex; gap: 12px; align-items: center;
    }
    .drill-title .pill {
      padding: 3px 10px; border-radius: 4px;
      background: var(--accent-soft); color: var(--accent);
      font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .drill-title h3 { margin: 0; font-size: 14px; font-weight: 600; }
    .drill-title .sub { color: var(--text-muted); font-size: 12px; }
    .drill-body { padding: 18px 20px; min-height: 180px; }

    .reset-btn {
      background: var(--surface-alt); border: 1px solid var(--border);
      color: var(--text-muted); padding: 5px 12px; border-radius: 6px;
      cursor: pointer; font-size: 12px; transition: all 0.15s ease;
    }
    .reset-btn:hover { color: var(--text); border-color: var(--border-strong); }
    .reset-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ---------- Diagnostics ---------- */
    .diag-list {
      display: grid; gap: 8px;
    }
    .diag-item {
      display: flex; gap: 12px;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-radius: 6px;
      background: var(--surface-alt);
      align-items: flex-start;
    }
    .diag-item .icon {
      font-size: 14px; line-height: 1.4; flex-shrink: 0;
      width: 18px; text-align: center; font-weight: 700;
    }
    .diag-item.ok { border-left-color: var(--green); }
    .diag-item.ok .icon { color: var(--green); }
    .diag-item.warn { border-left-color: var(--amber); }
    .diag-item.warn .icon { color: var(--amber); }
    .diag-item.bad { border-left-color: var(--red); }
    .diag-item.bad .icon { color: var(--red); }
    .diag-item.info { border-left-color: var(--accent); }
    .diag-item.info .icon { color: var(--accent); }
    .diag-text { flex: 1; font-size: 13px; }
    .diag-text strong { color: var(--text); font-weight: 600; }
    .diag-text .mono { color: var(--text); }
    .diag-text .muted { color: var(--text-muted); }

    /* ---------- Tables ---------- */
    .table-wrap { overflow-x: auto; }
    table.t {
      width: 100%; border-collapse: collapse;
      font-size: 13px;
    }
    table.t th, table.t td {
      text-align: left; padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    table.t th {
      font-size: 11px; text-transform: uppercase;
      color: var(--text-muted); font-weight: 600;
      letter-spacing: 0.04em;
      background: var(--surface-alt);
      position: sticky; top: 0;
    }
    table.t tbody tr:hover { background: var(--surface-alt); }
    table.t td.num { font-family: 'JetBrains Mono', monospace; text-align: right; }
    table.t td.mono-c { font-family: 'JetBrains Mono', monospace; }

    .sev-pill {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .sev-pill.critical { background: rgba(239, 68, 68, 0.15); color: var(--critical); }
    .sev-pill.major { background: rgba(245, 158, 11, 0.15); color: var(--major); }
    .sev-pill.minor { background: rgba(139, 146, 157, 0.15); color: var(--minor); }

    .pagination {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; border-top: 1px solid var(--border);
      font-size: 12px; color: var(--text-muted);
    }
    .pagination .pages { display: flex; gap: 6px; }
    .pagination button {
      background: var(--surface-alt); border: 1px solid var(--border);
      color: var(--text); padding: 4px 10px; border-radius: 4px;
      cursor: pointer; font-size: 12px;
    }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    .pagination button.current { background: var(--accent); border-color: var(--accent); }

    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 1100px) {
      .bottom-grid { grid-template-columns: 1fr; }
    }

    /* ---------- Drill body content ---------- */
    .drill-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    }
    .stat-block {
      padding: 14px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--surface-alt);
    }
    .stat-block .label {
      font-size: 11px; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.04em; margin-bottom: 6px;
    }
    .stat-block .value {
      font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700;
    }
    .stat-block .delta {
      font-size: 11px; margin-top: 4px; font-family: 'JetBrains Mono', monospace;
    }
    .stat-block .delta.up { color: var(--green); }
    .stat-block .delta.down { color: var(--red); }
    .stat-block .delta.flat { color: var(--text-muted); }

    .drill-list { display: grid; gap: 10px; margin-top: 14px; }
    .drill-row {
      display: grid; grid-template-columns: 1fr auto auto;
      gap: 16px; align-items: center;
      padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--surface-alt);
    }
    .drill-row .title { font-size: 13px; }
    .drill-row .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .drill-row .meta { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); }
    .drill-row .chip {
      padding: 2px 8px; border-radius: 4px; font-size: 11px;
      background: var(--surface); color: var(--text-muted);
      border: 1px solid var(--border); font-family: 'JetBrains Mono', monospace;
    }

    .legend-toggle {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border: 1px solid var(--border);
      border-radius: 4px; background: var(--surface-alt);
      font-size: 11px; cursor: pointer; color: var(--text-muted);
      margin-left: 8px;
    }
    .legend-toggle .swatch { width: 8px; height: 8px; border-radius: 2px; }

    /* Loading */
    .loading {
      padding: 60px; text-align: center; color: var(--text-muted);
    }
    .loading::after {
      content: ''; display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-left: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .small-muted { font-size: 11px; color: var(--text-muted); }

    /* Click hint */
    .hint-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; background: var(--accent-soft); color: var(--accent);
      border-radius: 4px; font-size: 11px;
    }

    @media (max-width: 768px) {
      main { padding: 16px 14px 60px; }
      .funnel-stages { height: 160px; }
      .stage-count { font-size: 20px; }
      .drill-grid { grid-template-columns: repeat(2, 1fr); }
      .funnel-arrows { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>Atlas Research</h1>
      <span class="sub">Discovery pipeline analytics</span>
    </div>
    <div class="topbar-meta">
      <span id="topbar-last-digest"><span class="dot" style="background: var(--green)"></span> last digest <span class="mono" id="last-digest-time">—</span></span>
      <span id="topbar-queue"><span class="dot" style="background: var(--accent)"></span> queue <span class="mono" id="queue-summary">—</span></span>
      <span class="badge">Variant D — Funnel Analytics</span>
    </div>
  </header>

  <main>
    <div id="root"><div class="loading">Loading mock data</div></div>
  </main>

  <script>
    // -------------------------------------------------
    // Chart.js defaults
    // -------------------------------------------------
    Chart.defaults.color = '#8b929d';
    Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Inter', sans-serif";
    Chart.defaults.font.size = 11;
    Chart.defaults.borderColor = '#2a2f37';

    const PALETTE = {
      stage1: '#1e3a8a',
      stage2: '#2563eb',
      stage3: '#0ea5e9',
      stage4: '#06b6d4',
      stage5: '#14b8a6',
      critical: '#ef4444',
      major: '#f59e0b',
      minor: '#8b929d',
      accent: '#3b82f6',
      green: '#22c55e',
      red: '#ef4444',
      amber: '#f59e0b',
    };

    const STAGES = [
      { key: 'papers_found',         label: 'Papers Found',     color: PALETTE.stage1, short: 'Fetch' },
      { key: 'papers_filtered',      label: 'Papers Filtered',  color: PALETTE.stage2, short: 'Filter' },
      { key: 'specs_extracted',      label: 'Specs Extracted',  color: PALETTE.stage3, short: 'Extract' },
      { key: 'strategies_generated', label: 'Strategies Gen.',  color: PALETTE.stage4, short: 'Generate' },
      { key: 'strategies_passed_qc', label: 'Passed QC',        color: PALETTE.stage5, short: 'QC' },
    ];

    // -------------------------------------------------
    // Utilities
    // -------------------------------------------------
    const fmtNum = n => Number(n).toLocaleString();
    const fmtPct = n => `${(n * 100).toFixed(1)}%`;
    const fmtPctSign = n => `${n >= 0 ? '+' : ''}${(n * 100).toFixed(1)}%`;
    const fmtDate = iso => {
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    };
    const fmtDateTime = iso => {
      const d = new Date(iso);
      return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    };
    const sumKey = (rows, key) => rows.reduce((s, r) => s + (r[key] || 0), 0);
    const avgKey = (rows, key) => rows.length ? sumKey(rows, key) / rows.length : 0;
    const safeRatio = (a, b) => (b > 0 ? a / b : 0);

    // -------------------------------------------------
    // State
    // -------------------------------------------------
    const state = {
      data: null,
      selectedStage: null,   // key of stage to filter to
      sourcesPage: 1,
      sourcesPerPage: 10,
    };

    // -------------------------------------------------
    // Bootstrap
    // -------------------------------------------------
    fetch('../shared/mock-data.json')
      .then(r => r.json())
      .then(data => {
        state.data = data;
        render();
      })
      .catch(err => {
        document.getElementById('root').innerHTML =
          `<div class="card" style="color: var(--red)">Failed to load mock data: ${String(err)}</div>`;
      });

    // -------------------------------------------------
    // Top-level render
    // -------------------------------------------------
    function render() {
      const d = state.data;
      // Top bar meta
      document.getElementById('last-digest-time').textContent = fmtDateTime(d.summary.last_digest_at);
      const q = d.queue_health;
      document.getElementById('queue-summary').textContent =
        `${q.queued} queued · ${q.running} running · ${q.evaluating} eval`;

      const root = document.getElementById('root');
      root.innerHTML = renderShell();

      // After DOM is in place, build the funnel + charts + tables.
      buildFunnel();
      buildStageHealth();
      buildTimeSeries();
      buildContradictionsChart();
      buildResolutionChart();
      buildDiagnostics();
      buildContradictionsTable();
      buildSourcesTable();
      buildDrillIn();

      // Wire reset button
      const reset = document.getElementById('reset-stage');
      reset.addEventListener('click', () => {
        state.selectedStage = null;
        applyStageSelection();
      });
    }

    function renderShell() {
      return `
        <section>
          <div class="section-head">
            <h2>Discovery Funnel — 7-Day Rolling</h2>
            <span class="hint">Click a stage to drill in <span class="hint-tag">CLICKABLE</span></span>
          </div>
          <div class="card funnel-wrap">
            <div id="funnel" class="funnel-stages"></div>
            <div id="funnel-arrows" class="funnel-arrows"></div>
            <div class="stage-health-row" id="stage-health"></div>
          </div>
        </section>

        <section>
          <div class="section-head">
            <h2>Funnel Over Time — Last 30 Days</h2>
            <span class="hint" id="ts-hint">All stages shown · click a stage above to isolate</span>
          </div>
          <div class="card">
            <div class="chart-container tall"><canvas id="chart-timeseries"></canvas></div>
          </div>
        </section>

        <section>
          <div class="charts-row">
            <div>
              <div class="section-head">
                <h2>Open Contradictions Over Time</h2>
                <span class="hint">Stacked by severity</span>
              </div>
              <div class="card">
                <div class="chart-container medium"><canvas id="chart-contradictions"></canvas></div>
              </div>
            </div>
            <div>
              <div class="section-head">
                <h2>Resolution Velocity — 4 Weeks</h2>
                <span class="hint">Contradictions resolved per week</span>
              </div>
              <div class="card">
                <div class="chart-container medium"><canvas id="chart-resolutions"></canvas></div>
              </div>
            </div>
          </div>
        </section>

        <section>
          <div class="section-head">
            <h2>Stage Drill-In</h2>
            <span class="hint">Context for the selected funnel stage</span>
          </div>
          <div class="drill-panel">
            <div class="drill-header">
              <div class="drill-title">
                <span class="pill" id="drill-pill">DIGEST</span>
                <h3 id="drill-heading">Discovery digest — recent days</h3>
                <span class="sub" id="drill-sub"></span>
              </div>
              <button class="reset-btn" id="reset-stage" disabled>Reset selection</button>
            </div>
            <div class="drill-body" id="drill-body"></div>
          </div>
        </section>

        <section>
          <div class="section-head">
            <h2>Funnel Health Diagnostics</h2>
            <span class="hint">Auto-generated from the last 30 days</span>
          </div>
          <div class="card">
            <div class="diag-list" id="diagnostics"></div>
          </div>
        </section>

        <section>
          <div class="bottom-grid">
            <div>
              <div class="section-head">
                <h2>Open Contradictions</h2>
                <span class="hint" id="ctab-count"></span>
              </div>
              <div class="card" style="padding: 0;">
                <div class="table-wrap"><table class="t" id="contradictions-table"></table></div>
              </div>
            </div>
            <div>
              <div class="section-head">
                <h2>Source Inventory</h2>
                <span class="hint" id="stab-count"></span>
              </div>
              <div class="card" style="padding: 0;">
                <div class="table-wrap"><table class="t" id="sources-table"></table></div>
                <div class="pagination" id="sources-pagination"></div>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    // -------------------------------------------------
    // Funnel slicing
    // -------------------------------------------------
    function chronologicalFunnel() {
      // Sort ascending by date
      return [...state.data.discovery_funnel_30d].sort((a, b) => a.date.localeCompare(b.date));
    }
    function last7Days() {
      const c = chronologicalFunnel();
      return c.slice(-7);
    }
    function prior23Days() {
      const c = chronologicalFunnel();
      return c.slice(0, Math.max(0, c.length - 7));
    }

    // -------------------------------------------------
    // Funnel build (trapezoidal blocks)
    // -------------------------------------------------
    function buildFunnel() {
      const last7 = last7Days();
      const totals = STAGES.map(s => ({ ...s, value: sumKey(last7, s.key) }));
      const maxVal = Math.max(...totals.map(t => t.value), 1);

      const funnelEl = document.getElementById('funnel');
      funnelEl.innerHTML = '';

      totals.forEach((stage, i) => {
        const next = totals[i + 1];
        const w1 = stage.value / maxVal;
        const w2 = next ? next.value / maxVal : w1 * 0.85; // taper at the right edge

        const div = document.createElement('div');
        div.className = 'funnel-stage';
        div.dataset.stage = stage.key;
        div.innerHTML = `
          <svg class="funnel-shape" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
            <defs>
              <linearGradient id="grad-${stage.key}" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="${stage.color}" stop-opacity="0.95" />
                <stop offset="100%" stop-color="${stage.color}" stop-opacity="0.85" />
              </linearGradient>
            </defs>
            <polygon points="0,${50 - w1 * 50} 100,${50 - w2 * 50} 100,${50 + w2 * 50} 0,${50 + w1 * 50}"
                     fill="url(#grad-${stage.key})" />
          </svg>
          <div class="funnel-stage-content">
            <div class="stage-label">${stage.label}</div>
            <div class="stage-count">${fmtNum(stage.value)}</div>
            <div class="stage-meta">7d total · ${(stage.value / 7).toFixed(1)}/day</div>
          </div>
        `;
        div.addEventListener('click', () => {
          state.selectedStage = state.selectedStage === stage.key ? null : stage.key;
          applyStageSelection();
        });
        funnelEl.appendChild(div);
      });

      // Arrows / drop-offs (n stages → n+1 slots: edges + n-1 gaps)
      const arrowsEl = document.getElementById('funnel-arrows');
      arrowsEl.innerHTML = '';
      arrowsEl.appendChild(slotEl(''));
      for (let i = 0; i < totals.length - 1; i++) {
        const a = totals[i].value, b = totals[i + 1].value;
        const ratio = safeRatio(b, a);
        const drop = 1 - ratio;
        let cls = 'neutral';
        if (a === 0) cls = 'neutral';
        else if (drop >= 0.7) cls = 'bad';
        else if (drop <= 0.4) cls = 'good';
        const label = a > 0
          ? `${(ratio * 100).toFixed(0)}% pass · -${(drop * 100).toFixed(0)}%`
          : 'n/a';
        arrowsEl.appendChild(slotEl(`<span class="drop ${cls}"><span class="arrow-glyph">→</span> ${label}</span>`));
      }
      arrowsEl.appendChild(slotEl(''));
    }
    function slotEl(html) {
      const d = document.createElement('div');
      d.className = 'funnel-arrow';
      d.innerHTML = html;
      return d;
    }

    function applyStageSelection() {
      // Funnel stages
      document.querySelectorAll('.funnel-stage').forEach(el => {
        if (!state.selectedStage) {
          el.classList.remove('active', 'dimmed');
        } else if (el.dataset.stage === state.selectedStage) {
          el.classList.add('active');
          el.classList.remove('dimmed');
        } else {
          el.classList.remove('active');
          el.classList.add('dimmed');
        }
      });
      // Health cards
      document.querySelectorAll('.stage-health-card').forEach(el => {
        el.classList.toggle('active', el.dataset.stage === state.selectedStage);
      });
      // Reset button
      const btn = document.getElementById('reset-stage');
      btn.disabled = !state.selectedStage;

      // Time-series highlight: redraw dataset visibility
      updateTimeSeriesHighlight();

      // Hint text
      const hint = document.getElementById('ts-hint');
      if (state.selectedStage) {
        const s = STAGES.find(x => x.key === state.selectedStage);
        hint.textContent = `Isolated: ${s.label}`;
      } else {
        hint.textContent = 'All stages shown · click a stage above to isolate';
      }

      buildDrillIn();
    }

    // -------------------------------------------------
    // Stage health (7d vs 30d pass-rate)
    // -------------------------------------------------
    function buildStageHealth() {
      const last7 = last7Days();
      const all30 = chronologicalFunnel();

      const container = document.getElementById('stage-health');
      container.innerHTML = '';

      STAGES.forEach((stage, i) => {
        const prev = i === 0 ? null : STAGES[i - 1];
        let rate7, rate30;
        if (prev) {
          rate7 = safeRatio(sumKey(last7, stage.key), sumKey(last7, prev.key));
          rate30 = safeRatio(sumKey(all30, stage.key), sumKey(all30, prev.key));
        } else {
          // For first stage there's no upstream; show absolute volume per day vs 30d avg
          rate7 = avgKey(last7, stage.key);
          rate30 = avgKey(all30, stage.key);
        }
        const delta = rate7 - rate30;
        const deltaPct = rate30 > 0 ? delta / rate30 : 0;
        const arrowChar = deltaPct > 0.03 ? '↗' : deltaPct < -0.03 ? '↘' : '→';
        const arrowCls = deltaPct > 0.03 ? 'up' : deltaPct < -0.03 ? 'down' : 'flat';
        const valueText = prev ? fmtPct(rate7) : `${rate7.toFixed(1)}/d`;
        const baselineText = prev ? `30d ${fmtPct(rate30)}` : `30d ${rate30.toFixed(1)}/d`;

        // Bar shows rate7 vs max(rate7, rate30)
        const barFill = Math.min(1, prev ? rate7 / Math.max(rate30, 0.0001) : rate7 / Math.max(rate30 * 1.5, 0.0001));

        const card = document.createElement('div');
        card.className = 'stage-health-card';
        card.dataset.stage = stage.key;
        card.innerHTML = `
          <div class="shc-top">
            <span class="shc-name">${stage.short}</span>
            <span class="shc-arrow ${arrowCls}">${arrowChar}</span>
          </div>
          <div class="shc-value">${valueText}</div>
          <div class="shc-delta">${baselineText} · ${fmtPctSign(deltaPct)}</div>
          <div class="shc-bar"><span style="width: ${Math.max(4, Math.min(100, barFill * 100))}%; background: ${stage.color};"></span></div>
        `;
        card.addEventListener('click', () => {
          state.selectedStage = state.selectedStage === stage.key ? null : stage.key;
          applyStageSelection();
        });
        container.appendChild(card);
      });
    }

    // -------------------------------------------------
    // Time series (stacked area)
    // -------------------------------------------------
    let chartTimeSeries = null;
    function buildTimeSeries() {
      const rows = chronologicalFunnel();
      const labels = rows.map(r => fmtDate(r.date));

      const datasets = STAGES.map(stage => ({
        label: stage.label,
        data: rows.map(r => r[stage.key]),
        backgroundColor: hexToRGBA(stage.color, 0.55),
        borderColor: stage.color,
        borderWidth: 1.5,
        pointRadius: 0,
        pointHoverRadius: 4,
        fill: true,
        tension: 0.3,
        stack: 'funnel',
      }));

      const ctx = document.getElementById('chart-timeseries').getContext('2d');
      chartTimeSeries = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#e6e8eb', boxWidth: 10, boxHeight: 10, padding: 14, usePointStyle: true, pointStyle: 'rectRounded' },
              onClick: (e, legendItem, legend) => {
                const idx = legendItem.datasetIndex;
                const ci = legend.chart;
                ci.setDatasetVisibility(idx, !ci.isDatasetVisible(idx));
                ci.update();
              },
            },
            tooltip: {
              backgroundColor: '#14171c',
              borderColor: '#2a2f37',
              borderWidth: 1,
              titleColor: '#e6e8eb',
              bodyColor: '#e6e8eb',
              padding: 10,
              callbacks: {
                label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y}`,
                afterBody: items => {
                  if (!items.length) return '';
                  const total = items.reduce((s, it) => s + it.parsed.y, 0);
                  return `Total: ${total}`;
                },
              },
            },
            annotation: { annotations: {} },
          },
          scales: {
            x: {
              grid: { color: 'rgba(42, 47, 55, 0.5)' },
              ticks: { color: '#8b929d', maxRotation: 0, autoSkip: true, maxTicksLimit: 10 },
            },
            y: {
              stacked: true,
              beginAtZero: true,
              grid: { color: 'rgba(42, 47, 55, 0.4)' },
              ticks: { color: '#8b929d' },
            },
          },
        },
      });
    }

    function updateTimeSeriesHighlight() {
      if (!chartTimeSeries) return;
      chartTimeSeries.data.datasets.forEach((ds, i) => {
        const stageKey = STAGES[i].key;
        if (!state.selectedStage || stageKey === state.selectedStage) {
          // Restore
          ds.backgroundColor = hexToRGBA(STAGES[i].color, 0.55);
          ds.borderColor = STAGES[i].color;
          ds.borderWidth = stageKey === state.selectedStage ? 2.5 : 1.5;
        } else {
          ds.backgroundColor = hexToRGBA(STAGES[i].color, 0.08);
          ds.borderColor = hexToRGBA(STAGES[i].color, 0.25);
          ds.borderWidth = 1;
        }
      });
      chartTimeSeries.update();
    }

    // -------------------------------------------------
    // Contradictions over time (synthesized from data)
    // -------------------------------------------------
    function buildContradictionsChart() {
      const today = new Date('2026-05-28T00:00:00Z');
      const days = 30;
      const labels = [];
      const byDay = [];
      for (let i = days - 1; i >= 0; i--) {
        const d = new Date(today);
        d.setUTCDate(d.getUTCDate() - i);
        labels.push(d.toISOString().slice(0, 10));
        byDay.push({ critical: 0, major: 0, minor: 0 });
      }

      // For each open contradiction, increment open-count from first_seen forward
      state.data.open_contradictions.forEach(c => {
        const seen = c.first_seen_at.slice(0, 10);
        const idx = labels.indexOf(seen);
        const startIdx = idx === -1 ? 0 : idx;
        for (let i = startIdx; i < labels.length; i++) {
          byDay[i][c.severity] += 1;
        }
      });

      const ctx = document.getElementById('chart-contradictions').getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels.map(fmtDate),
          datasets: [
            {
              label: 'Critical', data: byDay.map(b => b.critical),
              backgroundColor: hexToRGBA(PALETTE.critical, 0.55),
              borderColor: PALETTE.critical,
              borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 4,
              fill: true, tension: 0.3, stack: 'sev',
            },
            {
              label: 'Major', data: byDay.map(b => b.major),
              backgroundColor: hexToRGBA(PALETTE.major, 0.5),
              borderColor: PALETTE.major,
              borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 4,
              fill: true, tension: 0.3, stack: 'sev',
            },
            {
              label: 'Minor', data: byDay.map(b => b.minor),
              backgroundColor: hexToRGBA(PALETTE.minor, 0.4),
              borderColor: PALETTE.minor,
              borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 4,
              fill: true, tension: 0.3, stack: 'sev',
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#e6e8eb', boxWidth: 10, boxHeight: 10, padding: 12, usePointStyle: true, pointStyle: 'rectRounded' },
            },
            tooltip: {
              backgroundColor: '#14171c', borderColor: '#2a2f37', borderWidth: 1,
              titleColor: '#e6e8eb', bodyColor: '#e6e8eb', padding: 10,

    // -------------------------------------------------
    // Resolution velocity
    // -------------------------------------------------
    function buildResolutionChart() {
      // Derive 4 weekly buckets from summary.resolved_contradictions_30d.
      // Distribute pseudo-realistically: weight recent weeks higher.
      const total = state.data.summary.resolved_contradictions_30d || 0;
      const weights = [0.18, 0.22, 0.28, 0.32]; // older → newer
      const weeks = ['4 wks ago', '3 wks ago', 'Last week', 'This week'];
      const values = weights.map(w => Math.round(total * w));

      // Pull delivery_status failures from digest_history_30d.
      const failureCount = state.data.digest_history_30d.filter(d => d.delivery_status !== 'ok').length;

      const ctx = document.getElementById('chart-resolutions').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: weeks,
          datasets: [{
            label: 'Resolved contradictions',
            data: values,
            backgroundColor: weeks.map((_, i) => i === weeks.length - 1 ? PALETTE.green : hexToRGBA(PALETTE.green, 0.55)),
            borderColor: PALETTE.green,
            borderWidth: 1,
            borderRadius: 4,
            maxBarThickness: 60,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#14171c', borderColor: '#2a2f37', borderWidth: 1,
              titleColor: '#e6e8eb', bodyColor: '#e6e8eb', padding: 10,
              callbacks: {
                label: ctx => ` Resolved: ${ctx.parsed.y}`,
                afterLabel: ctx => {
                  if (ctx.dataIndex === weeks.length - 1 && failureCount > 0) {
                    return `${failureCount} digest delivery failure(s)`;
                  }
                  return '';
                },
              },
            },
            annotation: failureCount > 0 ? {
              annotations: {
                fail: {
                  type: 'line',
                  yMin: Math.max(...values) * 0.85,
                  yMax: Math.max(...values) * 0.85,
                  borderColor: PALETTE.red,
                  borderWidth: 1,
                  borderDash: [4, 4],
                  label: {
                    display: true, content: `${failureCount} delivery failure(s)`,
                    backgroundColor: 'rgba(239, 68, 68, 0.15)',
                    color: PALETTE.red, font: { size: 10 }, padding: 4,
                  },
                },
              },
            } : { annotations: {} },
          },
          scales: {
            x: { grid: { display: false }, ticks: { color: '#8b929d' } },
            y: { beginAtZero: true, grid: { color: 'rgba(42, 47, 55, 0.4)' }, ticks: { color: '#8b929d', precision: 0 } },
          },
        },
      });
    }

    // -------------------------------------------------
    // Diagnostics — computed from data
    // -------------------------------------------------
    function buildDiagnostics() {
      const container = document.getElementById('diagnostics');
      container.innerHTML = '';
      const items = computeDiagnostics();
      items.forEach(it => {
        const div = document.createElement('div');
        div.className = `diag-item ${it.level}`;
        div.innerHTML = `<span class="icon">${it.icon}</span><div class="diag-text">${it.html}</div>`;
        container.appendChild(div);
      });
    }

    function computeDiagnostics() {
      const out = [];
      const last7 = last7Days();
      const prior23 = prior23Days();
      const all30 = chronologicalFunnel();

      // 1. Fetcher
      const avg7Found = avgKey(last7, 'papers_found');
      const avg30Found = avgKey(all30, 'papers_found');
      if (avg7Found >= avg30Found * 0.85) {
        out.push({
          level: 'ok', icon: '✓',
          html: `<strong>Fetcher healthy</strong> · averaging <span class="mono">${avg7Found.toFixed(1)} papers/day</span> over last 7d (30d baseline <span class="mono">${avg30Found.toFixed(1)}/d</span>).`,
        });
      } else {
        out.push({
          level: 'warn', icon: '⚠',
          html: `<strong>Fetcher slowing</strong> · <span class="mono">${avg7Found.toFixed(1)} papers/day</span> last 7d vs <span class="mono">${avg30Found.toFixed(1)}/d</span> 30d baseline.`,
        });
      }

      // 2. Filter pass-rate
      const filter7 = safeRatio(sumKey(last7, 'papers_filtered'), sumKey(last7, 'papers_found'));
      const filterPrior = safeRatio(sumKey(prior23, 'papers_filtered'), sumKey(prior23, 'papers_found'));
      const filterDelta = filter7 - filterPrior;
      if (Math.abs(filterDelta) < 0.03) {
        out.push({
          level: 'ok', icon: '✓',
          html: `<strong>Filter stable</strong> · pass-rate <span class="mono">${fmtPct(filter7)}</span> last 7d, prior 23d <span class="mono">${fmtPct(filterPrior)}</span>.`,
        });
      } else if (filterDelta < 0) {
        out.push({
          level: 'warn', icon: '⚠',
          html: `<strong>Filter pass-rate dropped</strong> · <span class="mono">${fmtPct(filter7)}</span> last 7d vs <span class="mono">${fmtPct(filterPrior)}</span> prior 23d (<span class="mono">${fmtPctSign(filterDelta)}</span>).`,
        });
      } else {
        out.push({
          level: 'info', icon: 'ℹ',
          html: `<strong>Filter pass-rate up</strong> · <span class="mono">${fmtPct(filter7)}</span> last 7d vs <span class="mono">${fmtPct(filterPrior)}</span> prior 23d (<span class="mono">${fmtPctSign(filterDelta)}</span>).`,
        });
      }

      // 3. Spec extraction
      const specs7 = avgKey(last7, 'specs_extracted');
      const specs30 = avgKey(all30, 'specs_extracted');
      const specsDeltaPct = specs30 > 0 ? (specs7 - specs30) / specs30 : 0;
      if (Math.abs(specsDeltaPct) < 0.1) {
        out.push({
          level: 'ok', icon: '✓',
          html: `<strong>Spec extraction stable</strong> · <span class="mono">${specs7.toFixed(1)} specs/day</span> on average (30d <span class="mono">${specs30.toFixed(1)}/d</span>).`,
        });
      } else if (specsDeltaPct < 0) {
        out.push({
          level: 'warn', icon: '⚠',
          html: `<strong>Spec extraction down</strong> · <span class="mono">${specs7.toFixed(1)}/d</span> last 7d vs <span class="mono">${specs30.toFixed(1)}/d</span> 30d (<span class="mono">${fmtPctSign(specsDeltaPct)}</span>).`,
        });
      } else {
        out.push({
          level: 'info', icon: 'ℹ',
          html: `<strong>Spec extraction up</strong> · <span class="mono">${specs7.toFixed(1)}/d</span> last 7d vs <span class="mono">${specs30.toFixed(1)}/d</span> 30d.`,
        });
      }

      // 4. Zero-spec days
      const zeroSpecDays = all30.filter(r => r.specs_extracted === 0).map(r => r.date);
      if (zeroSpecDays.length > 0) {
        const recent = zeroSpecDays[zeroSpecDays.length - 1];
        // Was there also zero papers_found on that day? heuristic: arxiv rate-limit
        const dayRow = all30.find(r => r.date === recent);
        const cause = dayRow.papers_found === 0
          ? 'no papers fetched (likely arxiv rate-limit or weekend)'
          : (dayRow.papers_found > 50 ? 'unusually high fetch volume — possible filter saturation' : 'extraction pipeline stall');
        out.push({
          level: dayRow.papers_found === 0 ? 'info' : 'warn', icon: dayRow.papers_found === 0 ? 'ℹ' : '⚠',
          html: `<strong>${zeroSpecDays.length} day(s) with 0 specs</strong> in the last 30 · most recent <span class="mono">${recent}</span> — ${cause}.`,
        });
      }

      // 5. QC pass-rate
      const qc7 = safeRatio(sumKey(last7, 'strategies_passed_qc'), sumKey(last7, 'strategies_generated'));
      const qcPrior = safeRatio(sumKey(prior23, 'strategies_passed_qc'), sumKey(prior23, 'strategies_generated'));
      const qcDelta = qc7 - qcPrior;
      if (qc7 >= 0.75) {
        out.push({
          level: 'ok', icon: '✓',
          html: `<strong>QC gate healthy</strong> · <span class="mono">${fmtPct(qc7)}</span> of generated strategies passed QC last 7d.`,
        });
      } else if (qc7 >= 0.5) {
        out.push({
          level: 'info', icon: 'ℹ',
          html: `<strong>QC pass-rate moderate</strong> · <span class="mono">${fmtPct(qc7)}</span> last 7d, prior 23d <span class="mono">${fmtPct(qcPrior)}</span> (<span class="mono">${fmtPctSign(qcDelta)}</span>).`,
        });
      } else {
        out.push({
          level: 'warn', icon: '⚠',
          html: `<strong>QC gate strict</strong> · only <span class="mono">${fmtPct(qc7)}</span> passed last 7d — investigate generator quality.`,
        });
      }

      // 6. Contradictions
      const sum = state.data.summary.open_contradictions;
      const resolved = state.data.summary.resolved_contradictions_30d;
      if (sum.critical > 0) {
        out.push({
          level: 'bad', icon: '!',
          html: `<strong>${sum.critical} critical contradiction(s) open</strong> · ${sum.total} total open, ${resolved} resolved over last 30d.`,
        });
      } else {
        out.push({
          level: 'ok', icon: '✓',
          html: `<strong>No critical contradictions</strong> open · ${sum.total} total open, ${resolved} resolved over last 30d.`,
        });
      }

      // 7. Digest delivery
      const digestFailures = state.data.digest_history_30d.filter(d => d.delivery_status !== 'ok');
      if (digestFailures.length === 0) {
        out.push({
          level: 'ok', icon: '✓',
          html: `<strong>Digest delivery 100%</strong> over last ${state.data.digest_history_30d.length} digests · last at <span class="mono">${fmtDateTime(state.data.summary.last_digest_at)}</span>.`,
        });
      } else {
        out.push({
          level: 'warn', icon: '⚠',
          html: `<strong>${digestFailures.length} digest delivery failure(s)</strong> in last 30 days.`,
        });
      }

      // 8. Queue health
      const q = state.data.queue_health;
      const queueTotal = q.queued + q.claimed + q.running + q.evaluating;
      if (queueTotal > 15) {
        out.push({
          level: 'warn', icon: '⚠',
          html: `<strong>Backtest queue deep</strong> · <span class="mono">${queueTotal}</span> jobs in flight (${q.queued} queued, ${q.running} running, ${q.evaluating} evaluating).`,
        });
      } else {
        out.push({
          level: 'ok', icon: '✓',
          html: `<strong>Backtest queue healthy</strong> · <span class="mono">${queueTotal}</span> jobs in flight (${q.queued} queued, ${q.running} running, ${q.evaluating} evaluating).`,
        });
      }

      // 9. Anomaly: spike days
      const meanFound = avgKey(all30, 'papers_found');
      const spikeDay = all30.find(r => r.papers_found > meanFound * 3 && r.specs_extracted === 0);
      if (spikeDay) {
        out.push({
          level: 'info', icon: 'ℹ',
          html: `<strong>Fetch spike with 0 downstream</strong> on <span class="mono">${spikeDay.date}</span> · ${spikeDay.papers_found} papers fetched but 0 specs extracted — possible filter or LLM outage that day.`,
        });
      }

      return out;
    }

    // -------------------------------------------------
    // Contradictions table (compact, 5-10 rows)
    // -------------------------------------------------
    function buildContradictionsTable() {
      const rows = [...state.data.open_contradictions]
        .sort((a, b) => {
          const order = { critical: 0, major: 1, minor: 2 };
          if (order[a.severity] !== order[b.severity]) return order[a.severity] - order[b.severity];
          return b.delta_abs - a.delta_abs;
        })
        .slice(0, 8);

      const total = state.data.open_contradictions.length;
      document.getElementById('ctab-count').textContent = `top 8 of ${total}`;

      const tbl = document.getElementById('contradictions-table');
      tbl.innerHTML = `
        <thead><tr>
          <th>Severity</th><th>Strategy</th><th>Metric</th>
          <th style="text-align:right">Claimed</th>
          <th style="text-align:right">Measured</th>
          <th style="text-align:right">Δ</th>
        </tr></thead>
        <tbody>
          ${rows.map(c => `
            <tr>
              <td><span class="sev-pill ${c.severity}">${c.severity}</span></td>
              <td class="mono-c"><a href="${c.source_url}" target="_blank" rel="noopener" title="${c.source_title}">${c.strategy}</a></td>
              <td class="mono-c">${c.metric}</td>
              <td class="num">${c.claimed_value.toFixed(2)}</td>
              <td class="num">${c.measured_value.toFixed(2)}</td>
              <td class="num" style="color: ${c.delta < 0 ? PALETTE.red : PALETTE.amber}">${c.delta > 0 ? '+' : ''}${c.delta.toFixed(2)}</td>
            </tr>
          `).join('')}
        </tbody>
      `;
    }

    // -------------------------------------------------
    // Sources table (paginated 10/page)
    // -------------------------------------------------
    function buildSourcesTable() {
      const all = state.data.sources_recent;
      const total = all.length;
      const totalPages = Math.max(1, Math.ceil(total / state.sourcesPerPage));
      state.sourcesPage = Math.min(state.sourcesPage, totalPages);

      const start = (state.sourcesPage - 1) * state.sourcesPerPage;
      const slice = all.slice(start, start + state.sourcesPerPage);

      document.getElementById('stab-count').textContent = `${total} total sources (${state.data.summary.sources_q_fin} q-fin)`;

      const tbl = document.getElementById('sources-table');
      tbl.innerHTML = `
        <thead><tr>
          <th>Title</th><th>Category</th>
          <th style="text-align:right">Claims</th>
          <th style="text-align:right">Contras</th>
          <th>Ingested</th>
        </tr></thead>
        <tbody>
          ${slice.map(s => `
            <tr>
              <td><a href="${s.url}" target="_blank" rel="noopener" title="${s.title}">${truncate(s.title, 56)}</a></td>
              <td class="mono-c">${s.primary_category}</td>
              <td class="num">${s.claim_count}</td>
              <td class="num" style="color: ${s.open_contradictions > 0 ? PALETTE.amber : 'var(--text-muted)'}">${s.open_contradictions}</td>
              <td class="mono-c" style="color: var(--text-muted)">${fmtDate(s.ingested_at)}</td>
            </tr>
          `).join('')}
        </tbody>
      `;

      const pag = document.getElementById('sources-pagination');
      pag.innerHTML = `
        <span>Page ${state.sourcesPage} of ${totalPages} · ${total} sources</span>
        <span class="pages">
          <button ${state.sourcesPage === 1 ? 'disabled' : ''} data-act="prev">‹ Prev</button>
          ${Array.from({ length: totalPages }, (_, i) => `
            <button class="${i + 1 === state.sourcesPage ? 'current' : ''}" data-page="${i + 1}">${i + 1}</button>
          `).join('')}
          <button ${state.sourcesPage === totalPages ? 'disabled' : ''} data-act="next">Next ›</button>
        </span>
      `;
      pag.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
        if (b.dataset.act === 'prev') state.sourcesPage--;
        else if (b.dataset.act === 'next') state.sourcesPage++;
        else state.sourcesPage = Number(b.dataset.page);
        buildSourcesTable();
      }));
    }

    // -------------------------------------------------
    // Drill-in panel
    // -------------------------------------------------
    function buildDrillIn() {
      const body = document.getElementById('drill-body');
      const pill = document.getElementById('drill-pill');
      const heading = document.getElementById('drill-heading');
      const sub = document.getElementById('drill-sub');

      const stage = state.selectedStage;
      const d = state.data;

      if (!stage) {
        pill.textContent = 'DIGEST';
        heading.textContent = 'Discovery digest — recent days';
        sub.textContent = 'No stage selected · showing daily digest history';
        body.innerHTML = renderDigestDrill(d);
        return;
      }

      const stageMeta = STAGES.find(s => s.key === stage);
      pill.textContent = stageMeta.short.toUpperCase();
      pill.style.background = hexToRGBA(stageMeta.color, 0.18);
      pill.style.color = stageMeta.color;

      const last7 = last7Days();
      const all30 = chronologicalFunnel();
      const stage7 = sumKey(last7, stage);
      const stage30 = sumKey(all30, stage);
      const stage7Avg = stage7 / 7;
      const stage30Avg = stage30 / 30;
      const deltaPct = stage30Avg > 0 ? (stage7Avg - stage30Avg) / stage30Avg : 0;

      const statBlocks = `
        <div class="drill-grid">
          <div class="stat-block">
            <div class="label">7-day total</div>
            <div class="value">${fmtNum(stage7)}</div>
            <div class="delta flat">${stage7Avg.toFixed(1)}/day avg</div>
          </div>
          <div class="stat-block">
            <div class="label">30-day total</div>
            <div class="value">${fmtNum(stage30)}</div>
            <div class="delta flat">${stage30Avg.toFixed(1)}/day avg</div>
          </div>
          <div class="stat-block">
            <div class="label">7d vs 30d Δ</div>
            <div class="value" style="color: ${deltaPct >= 0 ? PALETTE.green : PALETTE.red}">${fmtPctSign(deltaPct)}</div>
            <div class="delta ${deltaPct >= 0 ? 'up' : 'down'}">${deltaPct >= 0 ? '↗' : '↘'} vs 30d baseline</div>
          </div>
          <div class="stat-block">
            <div class="label">Best day (30d)</div>
            ${(() => {
              const best = all30.reduce((m, r) => (r[stage] > (m?.[stage] || -1) ? r : m), null);
              return `<div class="value">${best ? best[stage] : 0}</div><div class="delta flat">${best ? best.date : '—'}</div>`;
            })()}
          </div>
        </div>
      `;

      if (stage === 'papers_found') {
        heading.textContent = 'Stage: Papers Found — discovery digests';
        sub.textContent = 'Daily fetch history from arxiv q-fin';
        body.innerHTML = statBlocks + renderDigestDrill(d);
      } else if (stage === 'papers_filtered') {
        heading.textContent = 'Stage: Papers Filtered — passing the filter gate';
        sub.textContent = 'q-fin subcategory + heuristic filters';
        body.innerHTML = statBlocks + renderFilterDrill(d);
      } else if (stage === 'specs_extracted') {
        heading.textContent = 'Stage: Specs Extracted — recent spec files';
        sub.textContent = `Confidence: ${d.extraction_confidence.high} high · ${d.extraction_confidence.medium} med · ${d.extraction_confidence.low} low · ${d.extraction_confidence.not_found} not_found`;
        body.innerHTML = statBlocks + renderSpecsDrill(d);
      } else if (stage === 'strategies_generated') {
        heading.textContent = 'Stage: Strategies Generated — tracked strategies';
        sub.textContent = `${d.summary.strategies_tracked} tracked · ${d.summary.experiments_7d} experiments last 7d`;
        body.innerHTML = statBlocks + renderStrategiesDrill(d);
      } else if (stage === 'strategies_passed_qc') {
        heading.textContent = 'Stage: Passed QC — claims & lifecycle';
        sub.textContent = `${d.summary.claims_active} active claims · keep-rate ${d.summary.keep_rate}%`;
        body.innerHTML = statBlocks + renderQCDrill(d);
      }
    }

    function renderDigestDrill(d) {
      const recent = d.digest_history_30d.slice(0, 8);
      return `
        <div class="drill-list">
          ${recent.map(dg => `
            <div class="drill-row">
              <div>
                <div class="title">Digest sent <span class="mono">${fmtDateTime(dg.sent_at)}</span></div>
                <div class="sub">${dg.new_papers} new papers · ${dg.new_contradictions} new contradictions · ${dg.lifecycle_transitions} lifecycle transitions</div>
              </div>
              <div></div>
              <div>
                <span class="chip" style="color: ${dg.delivery_status === 'ok' ? PALETTE.green : PALETTE.red}">${dg.delivery_status}</span>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderFilterDrill(d) {
      // Synthesize a categorical filter breakdown from sources_recent's primary_category
      const cats = {};
      d.sources_recent.forEach(s => {
        cats[s.primary_category] = (cats[s.primary_category] || 0) + 1;
      });
      const max = Math.max(...Object.values(cats));
      return `
        <div style="margin-top: 14px;">
          <div class="small-muted" style="margin-bottom: 8px;">Filter pass distribution by arxiv subcategory (recent sources)</div>
          <div style="display: grid; gap: 6px;">
            ${Object.entries(cats).sort((a, b) => b[1] - a[1]).map(([cat, n]) => `
              <div style="display: grid; grid-template-columns: 140px 1fr 30px; align-items: center; gap: 10px;">
                <span class="mono-c" style="font-size: 12px;">${cat}</span>
                <div style="height: 14px; background: var(--surface-alt); border-radius: 3px; overflow: hidden;">
                  <div style="height: 100%; width: ${(n / max * 100)}%; background: ${PALETTE.stage2};"></div>
                </div>
                <span class="mono" style="text-align: right; font-size: 12px;">${n}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderSpecsDrill(d) {
      // Show recent sources where claim_count > 0 (proxy for spec extracted)
      const specs = d.sources_recent.filter(s => s.claim_count > 0).slice(0, 8);
      return `
        <div class="drill-list">
          ${specs.map(s => `
            <div class="drill-row">
              <div>
                <div class="title"><a href="${s.url}" target="_blank">${truncate(s.title, 70)}</a></div>
                <div class="sub">${s.id} · ${s.primary_category}</div>
              </div>
              <div class="meta">${s.claim_count} claim${s.claim_count === 1 ? '' : 's'}</div>
              <div><span class="chip">${fmtDate(s.ingested_at)}</span></div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderStrategiesDrill(d) {
      const rows = [...d.v_strategy_summary]
        .sort((a, b) => b.solo_sharpe - a.solo_sharpe)
        .slice(0, 8);
      return `
        <div class="drill-list">
          ${rows.map(r => `
            <div class="drill-row">
              <div>
                <div class="title mono-c">${r.strategy}</div>
                <div class="sub">${r.universe} · ${r.trades} trades · ${r.active_claims} claim(s) · <span style="color: ${r.lifecycle_state === 'LIVE' ? PALETTE.green : r.lifecycle_state === 'PAPER' ? PALETTE.amber : PALETTE.minor}">${r.lifecycle_state}</span></div>
              </div>
              <div class="meta">sharpe <strong style="color: var(--text)">${r.solo_sharpe.toFixed(2)}</strong></div>
              <div><span class="chip">dd ${r.max_dd_pct.toFixed(1)}%</span></div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderQCDrill(d) {
      // Show source inventory summary (this is the "claims made" view per brief)
      const top = d.sources_recent.slice(0, 8);
      return `
        <div style="margin-top: 14px;">
          <div class="small-muted" style="margin-bottom: 8px;">Source inventory — claims that survived QC</div>
          <div class="drill-list">
            ${top.map(s => `
              <div class="drill-row">
                <div>
                  <div class="title"><a href="${s.url}" target="_blank">${truncate(s.title, 64)}</a></div>
                  <div class="sub">${s.id}</div>
                </div>
                <div class="meta">${s.claim_count} claim(s)</div>
                <div><span class="chip" style="color: ${s.open_contradictions > 0 ? PALETTE.amber : PALETTE.green}">${s.open_contradictions} contra</span></div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    // -------------------------------------------------
    // Helpers
    // -------------------------------------------------
    function truncate(s, n) {
      if (!s) return '';
      return s.length > n ? s.slice(0, n - 1) + '…' : s;
    }
    function hexToRGBA(hex, alpha) {
      const h = hex.replace('#', '');
      const r = parseInt(h.slice(0, 2), 16);
      const g = parseInt(h.slice(2, 4), 16);
      const b = parseInt(h.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }
  </script>
</body>
</html>
