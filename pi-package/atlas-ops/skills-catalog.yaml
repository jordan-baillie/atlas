# Type classification:
#   reference  — Pure lookup: knowledge base, recipes, architecture maps
#   workflow   — Step-by-step operational procedures (daily ops, reoptimization)
#   agent      — Autonomous decision-making personas (director, research loop)
#
# Quality levels:
#   good       — Recently enriched, comprehensive, tested in operations
#   adequate   — Functional but could be deeper
