[pytest]
# Use importlib import mode so that top-level `tests` package doesn't
# collide with subdirectory `tests/` packages (brokers/tests/, etc.).
# NOTE: importmode is CLI-only; pass it via addopts (not as ini key).
addopts = --import-mode=importlib

markers =
    slow: long-running tests (backtest simulations, network IO) — skip with -m "not slow"
timeout = 30
norecursedirs = .git .tox __pycache__ *.egg-info tests/archive _attic
