<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#09090b" id="meta-theme">
<title>Atlas Dashboard</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="atlas.css">
</head>
<body>
<div id="app">

  <!-- ── Header ── -->
  <header class="header">
    <div class="logo">▲ Atlas</div>
    <div class="header-right">
      <div class="market-clock-strip" id="market-clock-strip"></div>
      <button class="theme-btn" id="theme-btn" title="Toggle theme (L)">◑</button>
    </div>
  </header>

  <!-- ── Summary Strip ── -->
  <div class="summary-strip" id="summary-strip">
    <div class="stat">
      <div class="stat-label">Portfolio</div>
      <div class="stat-value" id="stat-equity">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Today</div>
      <div class="stat-value" id="stat-today">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Total P&amp;L</div>
      <div class="stat-value" id="stat-total-pnl">—</div>
      <div class="stat-sub" id="stat-total-pnl-sub"></div>
    </div>
    <div class="stat">
      <div class="stat-label">Buying Power</div>
      <div class="stat-value" id="stat-buying-power">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Positions</div>
      <div class="stat-value" id="stat-positions">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Margin Used</div>
      <div class="stat-value" id="stat-margin">—</div>
    </div>
  </div>

  <!-- ── Equity Chart ── -->
  <div class="chart-section">
    <div class="chart-header">
      <div class="chart-legend">
        <span class="chart-title">Equity Curve</span>
        <span class="chart-legend-item">
          <span class="chart-legend-line solid"></span>Portfolio
        </span>
        <span class="chart-legend-item">
          <span class="chart-legend-line dotted"></span>SPY
        </span>
      </div>
      <span class="return-badge" id="return-badge">—</span>
    </div>
    <canvas id="equity-canvas"></canvas>
    <div class="chart-tooltip" id="chart-tooltip"></div>
  </div>

  <!-- ── Two-Column: Strategy Donut + Recent Orders ── -->
  <div class="two-col-layout">
    <div class="donut-section">
      <div class="section-header">Strategy Allocation</div>
      <div class="donut-wrap">
        <canvas id="donut-canvas"></canvas>
      </div>
      <div class="strategy-legend" id="strategy-legend"></div>
    </div>
    <div class="orders-section">
      <div class="section-header">Recent Orders</div>
      <div class="orders-scroll">
        <table class="orders-table">
          <thead>
            <tr>
              <th>Symbol</th>
              <th>Side</th>
              <th>Qty</th>
              <th>Type</th>
              <th>Price</th>
              <th>Status</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="orders-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ── Positions Grid ── -->
  <div class="section-header" id="positions-label">Open Positions</div>
  <div class="positions-grid" id="positions-grid"></div>

  <!-- ── Performance Metrics (shown only when trades > 0) ── -->
  <div id="performance-section" class="performance-section" style="display:none">
    <div class="section-header">Strategy Performance</div>
    <div class="performance-grid" id="performance-grid"></div>
  </div>
  <div id="performance-empty" class="accumulating-msg" style="display:none">
    📊 Accumulating trades — performance metrics appear after closed trades
  </div>

</div>
<script>
'use strict';

// ── Strategy colour map ──────────────────────────────────────────────────
var STRATEGY_COLORS = {
  momentum_breakout: '#f97316',
  mean_reversion:    '#6366f1',
  trend_following:   '#22c55e',
  opening_gap:       '#eab308',
  sector_rotation:   '#a855f7',
  short_term_mr:     '#06b6d4',
  connors_rsi2:      '#f43f5e',
  manual:            '#71717a'
};

// ── Theme ────────────────────────────────────────────────────────────────
var THEMES = ['dark', 'light', 'auto'];
var currentTheme = localStorage.getItem('atlas-theme') || 'auto';

function applyTheme(t) {
  currentTheme = t;
  var eff = t === 'auto'
    ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
    : t;
  document.documentElement.setAttribute('data-theme', eff);
  document.getElementById('meta-theme').content = eff === 'light' ? '#fafafa' : '#09090b';
  localStorage.setItem('atlas-theme', t);
}

document.getElementById('theme-btn').onclick = function() {
  applyTheme(THEMES[(THEMES.indexOf(currentTheme) + 1) % THEMES.length]);
  redrawCharts();
};

document.addEventListener('keydown', function(e) {
  if (e.key === 'l' || e.key === 'L') {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    applyTheme(THEMES[(THEMES.indexOf(currentTheme) + 1) % THEMES.length]);
    redrawCharts();
  }
});

applyTheme(currentTheme);

// ── Formatting ───────────────────────────────────────────────────────────
function fmtNum(v, dec) {
  if (v == null || isNaN(v)) return '—';
  dec = dec != null ? dec : 2;
  return Math.abs(v).toLocaleString(undefined, {
    minimumFractionDigits: dec,
    maximumFractionDigits: dec
  });
}

function fmtCcy(v, dec) {
  if (v == null || isNaN(v)) return '—';
  dec = dec != null ? dec : 2;
  return '$' + Math.abs(v).toLocaleString(undefined, {
    minimumFractionDigits: dec,
    maximumFractionDigits: dec
  });
}

function fmtSignedCcy(v, dec) {
  if (v == null || isNaN(v)) return '—';
  dec = dec != null ? dec : 2;
  var sign = v >= 0 ? '+$' : '-$';
  return sign + Math.abs(v).toLocaleString(undefined, {
    minimumFractionDigits: dec,
    maximumFractionDigits: dec
  });
}

function fmtPct(v) {
  if (v == null || isNaN(v)) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}

function pnlClass(v) { return v > 0 ? 'green' : v < 0 ? 'red' : ''; }

function fmtDuration(secs) {
  if (secs <= 0) return '0m';
  var h = Math.floor(secs / 3600);
  var m = Math.floor((secs % 3600) / 60);
  if (h >= 48) return Math.floor(h / 24) + 'd';
  if (h > 0)   return h + 'h' + (m < 10 ? '0' : '') + m + 'm';
  return m + 'm';
}

function daysHeld(entryDate) {
  if (!entryDate) return 0;
  return Math.max(0, Math.floor((Date.now() - new Date(entryDate)) / 86400000));
}

var MONTH_NAMES = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                   'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

function fmtDateShort(dateStr) {
  if (!dateStr) return '';
  var p = dateStr.split('-');
  if (p.length !== 3) return dateStr;
  return MONTH_NAMES[parseInt(p[1])] + ' ' + parseInt(p[2]);
}

function fmtRelativeTime(dtStr) {
  if (!dtStr) return '—';
  var dt = new Date(dtStr.replace(' ', 'T'));
  if (isNaN(dt.getTime())) return dtStr;
  var diffSecs = Math.floor((Date.now() - dt) / 1000);
  if (diffSecs < 60)  return diffSecs + 's ago';
  var diffMins = Math.floor(diffSecs / 60);
  if (diffMins < 60)  return diffMins + 'm ago';
  var diffH = Math.floor(diffMins / 60);
  if (diffH < 24)     return diffH + 'h ago';
  return fmtDateShort((dtStr.split('T')[0] || dtStr.split(' ')[0]));
}

// ── Market Clock ─────────────────────────────────────────────────────────
var _marketClockData = null;
var _clockInterval   = null;

function renderMarketClock(mc) {
  _marketClockData = mc;
  var el = document.getElementById('market-clock-strip');
  if (!el) return;
  if (!mc) { el.innerHTML = ''; return; }

  el.innerHTML =
    '<div class="market-clock" id="nyse-clock">' +
      '<span class="clock-name">NYSE</span>' +
      '<span class="clock-dot" id="nyse-dot"></span>' +
      '<span id="nyse-time">—</span>' +
    '</div>';

  updateClock();
  if (!_clockInterval) {
    _clockInterval = setInterval(updateClock, 1000);
  }
}

function updateClock() {
  var mc = _marketClockData;
  if (!mc) return;
  var dotEl  = document.getElementById('nyse-dot');
  var timeEl = document.getElementById('nyse-time');
  if (!timeEl || !dotEl) return;

  var now = new Date();
  dotEl.className = 'clock-dot' + (mc.is_open ? ' open' : '');

  if (mc.is_open) {
    var closeSecs = Math.max(0, Math.floor((new Date(mc.next_close) - now) / 1000));
    timeEl.innerHTML = '<span class="clock-open">OPEN</span> ' + fmtDuration(closeSecs);
  } else {
    var openSecs = Math.max(0, Math.floor((new Date(mc.next_open) - now) / 1000));
    timeEl.textContent = 'opens in ' + fmtDuration(openSecs);
  }
}

// ── Summary Strip ────────────────────────────────────────────────────────
function renderSummary(data) {
  var acc = data.account || {};
  var s   = data.summary || {};

  // Portfolio equity
  document.getElementById('stat-equity').textContent = fmtCcy(acc.equity);

  // Today P&L
  var today  = s.today_pnl || 0;
  var todEl  = document.getElementById('stat-today');
  todEl.textContent = fmtSignedCcy(today);
  todEl.className   = 'stat-value ' + pnlClass(today);

  // Total P&L (account.equity_change from Alpaca)
  var totalPnl    = acc.equity_change    || 0;
  var totalPnlPct = acc.equity_change_pct || 0;
  var totalEl     = document.getElementById('stat-total-pnl');
  totalEl.innerHTML  = fmtSignedCcy(totalPnl, 0);
  totalEl.className  = 'stat-value ' + pnlClass(totalPnl);
  var subEl = document.getElementById('stat-total-pnl-sub');
  subEl.textContent  = (totalPnlPct >= 0 ? '+' : '') + totalPnlPct.toFixed(1) + '%';
  subEl.className    = 'stat-sub ' + pnlClass(totalPnlPct);

  // Buying power
  document.getElementById('stat-buying-power').textContent = fmtCcy(acc.buying_power, 0);

  // Positions open / max
  var maxPos = s.max_positions || 10;
  document.getElementById('stat-positions').textContent =
    (s.open_positions || 0) + ' / ' + maxPos;

  // Margin used
  var margin    = acc.margin_usage_pct || 0;
  var marginEl  = document.getElementById('stat-margin');
  marginEl.textContent = margin.toFixed(1) + '%';
  marginEl.className   = 'stat-value' + (margin > 50 ? ' red' : margin > 30 ? ' amber' : '');
}

// ── Return Badge ─────────────────────────────────────────────────────────
function renderReturnBadge(data) {
  var badge   = document.getElementById('return-badge');
  var acc     = data.account   || {};
  var bench   = data.benchmark || {};

  var portRet  = acc.equity_change_pct || 0;
  var portSign = portRet >= 0 ? '+' : '';

  if (bench.return_pct != null) {
    var spyRet   = bench.return_pct;
    var alpha    = portRet - spyRet;
    var alphaSign = alpha >= 0 ? '+' : '';
    badge.textContent = portSign + portRet.toFixed(1) + '% (' + alphaSign + alpha.toFixed(1) + '% vs SPY)';
  } else {
    badge.textContent = portSign + portRet.toFixed(1) + '%';
  }

  badge.className = 'return-badge' + (portRet < 0 ? ' negative' : '');
}

// ── Equity Chart ─────────────────────────────────────────────────────────
var _equityChartData = null;

function drawEquityChart(portfolioHistory, benchmarkCurve, animate) {
  _equityChartData = { portfolioHistory: portfolioHistory, benchmarkCurve: benchmarkCurve };

  var canvas = document.getElementById('equity-canvas');
  if (!canvas) return;

  var dpr = window.devicePixelRatio || 1;
  var w   = canvas.offsetWidth  || 800;
  var h   = canvas.offsetHeight || 240;
  canvas.width  = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';

  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  var isDark     = document.documentElement.getAttribute('data-theme') !== 'light';
  var lineColor  = isDark ? '#22c55e' : '#16a34a';
  var benchColor = '#eab308';
  var gridColor  = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.06)';
  var labelColor = isDark ? '#52525b' : '#a1a1aa';

  // ── Not enough history ──
  if (!portfolioHistory || portfolioHistory.length < 3) {
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = labelColor;
    ctx.font = '14px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Building history…', w / 2, h / 2);
    return;
  }

  var portVals  = portfolioHistory.map(function(d) { return d.equity || 0; });
  var portDates = portfolioHistory.map(function(d) { return d.date; });
  var n         = portfolioHistory.length;

  // ── Benchmark: normalise to portfolio start ──
  var benchMap   = {};
  if (benchmarkCurve && benchmarkCurve.length) {
    benchmarkCurve.forEach(function(d) { benchMap[d.date] = d.equity; });
  }
  var portStart  = portVals[0] || 1;
  var benchStart = benchMap[portDates[0]] ||
                   (benchmarkCurve && benchmarkCurve.length ? benchmarkCurve[0].equity : null);
  var benchScale = benchStart ? portStart / benchStart : 1;

  var benchVals = portDates.map(function(date) {
    var bv = benchMap[date];
    return bv != null ? bv * benchScale : null;
  });

  // ── Y range: span both lines ──
  var allVals = portVals.slice();
  benchVals.forEach(function(v) { if (v != null) allVals.push(v); });
  var minV   = Math.min.apply(null, allVals);
  var maxV   = Math.max.apply(null, allVals);
  var yRange = maxV - minV || 1;
  minV -= yRange * 0.08;
  maxV += yRange * 0.08;
  var range  = maxV - minV;

  var pad = { t: 16, r: 16, b: 40, l: 70 };
  var cw  = w - pad.l - pad.r;
  var ch  = h - pad.t - pad.b;

  function xOf(i) { return pad.l + (n === 1 ? cw / 2 : (i / (n - 1)) * cw); }
  function yOf(v) { return pad.t + ch - ((v - minV) / range) * ch; }

  ctx.clearRect(0, 0, w, h);

  // ── Grid + Y labels ──
  ctx.font = '11px JetBrains Mono, monospace';
  ctx.textAlign = 'right';
  for (var yi = 0; yi <= 4; yi++) {
    var yv = minV + (yi / 4) * range;
    var yp = yOf(yv);
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 4]);
    ctx.beginPath(); ctx.moveTo(pad.l, yp); ctx.lineTo(pad.l + cw, yp); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = labelColor;
    ctx.fillText('$' + Math.round(yv).toLocaleString(), pad.l - 8, yp + 4);
  }

  // ── X labels ──
  ctx.textAlign = 'center';
  var xLabelCount = Math.min(6, n);
  var xStep = Math.max(1, Math.floor((n - 1) / Math.max(xLabelCount - 1, 1)));
  for (var xi = 0; xi < n; xi += xStep) {
    var xp = xOf(xi);
    ctx.fillStyle = labelColor;
    ctx.fillText(fmtDateShort(portDates[xi]), xp, h - 10);
    if (xi > 0 && xi < n - 1) {
      ctx.strokeStyle = gridColor;
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 4]);
      ctx.beginPath(); ctx.moveTo(xp, pad.t); ctx.lineTo(xp, pad.t + ch); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // ── Benchmark line (amber dotted) ──
  var hasBench = benchVals.some(function(v) { return v != null; });
  if (hasBench) {
    ctx.beginPath();
    var firstB = true;
    for (var bi = 0; bi < n; bi++) {
      if (benchVals[bi] == null) continue;
      if (firstB) { ctx.moveTo(xOf(bi), yOf(benchVals[bi])); firstB = false; }
      else         { ctx.lineTo(xOf(bi), yOf(benchVals[bi])); }
    }
    ctx.strokeStyle = benchColor;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // ── Portfolio area fill ──
  ctx.beginPath();
  ctx.moveTo(xOf(0), yOf(portVals[0]));
  for (var fi = 1; fi < n; fi++) ctx.lineTo(xOf(fi), yOf(portVals[fi]));
  ctx.lineTo(xOf(n - 1), pad.t + ch);
  ctx.lineTo(xOf(0), pad.t + ch);
  ctx.closePath();
  var grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + ch);
  grad.addColorStop(0,   isDark ? 'rgba(34,197,94,0.14)' : 'rgba(22,163,74,0.10)');
  grad.addColorStop(0.65, isDark ? 'rgba(34,197,94,0.03)' : 'rgba(22,163,74,0.02)');
  grad.addColorStop(1,   'transparent');
  ctx.fillStyle = grad;
  ctx.fill();

  // ── Portfolio line ──
  ctx.beginPath();
  ctx.moveTo(xOf(0), yOf(portVals[0]));
  for (var li = 1; li < n; li++) ctx.lineTo(xOf(li), yOf(portVals[li]));
  ctx.strokeStyle = lineColor;
  ctx.lineWidth   = 2;
  ctx.lineJoin    = 'round';
  ctx.lineCap     = 'round';
  ctx.stroke();

  // ── Dots ──
  var innerFill = isDark ? '#131316' : '#ffffff';
  for (var di = 0; di < n; di++) {
    ctx.beginPath();
    ctx.arc(xOf(di), yOf(portVals[di]), 3, 0, Math.PI * 2);
    ctx.fillStyle = innerFill; ctx.fill();
    ctx.beginPath();
    ctx.arc(xOf(di), yOf(portVals[di]), 3, 0, Math.PI * 2);
    ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5; ctx.stroke();
  }

  // Store for hover
  canvas._chart = {
    pad: pad, cw: cw, ch: ch,
    portVals: portVals, portDates: portDates, benchVals: benchVals,
    minV: minV, range: range, curve: portfolioHistory
  };

  if (animate) {
    canvas.style.opacity   = '0';
    canvas.style.transform = 'translateY(8px)';
    requestAnimationFrame(function() {
      canvas.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      canvas.style.opacity    = '1';
      canvas.style.transform  = 'none';
    });
  }
}

// ── Chart hover tooltip ──────────────────────────────────────────────────
(function() {
  var canvas  = document.getElementById('equity-canvas');
  var tooltip = document.getElementById('chart-tooltip');

  function onMove(e) {
    if (!canvas._chart) return;
    var c    = canvas._chart;
    var rect = canvas.getBoundingClientRect();
    var mx   = e.clientX - rect.left;
    var n    = c.curve.length;
    if (n < 2) return;
    var idx = Math.round((mx - c.pad.l) / c.cw * (n - 1));
    idx = Math.max(0, Math.min(n - 1, idx));

    var pt     = c.curve[idx];
    var portEq = pt.equity || 0;
    var pnl    = pt.pnl || 0;
    var bv     = c.benchVals[idx];

    var dp = (pt.date || '').split('-');
    var niceDate = dp.length === 3
      ? MONTH_NAMES[parseInt(dp[1])] + ' ' + parseInt(dp[2]) + ', ' + dp[0]
      : pt.date;

    var html = '<div class="tt-date">' + niceDate + '</div>';
    html += '<div class="tt-row"><span>Portfolio</span><span style="color:var(--green)">$' +
            Math.round(portEq).toLocaleString() + '</span></div>';
    if (bv != null) {
      html += '<div class="tt-row"><span>SPY bench</span><span style="color:#eab308">$' +
              Math.round(bv).toLocaleString() + '</span></div>';
    }
    if (pnl !== 0) {
      var pc = pnl > 0 ? 'var(--green)' : 'var(--red)';
      html += '<div class="tt-row"><span>Day P&amp;L</span><span style="color:' + pc + '">' +
              fmtSignedCcy(pnl) + '</span></div>';
    }

    tooltip.innerHTML   = html;
    tooltip.style.opacity = '1';
    var tLeft = mx + 16;
    if (tLeft + 185 > rect.width) tLeft = mx - 195;
    tooltip.style.left = tLeft + 'px';
    tooltip.style.top  = '48px';
  }

  function onLeave() { tooltip.style.opacity = '0'; }

  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseleave', onLeave);
})();

// ── Donut Chart ───────────────────────────────────────────────────────────
var _donutData = null;

function drawDonutChart(allocation) {
  _donutData = allocation;
  var canvas = document.getElementById('donut-canvas');
  if (!canvas) return;

  var dpr  = window.devicePixelRatio || 1;
  var size = canvas.offsetWidth || 200;
  canvas.width  = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width  = size + 'px';
  canvas.style.height = size + 'px';

  var ctx  = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  var isDark = document.documentElement.getAttribute('data-theme') !== 'light';
  var cx = size / 2, cy = size / 2;
  var outerR = size / 2 - 6;
  var innerR = outerR * 0.58;

  ctx.clearRect(0, 0, size, size);

  if (!allocation || !allocation.length) {
    ctx.fillStyle = isDark ? '#52525b' : '#a1a1aa';
    ctx.font = '13px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No positions', cx, cy);
    return;
  }

  var total = allocation.reduce(function(s, a) { return s + (a.value || 0); }, 0);
  if (!total) return;

  // ── Segments ──
  var startAngle = -Math.PI / 2;
  var gapAngle   = allocation.length > 1 ? 0.025 : 0;

  allocation.forEach(function(a) {
    var sliceAngle = (a.value / total) * (Math.PI * 2) - gapAngle;
    if (sliceAngle <= 0) return;
    var color = STRATEGY_COLORS[a.strategy] || '#71717a';

    ctx.beginPath();
    ctx.arc(cx, cy, outerR, startAngle, startAngle + sliceAngle);
    ctx.arc(cx, cy, innerR, startAngle + sliceAngle, startAngle, true);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    startAngle += sliceAngle + gapAngle;
  });

  // ── Inner circle background ──
  ctx.beginPath();
  ctx.arc(cx, cy, innerR - 1, 0, Math.PI * 2);
  ctx.fillStyle = isDark ? '#131316' : '#ffffff';
  ctx.fill();

  // ── Center text ──
  ctx.textAlign = 'center';
  ctx.fillStyle = isDark ? '#fafafa' : '#09090b';
  ctx.font = 'bold 15px JetBrains Mono, monospace';
  ctx.fillText('$' + Math.round(total).toLocaleString(), cx, cy - 3);
  ctx.font = '10px Inter, sans-serif';
  ctx.fillStyle = isDark ? '#71717a' : '#a1a1aa';
  ctx.fillText('invested', cx, cy + 14);

  // ── Legend ──
  renderDonutLegend(allocation, total);
}

function renderDonutLegend(allocation, total) {
  var el = document.getElementById('strategy-legend');
  if (!el) return;
  el.innerHTML = allocation.map(function(a) {
    var color = STRATEGY_COLORS[a.strategy] || '#71717a';
    var name  = (a.strategy || '').replace(/_/g, '\u00A0');
    return '<div class="legend-row">' +
      '<span class="legend-dot" style="background:' + color + '"></span>' +
      '<span class="legend-name">' + name + '</span>' +
      '<span class="legend-val">' + fmtCcy(a.value || 0, 0) + '</span>' +
      '<span class="legend-pct">' + (a.pct || 0).toFixed(1) + '%</span>' +
      '<span class="legend-pos">' + (a.positions || 0) + ' pos</span>' +
    '</div>';
  }).join('');
}

// ── Orders Table ─────────────────────────────────────────────────────────
function renderOrders(orders) {
  var tbody = document.getElementById('orders-tbody');
  if (!tbody) return;

  var rows = (orders || []).slice(0, 10);
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="orders-empty">No recent orders</td></tr>';
    return;
  }

  function orderTypeAbbrev(t) {
    return { market: 'MKT', limit: 'LMT', stop: 'STP', stop_limit: 'STP-L',
             trailing_stop: 'TRAIL', market_on_close: 'MOC', limit_on_close: 'LOC' }[t]
      || (t || '').toUpperCase().slice(0, 5);
  }

  function orderPrice(o) {
    if (o.type === 'trailing_stop') {
      if (o.trail_price  && o.trail_price  > 0) return fmtCcy(o.trail_price);
      if (o.stop_price   && o.stop_price   > 0) return fmtCcy(o.stop_price);
      return '—';
    }
    if (o.type === 'limit' || o.type === 'limit_on_close') {
      return o.limit_price && o.limit_price > 0 ? fmtCcy(o.limit_price) : '—';
    }
    if (o.stop_price   && o.stop_price   > 0) return fmtCcy(o.stop_price);
    if (o.filled_price && o.filled_price > 0) return fmtCcy(o.filled_price);
    return '—';
  }

  function statusDot(status) {
    var cls = {
      new: 'dot-amber', accepted: 'dot-amber', pending_new: 'dot-amber',
      filled: 'dot-green', partially_filled: 'dot-green',
      rejected: 'dot-red',
      canceled: 'dot-gray', expired: 'dot-gray', replaced: 'dot-gray'
    }[status] || 'dot-gray';
    return '<span class="status-dot ' + cls + '"></span>';
  }

  tbody.innerHTML = rows.map(function(o) {
    var sideClass = o.side === 'buy' ? 'side-buy' : 'side-sell';
    return '<tr>' +
      '<td class="sym-cell">' + (o.symbol || '—') + '</td>' +
      '<td><span class="side-badge ' + sideClass + '">' + (o.side || '').toUpperCase() + '</span></td>' +
      '<td>' + (o.qty || '—') + '</td>' +
      '<td>' + orderTypeAbbrev(o.type) + '</td>' +
      '<td>' + orderPrice(o) + '</td>' +
      '<td>' + statusDot(o.status) + '<span class="status-text">' + (o.status || '') + '</span></td>' +
      '<td>' + fmtRelativeTime(o.submitted_at) + '</td>' +
    '</tr>';
  }).join('');
}

// ── Sparkline SVG ────────────────────────────────────────────────────────
function renderSparkline(prices, pnlPct) {
  var w = 120, h = 36, pad = 2;
  var color     = (pnlPct || 0) >= 0 ? 'var(--green)' : 'var(--red)';
  var colorFill = (pnlPct || 0) >= 0 ? 'var(--green-soft)' : 'var(--red-soft)';

  if (!prices || prices.length < 2) {
    return '<svg viewBox="0 0 120 36" preserveAspectRatio="none" style="width:100%;height:36px">' +
      '<line x1="0" y1="18" x2="120" y2="18" stroke="' + color + '" stroke-width="1" stroke-opacity="0.2"/></svg>';
  }

  var minV  = Math.min.apply(null, prices);
  var maxV  = Math.max.apply(null, prices);
  var range = maxV - minV || 1;

  var pts = prices.map(function(v, i) {
    var x = (i / (prices.length - 1)) * w;
    var y = pad + ((maxV - v) / range) * (h - 2 * pad);
    return x.toFixed(1) + ',' + y.toFixed(1);
  });

  var fill = pts.slice().concat([w + ',' + h, '0,' + h]);

  return '<svg viewBox="0 0 120 36" preserveAspectRatio="none" style="width:100%;height:36px">' +
    '<polygon points="' + fill.join(' ') + '" fill="' + colorFill + '"/>' +
    '<polyline points="' + pts.join(' ') +
    '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
    '</svg>';
}

// ── Position Cards ────────────────────────────────────────────────────────
function renderPositions(data) {
  var grid  = document.getElementById('positions-grid');
  var label = document.getElementById('positions-label');

  var positions = (data.positions || []).slice();
  positions.sort(function(a, b) {
    return Math.abs(b.unrealized_pnl || 0) - Math.abs(a.unrealized_pnl || 0);
  });

  label.textContent = 'Open Positions (' + positions.length + ')';

  if (!positions.length) {
    var nStrats = Object.keys(STRATEGY_COLORS).length - 1;
    grid.innerHTML = '<div class="empty-state">No open positions — ' +
      nStrats + ' strategies scanning for signals</div>';
    return;
  }

  grid.innerHTML = positions.map(function(p) {
    var pnl       = p.unrealized_pnl     || 0;
    var pnlPct    = p.unrealized_pnl_pct || 0;
    var isPos     = pnl >= 0;
    var strat     = p.strategy || 'manual';
    var stratColor = STRATEGY_COLORS[strat] || '#71717a';
    var stratLabel = strat.replace(/_/g, '\u00A0');
    var days      = daysHeld(p.entry_date);
    var intraPnl  = p.intraday_pnl     || 0;
    var intraPct  = p.intraday_pnl_pct || 0;
    var isIntraPos = intraPnl >= 0;

    return '<div class="pos-card' + (isPos ? '' : ' negative') + '" ' +
        'data-ticker="' + (p.ticker || '') + '" ' +
        'style="--strat-color:' + stratColor + '">' +

      '<div class="card-top">' +
        '<span class="card-ticker">' + (p.ticker || '—') + '</span>' +
        '<span class="strategy-pill" style="' +
          'background:' + stratColor + '18;' +
          'color:' + stratColor + ';' +
          'border:1px solid ' + stratColor + '40' +
        '">' + stratLabel + '</span>' +
      '</div>' +

      '<div class="card-prices">' +
        '<span><span class="label">Entry</span>' +
          '<span class="val">' + fmtCcy(p.entry_price) + '</span></span>' +
        '<span><span class="label">Current</span>' +
          '<span class="val live-price" data-ticker="' + (p.ticker || '') + '">' +
            fmtCcy(p.current_price) + '</span></span>' +
        (p.stop_price ? '<span><span class="label">Stop</span>' +
          '<span class="val stop-val">' + fmtCcy(p.stop_price) + '</span></span>' : '') +
      '</div>' +

      '<div class="card-pnl ' + pnlClass(pnl) + '" data-ticker="' + (p.ticker || '') + '">' +
        (isPos ? '+$' : '-$') + fmtNum(Math.abs(pnl)) +
        ' <span class="pnl-pct">(' + fmtPct(pnlPct) + ')</span>' +
      '</div>' +

      '<div class="card-bottom-row">' +
        '<div class="intraday-badge ' + (intraPnl === 0 ? 'neutral' : isIntraPos ? 'pos' : 'neg') + '">' +
          'Today: ' + (intraPnl >= 0 ? '+$' : '-$') + fmtNum(Math.abs(intraPnl)) +
          ' (' + (intraPct >= 0 ? '+' : '') + intraPct.toFixed(2) + '%)' +
        '</div>' +
        (p.lastday_price ? '<div class="prev-close">Prev: ' + fmtCcy(p.lastday_price) + '</div>' : '') +
      '</div>' +

      '<div class="card-meta">' +
        (days > 0 ? days + 'd held' : 'today') +
        (p.sector && p.sector !== 'Unknown' ? ' · ' + p.sector : '') +
      '</div>' +

      '<div class="sparkline">' + renderSparkline(p.sparkline || [], pnlPct) + '</div>' +
    '</div>';
  }).join('');
}

// ── Performance Metrics ───────────────────────────────────────────────────
function renderPerformance(data) {
  var sp      = data.strategy_performance || {};
  var overall = sp.overall || {};
  var trades  = overall.trades || 0;

  var perfSection = document.getElementById('performance-section');
  var perfEmpty   = document.getElementById('performance-empty');

  if (trades > 0) {
    perfEmpty.style.display   = 'none';
    perfSection.style.display = '';

    var wr     = overall.win_rate    || 0;
    var avgWin = overall.avg_win     || 0;
    var avgLoss = overall.avg_loss   || 0;
    var pf     = overall.profit_factor || 0;
    var exp    = overall.expectancy  || 0;

    var metrics = [
      { label: 'Trades',        value: trades },
      { label: 'Win Rate',      value: (wr * 100).toFixed(1) + '%' },
      { label: 'Avg Win',       value: fmtSignedCcy(avgWin) },
      { label: 'Avg Loss',      value: fmtSignedCcy(avgLoss) },
      { label: 'Profit Factor', value: pf.toFixed(2) + 'x' },
      { label: 'Expectancy',    value: fmtSignedCcy(exp) }
    ];

    document.getElementById('performance-grid').innerHTML = metrics.map(function(m) {
      return '<div class="perf-stat">' +
        '<div class="perf-label">' + m.label + '</div>' +
        '<div class="perf-value">' + m.value + '</div>' +
      '</div>';
    }).join('');
  } else {
    perfSection.style.display = 'none';
    perfEmpty.style.display   = '';
  }
}

// ── Chart Redraw (on theme change / resize) ───────────────────────────────
function redrawCharts() {
  if (_equityChartData) {
    drawEquityChart(_equityChartData.portfolioHistory, _equityChartData.benchmarkCurve, false);
  }
  if (_donutData) {
    drawDonutChart(_donutData);
  }
}

// ── Live Price Polling ────────────────────────────────────────────────────
var POLL_INTERVAL = 15000;
var _pollTimer    = null;

function flashCard(card, isPositive) {
  card.classList.add(isPositive ? 'flash-pos' : 'flash-neg');
  setTimeout(function() { card.classList.remove('flash-pos', 'flash-neg'); }, 400);
}

function applyPrices(resp) {
  if (!resp) return;

  // Update today P&L in summary
  var pnlVal = resp.today_pnl != null ? resp.today_pnl : null;
  if (pnlVal != null || resp.today_pnl_display) {
    var todEl = document.getElementById('stat-today');
    todEl.textContent = resp.today_pnl_display || fmtSignedCcy(pnlVal);
    if (pnlVal != null) todEl.className = 'stat-value ' + pnlClass(pnlVal);
  }

  // Update position cards
  var positions = resp.positions || {};
  var cards = document.querySelectorAll('#positions-grid .pos-card');
  cards.forEach(function(card) {
    var ticker = card.getAttribute('data-ticker');
    if (!ticker || !positions[ticker]) return;
    var q = positions[ticker];

    if (q.price) {
      var priceEl = card.querySelector('.live-price[data-ticker="' + ticker + '"]');
      if (priceEl) priceEl.textContent = fmtCcy(q.price);
    }

    var uPnl = q.unrealized_pnl != null ? q.unrealized_pnl : (q.pnl_local || null);
    if (uPnl != null) {
      var pnlEl = card.querySelector('.card-pnl[data-ticker="' + ticker + '"]');
      if (pnlEl) {
        var isPos  = uPnl >= 0;
        var uPnlPct = q.unrealized_pnl_pct || q.pnl_pct || 0;
        pnlEl.className = 'card-pnl ' + (isPos ? 'green' : 'red');
        pnlEl.innerHTML = (isPos ? '+$' : '-$') + fmtNum(Math.abs(uPnl)) +
          ' <span class="pnl-pct">(' + fmtPct(uPnlPct) + ')</span>';
        card.className = 'pos-card' + (isPos ? '' : ' negative');
      }
      flashCard(card, uPnl >= 0);
    }
  });
}

function startPricePolling(mc) {
  if (_pollTimer) return;
  function poll() {
    if (!mc || !mc.is_open) return;
    fetch('/api/prices?t=' + Date.now(), { credentials: 'same-origin' })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(q)  { if (q) applyPrices(q); })
      .catch(function()  {});
  }
  _pollTimer = setInterval(poll, POLL_INTERVAL);
}

// ── Main Init ─────────────────────────────────────────────────────────────
async function init() {
  try {
    var resp = await fetch('/simple-dashboard-data.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();

    renderMarketClock(data.market_clock);
    renderSummary(data);
    renderReturnBadge(data);

    var portfolioHistory = data.portfolio_history || [];
    var benchCurve       = (data.benchmark || {}).curve || [];
    drawEquityChart(portfolioHistory, benchCurve, true);

    drawDonutChart(data.strategy_allocation || []);
    renderOrders(data.recent_orders || []);

    renderPositions(data);
    renderPerformance(data);

    startPricePolling(data.market_clock);

  } catch (e) {
    console.error('Atlas dashboard load failed:', e);
    document.getElementById('positions-grid').innerHTML =
      '<div class="empty-state">Failed to load data — ' + e.message + '</div>';
  }
}

window.addEventListener('resize', function() {
  redrawCharts();
});

init();
</script>
