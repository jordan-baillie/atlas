<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Instrument+Serif&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0c0a;
  --bg-grain: #100f0c;
  --surface: #16140f;
  --surface-hover: #1d1a14;
  --surface-raised: #241f17;
  --border: #2e2820;
  --border-subtle: #1e1b15;

  --text: #e8e4da;
  --text-secondary: #9e9484;
  --text-tertiary: #635a4c;

  --green: #82a85a;
  --green-bright: #9ec276;
  --green-dim: rgba(130, 168, 90, 0.12);
  --red: #c4585a;
  --red-dim: rgba(196, 88, 90, 0.10);
  --amber: #c9a64e;
  --amber-dim: rgba(201, 166, 78, 0.10);
  --blue: #5a8fba;
  --blue-dim: rgba(90, 143, 186, 0.12);
  --purple: #9b7bb8;
  --purple-dim: rgba(155, 123, 184, 0.10);
  --orange: #d97757;
  --orange-dim: rgba(217, 119, 87, 0.10);
  --cyan: #5ea8a0;

  --font: 'Figtree', system-ui, -apple-system, sans-serif;
  --font-display: 'Instrument Serif', Georgia, serif;
  --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;

  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 5px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Static accent bar (no animation — zero CPU) ── */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, #c17040, #5a8fba, #738c5a, #b89545);
  z-index: 10000;
}

/* ── Cipher Drift animated background ── */
#phosphor-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
.crt-scanlines { display: none; }
.crt-vignette {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
}

/* ── Shell ── */
.shell { max-width: 1240px; margin: 0 auto; padding: 28px 20px 64px; position: relative; z-index: 1; }

/* ── Entrance animation ── */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-in {
  opacity: 0;
  animation: fadeSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

/* ── Header (sticky + blur defined in bottom section) ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  animation: fadeSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.header-left { display: flex; align-items: baseline; gap: 14px; }
.logo {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 400;
  letter-spacing: -0.3px;
  background: linear-gradient(135deg, var(--text) 40%, var(--orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.version {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--text-tertiary);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.2px;
}
.header-right { display: flex; align-items: center; gap: 12px; }
.status-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  background: rgba(22,20,15,0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  padding: 5px 14px;
  border-radius: 20px;
}
.pulse {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green-dim);
  animation: pulse 2.5s ease-in-out infinite;
}
.pulse-live {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 8px var(--red-dim);
  animation: pulse 1.5s ease-in-out infinite;
}
.pulse-paper {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 8px var(--amber-dim);
  animation: pulse 2.5s ease-in-out infinite;
}
.mode-live { color: var(--red); font-weight: 600; }
.mode-paper { color: var(--amber); font-weight: 600; }
.mode-dry { color: var(--orange); font-weight: 600; }

/* ── Market Session Countdowns ── */
.market-clocks {
  display: flex;
  align-items: center;
  gap: 6px;
}
.market-clock {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: rgba(22,20,15,0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  white-space: nowrap;
  transition: border-color 0.3s ease, background 0.3s ease;
}
.market-clock.mc-open {
  border-color: rgba(130,168,90,0.2);
  background: rgba(130,168,90,0.04);
}
.market-clock-name {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.4px;
}
.market-clock-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: background 0.3s, box-shadow 0.3s;
}
.market-clock-dot.mc-dot-open {
  background: var(--green) !important;
  box-shadow: 0 0 8px var(--green-dim) !important;
  animation: pulse 1.5s ease-in-out infinite;
}
.market-clock-time {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.3px;
  min-width: 52px;
  transition: color 0.3s;
}
.market-clock-label {
  font-family: var(--font);
  font-size: 10px;
  color: var(--text-tertiary);
  font-weight: 400;
}

@media (max-width: 1060px) {
  .market-clock { padding: 4px 10px; gap: 5px; }
  .market-clock-time { font-size: 11px; min-width: 46px; }
}
@media (max-width: 700px) {
  .market-clocks { gap: 4px; }
  .market-clock { padding: 4px 8px; gap: 4px; }
  .market-clock-time { font-size: 10px; min-width: 40px; }
  .market-clock-label { display: none; }
}
@media (max-width: 480px) {
  .market-clocks { flex-wrap: wrap; }
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--green-dim); }
  50% { opacity: 0.3; box-shadow: 0 0 2px var(--green-dim); }
}

/* ── KPI Cards ── */
.cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.card {
  background: rgba(22,20,15,0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s ease, background 0.2s ease;
  opacity: 0;
  animation: fadeSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  cursor: default;
}
.card:nth-child(1) { animation-delay: 0.06s; }
.card:nth-child(2) { animation-delay: 0.12s; }
.card:nth-child(3) { animation-delay: 0.18s; }
.card:nth-child(4) { animation-delay: 0.24s; }
.card:hover { border-color: rgba(90,143,186,0.15); background: rgba(22,20,15,0.9); }
.card::before { display: none; }
.card-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
}
.card-value {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -1.2px;
  line-height: 1.1;
  font-variant-numeric: tabular-nums;
}
.card-sub {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-sparkline { display: inline-flex; align-items: center; }
.up { color: var(--green); }
.down { color: var(--red); }
.flat { color: var(--text); }

/* ── Sections ── */
.section {
  background: rgba(22,20,15,0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 14px;
  overflow: hidden;
  opacity: 0;
  animation: fadeSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  animation-delay: 0.3s;
}
.section-head {
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
  border-radius: var(--radius) var(--radius) 0 0;
}
.section-head:hover { background: var(--surface-hover); }
.section-head:focus-visible { outline: 2px solid var(--blue); outline-offset: -2px; border-radius: var(--radius); }
.section-title {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 400;
  display: flex;
  align-items: center;
  gap: 10px;
  letter-spacing: 0.1px;
}
.section-count {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-tertiary);
  background: var(--surface-raised);
  padding: 2px 9px;
  border-radius: 20px;
}
.section-body {
  padding: 0 20px 18px;
  max-height: 3000px;
  overflow: hidden;
  opacity: 1;
  transition: max-height 0.35s cubic-bezier(0.16, 1, 0.3, 1),
              opacity 0.2s ease,
              padding 0.3s ease;
}
.section-body.collapsed {
  max-height: 0;
  opacity: 0;
  padding-top: 0;
  padding-bottom: 0;
  content-visibility: hidden;
}
.chevron {
  font-size: 11px;
  color: var(--text-tertiary);
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 6px;
}
.chevron:hover { background: var(--surface-raised); }
.chevron.down { transform: rotate(0deg); }
.chevron.right { transform: rotate(-90deg); }

/* ── Tables ── */
table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: auto; }
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -4px; padding: 0 4px; }
th {
  text-align: left;
  padding: 10px 12px;
  font-family: var(--font);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--text-tertiary);
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  cursor: pointer;
  transition: color 0.15s;
  position: relative;
}
th:hover { color: var(--text-secondary); }
th::after {
  content: '↕';
  margin-left: 4px;
  opacity: 0;
  font-size: 9px;
  transition: opacity 0.15s;
}
th:hover::after { opacity: 0.5; }
td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-subtle);
  white-space: nowrap;
  transition: background 0.1s;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(90, 143, 186, 0.04); }
tr { transition: background 0.1s ease; }
.mono { font-family: var(--mono); font-size: 12px; font-variant-numeric: tabular-nums; }

/* ── Strategy badges ── */
.strat {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: var(--radius-xs);
  font-family: var(--font);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.strat-trend_following { background: var(--blue-dim); color: var(--blue); }
.strat-mean_reversion { background: var(--purple-dim); color: var(--purple); }
.strat-opening_gap { background: var(--green-dim); color: var(--green); }
.strat-momentum_breakout { background: var(--orange-dim); color: var(--orange); }
.strat-short_term_mr { background: var(--cyan); background: rgba(94,168,160,0.12); color: var(--cyan); }
.strat-manual { background: rgba(99,90,76,0.15); color: var(--text-tertiary); }

/* ── Market badges ── */
.market-tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 7px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.market-sp500 { background: var(--blue-dim); color: var(--blue); }
.market-asx { background: var(--purple-dim); color: var(--purple); }

/* ── Status badges (clean order statuses) ── */
.order-status {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: var(--radius-xs);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.order-filled { background: var(--green-dim); color: var(--green); }
.order-partial { background: var(--amber-dim); color: var(--amber); }
.order-pending { background: var(--blue-dim); color: var(--blue); }
.order-failed { background: var(--red-dim); color: var(--red); }
.order-cancelled { background: rgba(99,90,76,0.15); color: var(--text-tertiary); }

/* ── Tab navigation ── */
.tab-nav {
  display: flex; gap: 2px; margin-bottom: 20px;
  background: rgba(22,20,15,0.6); border-radius: var(--radius); padding: 4px;
  border: 1px solid var(--border-subtle);
  width: fit-content;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.tab-btn {
  padding: 9px 22px; border: none; background: none; cursor: pointer;
  font-family: var(--font); font-size: 13px; font-weight: 600;
  color: var(--text-tertiary); border-radius: var(--radius-sm);
  transition: color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
  letter-spacing: 0.2px;
  display: flex; align-items: center; gap: 8px;
}
.tab-btn:hover { color: var(--text-secondary); background: var(--surface-hover); }
.tab-btn.active { color: var(--text); background: var(--surface-raised); box-shadow: 0 1px 4px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.03); }
.tab-btn .tab-icon { width: 16px; height: 16px; flex-shrink: 0; }
.tab-btn .tab-badge {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  padding: 1px 6px; border-radius: 10px;
  background: var(--border); color: var(--text-secondary);
}
.tab-btn.active .tab-badge { background: var(--blue-dim); color: var(--blue); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── Research pipeline ── */
.research-hero {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px;
}
@media (max-width: 700px) { .research-hero { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 480px) { .research-hero { grid-template-columns: repeat(2, 1fr); } }
.research-card {
  background: rgba(22,20,15,0.6); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm); padding: 16px 14px; text-align: center;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  transition: border-color 0.15s ease;
}
.research-card:hover { border-color: var(--border); }
.research-card-value { font-family: var(--mono); font-size: 28px; font-weight: 800; line-height: 1.1; }
.research-card-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-tertiary); margin-top: 4px; }
.research-card-sub { font-family: var(--mono); font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
.research-progress { margin-bottom: 24px; }
.research-progress-header { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-tertiary); margin-bottom: 6px; }
.queue-bar { display: flex; height: 10px; border-radius: 5px; overflow: hidden; background: var(--surface); border: 1px solid var(--border-subtle); }
.queue-bar > div { height: 100%; transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
.queue-bar .bar-pass { background: var(--green); box-shadow: inset 0 1px 0 rgba(255,255,255,0.15); }
.queue-bar .bar-fail { background: var(--red); box-shadow: inset 0 1px 0 rgba(255,255,255,0.15); }
.queue-bar .bar-defer { background: var(--amber); box-shadow: inset 0 1px 0 rgba(255,255,255,0.15); }
.queue-bar .bar-queued { background: var(--text-tertiary); opacity: 0.3; }
.queue-legend { display: flex; gap: 14px; font-size: 10px; color: var(--text-tertiary); margin-top: 6px; }
.queue-legend span { display: flex; align-items: center; gap: 4px; }
.queue-legend .dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }
.research-badge {
  display: inline-flex; align-items: center; padding: 2px 8px;
  border-radius: var(--radius-xs); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
}
.badge-pass { background: var(--green-dim); color: var(--green); }
/* ── Daily insight chart ── */
.insight-section { border-color: var(--border); }
.insight-spark {
  display: inline-block; margin-right: 4px; vertical-align: middle;
  color: var(--green);
  opacity: 0.8;
}
.insight-card {
  background: rgba(22,20,15,0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 24px 28px;
  position: relative;
  overflow: hidden;
}
.insight-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--green), var(--blue));
  opacity: 0.6;
}
.insight-header {
  margin-bottom: 20px;
}
.insight-title {
  font-family: var(--font);
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 4px;
}
.insight-subtitle {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.3px;
}
.insight-chart-area {
  position: relative;
  width: 100%;
}
.insight-annotation {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: var(--radius-xs);
  margin-top: 16px;
}
.insight-annotation.green { background: var(--green-dim); color: var(--green-bright); }
.insight-annotation.red { background: var(--red-dim); color: var(--red); }
.insight-annotation.amber { background: var(--amber-dim); color: var(--amber); }
.insight-date {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-tertiary);
  text-align: right;
  margin-top: 12px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
/* SVG chart styles */
.insight-chart-area svg { width: 100%; display: block; }
.insight-chart-area svg text {
  font-family: 'Figtree', system-ui, sans-serif;
  fill: currentColor;
}

.badge-fail { background: var(--red-dim); color: var(--red); }
.badge-partial { background: var(--amber-dim); color: var(--amber); }
.badge-queued { background: rgba(99,90,76,0.15); color: var(--text-tertiary); }
.badge-deferred { background: var(--amber-dim); color: var(--amber); }
.badge-promoted { background: var(--green-dim); color: var(--green-bright); }
.badge-running { background: var(--blue-dim); color: var(--blue); }
.pri-p1 { color: var(--red); } .pri-p2 { color: var(--amber); }
.pri-p3 { color: var(--blue); } .pri-p4 { color: var(--text-tertiary); } .pri-p5 { color: var(--text-tertiary); }

/* ── P&L Breakdown ── */
.pnl-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
}
.pnl-item {
  padding: 14px 16px;
  border-right: 1px solid var(--border);
  transition: background 0.15s;
}
.pnl-item:last-child { border-right: none; }
.pnl-item:hover { background: var(--surface-hover); }
.pnl-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 6px;
}
.pnl-value {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.5px;
}
.pnl-sub {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 4px;
}

/* ── Two-column layout ── */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}
.two-col > .section { margin-bottom: 0; }

/* ── Plan entries ── */
.plan-entry {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-subtle);
  font-size: 13px;
}
.plan-entry:last-child { border-bottom: none; }
.plan-ticker {
  font-family: var(--mono);
  font-weight: 600;
  min-width: 72px;
  font-size: 13px;
}
.plan-detail { color: var(--text-secondary); font-size: 12px; }
.plan-badge {
  font-family: var(--font);
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.plan-badge.approved { background: var(--green-dim); color: var(--green); }
.plan-badge.pending { background: var(--amber-dim); color: var(--amber); }
.plan-badge.executed { background: var(--blue-dim); color: var(--blue); }

/* ── Metrics grid ── */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
}
.metric {
  padding: 12px 16px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.metric:nth-child(4n) { border-right: none; }
.metric:nth-last-child(-n+4) { border-bottom: none; }
.metric:hover { background: var(--surface-hover); }
.metric-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.metric-value {
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

/* ── Tasks ── */
.task-columns {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.task-col-head {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--text-secondary);
  padding-bottom: 10px;
  margin-bottom: 10px;
  border-bottom: 2px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.task-col-head .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-upcoming { background: var(--amber); box-shadow: 0 0 6px var(--amber-dim); }
.dot-active { background: var(--blue); box-shadow: 0 0 6px var(--blue-dim); }
.dot-done { background: var(--green); box-shadow: 0 0 6px var(--green-dim); }
.task-item {
  padding: 10px 12px;
  margin-bottom: 6px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  line-height: 1.55;
  background: var(--surface-hover);
  border: 1px solid transparent;
  transition: border-color 0.15s, background 0.15s;
}
.task-item:hover { border-color: var(--border); background: var(--surface-raised); }
.task-item.done {
  color: var(--text-tertiary);
  text-decoration: line-through;
  text-decoration-color: rgba(99, 90, 76, 0.4);
}
.task-empty {
  color: var(--text-tertiary);
  font-size: 12px;
  font-style: italic;
  padding: 10px 12px;
}

.empty {
  text-align: center;
  padding: 28px;
  color: var(--text-tertiary);
  font-size: 13px;
  font-style: italic;
}

/* ── Exposure Bar ── */
.exposure-bar {
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 8px;
}
.exposure-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--green), var(--blue));
  transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 0 8px rgba(130,168,90,0.3);
}

/* ── Strategy breakdown ── */
.strat-breakdown {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.strat-breakdown-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 10px;
}
.strat-breakdown-items { display: flex; gap: 18px; flex-wrap: wrap; }
.strat-breakdown-item { display: flex; align-items: center; gap: 8px; }

/* ── Chart ── */
.chart-ranges { display: flex; gap: 4px; padding: 0 0 10px; }
.chart-range-btn {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  letter-spacing: 0.3px;
}
.chart-range-btn:hover { border-color: var(--text-secondary); color: var(--text-secondary); background: var(--surface-hover); }
.chart-range-btn.active { background: rgba(130,168,90,0.08); border-color: var(--green); color: var(--green); }
.chart-wrap { position: relative; cursor: crosshair; }
.chart-wrap canvas { display: block; width: 100%; }
.eq-crosshair {
  position: absolute; top: 0; width: 1px;
  background: rgba(232,228,218,0.15);
  pointer-events: none; display: none; z-index: 2;
}
.eq-tooltip {
  position: absolute; top: 10px;
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  pointer-events: none; display: none; z-index: 3;
  min-width: 180px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.eq-tooltip-date {
  font-family: var(--mono); font-size: 11px; color: var(--text-secondary);
  margin-bottom: 6px; padding-bottom: 5px; border-bottom: 1px solid var(--border);
}
.eq-tooltip-row {
  display: flex; justify-content: space-between; align-items: center; padding: 2px 0;
}
.eq-tooltip-label { color: var(--text-tertiary); font-size: 11px; }
.eq-tooltip-val { font-family: var(--mono); font-weight: 600; font-size: 12px; }
.chart-legend {
  display: flex; gap: 16px; padding: 0 0 6px; align-items: center;
}
.chart-legend-item {
  display: flex; align-items: center; gap: 5px; font-size: 10px;
  color: var(--text-tertiary); letter-spacing: 0.2px;
}
.chart-legend-swatch {
  width: 14px; height: 3px; border-radius: 2px;
}

/* ── Halted banner ── */
.halted-banner {
  background: var(--red-dim);
  border: 1px solid rgba(196, 88, 90, 0.25);
  border-radius: var(--radius);
  padding: 12px 20px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  font-weight: 600;
  color: var(--red);
  animation: fadeSlideUp 0.4s ease forwards;
}

/* ── Responsive ── */
@media (max-width: 1060px) {
  .cards { grid-template-columns: repeat(2, 1fr); }
  .two-col { grid-template-columns: 1fr; }
  .metrics-grid { grid-template-columns: repeat(3, 1fr); }
  .metric:nth-child(4n) { border-right: 1px solid var(--border); }
  .metric:nth-child(3n) { border-right: none; }
}
@media (max-width: 700px) {
  .shell { padding: 20px 14px 48px; }
  .cards { grid-template-columns: repeat(2, 1fr); }
  .task-columns { grid-template-columns: 1fr; }
  .pnl-grid { grid-template-columns: repeat(2, 1fr); }
  .pnl-item:nth-child(2) { border-right: none; }
  .pnl-item:nth-child(1), .pnl-item:nth-child(2) { border-bottom: 1px solid var(--border); }
  .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  .metric:nth-child(3n) { border-right: 1px solid var(--border); }
  .metric:nth-child(2n) { border-right: none; }
  .card-value { font-size: 22px; }
  .logo { font-size: 24px; }
}
@media (max-width: 480px) {
  .cards { grid-template-columns: 1fr; }
  .header { flex-direction: column; align-items: flex-start; gap: 10px; }
  .card-value { font-size: 22px; }
}

/* ── Accessibility: reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .pulse, .pulse-live, .pulse-paper { animation: none; opacity: 1; }
  #phosphor-bg, .crt-scanlines, .crt-vignette { display: none; }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 600px 400px at 15% 10%, rgba(90,143,186,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 500px 500px at 85% 20%, rgba(155,123,184,0.05) 0%, transparent 70%),
      radial-gradient(ellipse 400px 300px at 50% 80%, rgba(130,168,90,0.04) 0%, transparent 70%);
  }
}

/* ── Focus visible for keyboard nav ── */
.tab-btn:focus-visible,
.chart-range-btn:focus-visible {
  outline: 2px solid var(--blue);
  outline-offset: 2px;
}

/* ── Sticky header with backdrop blur ── */
.header {
  position: sticky;
  top: 2px;
  z-index: 100;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: rgba(13,12,10,0.75);
  border-radius: var(--radius);
  padding: 12px 20px;
  margin: 0 -4px 28px;
  border: 1px solid var(--border-subtle);
}

/* ── Card inner glow on positive P&L ── */
.card.accent-green { background: linear-gradient(135deg, var(--surface), rgba(130,168,90,0.03)); }
.card.accent-red { background: linear-gradient(135deg, var(--surface), rgba(196,88,90,0.03)); }

/* ── Table sticky header ── */
.table-scroll { max-height: 600px; overflow-y: auto; }
.table-scroll thead { position: sticky; top: 0; z-index: 1; background: var(--surface); }

/* ── Sortable column indicator ── */
th[onclick] { cursor: pointer; }

/* ── Smooth scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }
</style>
