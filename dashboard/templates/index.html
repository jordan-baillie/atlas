<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a" id="meta-theme">
<title>Atlas Dashboard</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="atlas.css">
</head>
<body>
<div id="app">

  <!-- ── Header ── -->
  <header class="header">
    <div class="logo">Atlas</div>
    <div class="header-right">
      <div class="market-clocks" id="market-clocks"></div>
      <button class="theme-btn" id="theme-btn" title="Toggle theme (L)">◑</button>
    </div>
  </header>

  <!-- ── Summary Strip ── -->
  <div class="summary-strip" id="summary-strip">
    <div class="stat">
      <div class="stat-label">Portfolio</div>
      <div class="stat-value" id="stat-equity">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Today</div>
      <div class="stat-value" id="stat-today">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Positions</div>
      <div class="stat-value" id="stat-positions">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Win Rate</div>
      <div class="stat-value" id="stat-winrate">—</div>
    </div>
  </div>

  <!-- ── Equity Chart ── -->
  <div class="chart-section">
    <div class="chart-header">
      <span class="chart-title">Equity Curve</span>
      <span class="return-badge" id="return-badge">+0.00%</span>
    </div>
    <canvas id="equity-canvas"></canvas>
    <div class="chart-tooltip" id="chart-tooltip"></div>
  </div>

  <!-- ── Positions Grid ── -->
  <div class="section-title" id="positions-label">Open Positions</div>
  <div class="positions-grid" id="positions-grid"></div>

</div>
<script>
'use strict';

// ── Strategy colour map ──────────────────────────────────────
var STRATEGY_COLORS = {
  momentum_breakout: '#fb923c',
  mean_reversion:    '#60a5fa',
  trend_following:   '#4ade80',
  opening_gap:       '#fbbf24',
  sector_rotation:   '#c084fc',
  short_term_mr:     '#22d3ee',
  connors_rsi2:      '#fb7185',
  manual:            '#9ca3af'
};

// ── Theme ────────────────────────────────────────────────────
var THEMES = ['dark', 'light', 'auto'];
var currentTheme = localStorage.getItem('atlas-theme') || 'auto';

function applyTheme(t) {
  currentTheme = t;
  var eff = t === 'auto'
    ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
    : t;
  document.documentElement.setAttribute('data-theme', eff);
  document.getElementById('meta-theme').content = eff === 'light' ? '#fafafa' : '#0a0a0a';
  localStorage.setItem('atlas-theme', t);
}

document.getElementById('theme-btn').onclick = function() {
  var idx = (THEMES.indexOf(currentTheme) + 1) % THEMES.length;
  applyTheme(THEMES[idx]);
  if (window._chartData) drawChart(window._chartData);
};

document.addEventListener('keydown', function(e) {
  if (e.key === 'l' || e.key === 'L') {
    var idx = (THEMES.indexOf(currentTheme) + 1) % THEMES.length;
    applyTheme(THEMES[idx]);
    if (window._chartData) drawChart(window._chartData);
  }
});

applyTheme(currentTheme);

// ── Formatting ───────────────────────────────────────────────
function fmtNum(v, dec) {
  if (v == null || isNaN(v)) return '—';
  return v.toLocaleString(undefined, {
    minimumFractionDigits: dec != null ? dec : 2,
    maximumFractionDigits: dec != null ? dec : 2
  });
}

function fmtCcy(v, ccy) {
  if (v == null || isNaN(v)) return '—';
  var sym = (ccy || '').toUpperCase() === 'AUD' ? 'A$' : '$';
  return sym + fmtNum(Math.abs(v));
}

function fmtPct(v) {
  if (v == null || isNaN(v)) return '—';
  return (v >= 0 ? '+' : '-') + Math.abs(v).toFixed(2) + '%';
}

function pnlClass(v) { return v > 0 ? 'green' : v < 0 ? 'red' : ''; }

// ── Market Clocks ────────────────────────────────────────────
var MARKETS = [
  { id: 'asx',  name: 'ASX',  tz: 'Australia/Sydney', oh: 10, om: 0, ch: 16, cm: 0 },
  { id: 'nyse', name: 'NYSE', tz: 'America/New_York',  oh: 9,  om: 30, ch: 16, cm: 0 }
];

function wallTime(tz) {
  var parts = {};
  new Intl.DateTimeFormat('en-US', {
    timeZone: tz, hour: '2-digit', minute: '2-digit',
    second: '2-digit', hour12: false, weekday: 'short'
  }).formatToParts(new Date()).forEach(function(p) { parts[p.type] = p.value; });
  return {
    h: parseInt(parts.hour === '24' ? '0' : parts.hour),
    m: parseInt(parts.minute), s: parseInt(parts.second),
    wd: parts.weekday
  };
}

function marketState(mk) {
  var t = wallTime(mk.tz);
  var now = t.h * 3600 + t.m * 60 + t.s;
  var opn = mk.oh * 3600 + mk.om * 60;
  var cls = mk.ch * 3600 + mk.cm * 60;
  var we  = t.wd === 'Sat' || t.wd === 'Sun';
  if (we) {
    var dOff = t.wd === 'Sat' ? 2 : 1;
    return { open: false, secs: (86400 - now) + (dOff - 1) * 86400 + opn };
  }
  if (now < opn) return { open: false, secs: opn - now };
  if (now < cls) return { open: true,  secs: cls - now };
  var dOff2 = t.wd === 'Fri' ? 3 : 1;
  return { open: false, secs: (86400 - now) + (dOff2 - 1) * 86400 + opn };
}

function fmtSecs(s) {
  if (s <= 0) return '0s';
  var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  if (h >= 48) return Math.floor(h / 24) + 'd';
  if (h > 0)   return h + 'h ' + (m < 10 ? '0' : '') + m + 'm';
  return m + 'm ' + (s % 60) + 's';
}

function initClocks() {
  var el = document.getElementById('market-clocks');
  el.innerHTML = '';
  MARKETS.forEach(function(mk) {
    var div = document.createElement('div');
    div.className = 'market-clock';
    div.id = 'clock-' + mk.id;
    div.innerHTML = '<span class="clock-name">' + mk.name + '</span>' +
      '<span class="clock-dot" id="dot-' + mk.id + '"></span>' +
      '<span id="time-' + mk.id + '">—</span>';
    el.appendChild(div);
  });
  tickClocks();
  setInterval(tickClocks, 1000);
}

function tickClocks() {
  MARKETS.forEach(function(mk) {
    var st = marketState(mk);
    var timeEl = document.getElementById('time-' + mk.id);
    var dotEl  = document.getElementById('dot-' + mk.id);
    if (!timeEl) return;
    timeEl.textContent = fmtSecs(st.secs);
    dotEl.className = 'clock-dot' + (st.open ? ' open' : '');
  });
}

// ── Sparkline SVG ────────────────────────────────────────────
function sparkline(pnlPct) {
  // Deterministic but visually interesting 8-point polyline.
  // Seeded from pnl sign + magnitude — no actual price history needed.
  var pts = [];
  var seed = Math.abs(pnlPct || 0);
  var trend = pnlPct >= 0 ? 1 : -1;
  var w = 100, h = 32, n = 8;
  // Generate y-values: noisy trend
  var base = trend > 0 ? 20 : 12;
  for (var i = 0; i < n; i++) {
    var noise = ((seed * (i + 1) * 1.37) % 6) - 3;
    var y = base + trend * (i / (n - 1)) * 14 + noise;
    y = Math.max(2, Math.min(h - 2, y));
    pts.push([(i / (n - 1)) * w, y]);
  }
  var d = pts.map(function(p, i) { return (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1); }).join(' ');
  var color = pnlPct >= 0 ? 'var(--green)' : 'var(--red)';
  return '<svg viewBox="0 0 100 32" preserveAspectRatio="none" style="width:100%;height:32px">' +
    '<polyline points="' + pts.map(function(p) { return p[0].toFixed(1) + ',' + p[1].toFixed(1); }).join(' ') +
    '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
    '</svg>';
}

// ── Position Cards ───────────────────────────────────────────
function renderPositions(data) {
  var grid = document.getElementById('positions-grid');
  var label = document.getElementById('positions-label');

  // Combine all positions
  var positions = [];

  // Atlas SP500 positions
  var atlas = (data.portfolio && data.portfolio.open_positions) || [];
  atlas.forEach(function(p) {
    positions.push(Object.assign({ market: 'sp500' }, p));
  });

  // Manual USD positions (Moomoo USD)
  var manualUSD = (data.manual_portfolio && data.manual_portfolio.positions) || [];
  manualUSD.forEach(function(p) {
    positions.push(Object.assign({ market: 'usd', currency: 'USD' }, p));
  });

  // Manual AUD positions (ASX)
  var manualASX = [];
  if (data.markets && data.markets.asx && data.markets.asx.manual_positions) {
    manualASX = data.markets.asx.manual_positions.positions || [];
  }
  manualASX.forEach(function(p) {
    positions.push(Object.assign({ market: 'asx' }, p));
  });

  // Sort by absolute P&L descending
  positions.sort(function(a, b) { return Math.abs(b.pnl || 0) - Math.abs(a.pnl || 0); });

  label.textContent = 'Open Positions (' + positions.length + ')';

  if (!positions.length) {
    var strategies = 7;
    grid.innerHTML = '<div class="empty-state">Waiting for signals — ' +
      strategies + ' strategies active</div>';
    return;
  }

  grid.innerHTML = positions.map(function(p) {
    var pnl      = p.pnl || 0;
    var pnlPct   = p.pnl_pct || 0;
    var isPos    = pnl >= 0;
    var mktLabel = p.market === 'asx' ? 'ASX' : (p.market === 'sp500' ? 'SP500' : 'USD');
    var ccy      = (p.currency && p.currency.toUpperCase() === 'AUD') ? 'AUD' : 'USD';
    var strat    = p.strategy || 'manual';
    var stratColor = STRATEGY_COLORS[strat] || '#9ca3af';

    return '<div class="pos-card' + (isPos ? '' : ' negative') + '" ' +
      'data-ticker="' + (p.ticker || '') + '" ' +
      'data-entry="' + (p.entry_price || 0) + '" ' +
      'data-shares="' + (p.shares || 0) + '">' +
      '<div class="card-top">' +
        '<span class="card-ticker">' + (p.ticker || '—') + '</span>' +
        '<span class="market-pill">' + mktLabel + '</span>' +
      '</div>' +
      '<span class="strategy-pill" style="background:' + stratColor + '22;color:' + stratColor + ';border:1px solid ' + stratColor + '44">' + strat + '</span>' +
      '<div class="card-prices">' +
        '<span><span class="label">Entry</span><span class="val">' + fmtCcy(p.entry_price, ccy) + '</span></span>' +
        '<span><span class="label">Now</span>' +
          '<span class="val live-price" data-ticker="' + (p.ticker || '') + '">' + fmtCcy(p.current_price, ccy) + '</span>' +
        '</span>' +
        (p.stop_price ? '<span><span class="label">Stop</span><span class="val">' + fmtCcy(p.stop_price, ccy) + '</span></span>' : '') +
      '</div>' +
      '<div class="card-pnl ' + pnlClass(pnl) + '">' +
        (isPos ? '+' : '') + fmtCcy(pnl, ccy) +
        ' <span style="font-size:12px;opacity:0.8">(' + fmtPct(pnlPct) + ')</span>' +
      '</div>' +
      '<div class="card-meta">' +
        (p.days_held != null ? p.days_held + 'd held' : '') +
        (p.sector && p.sector !== 'Unknown' ? ' · ' + p.sector : '') +
      '</div>' +
      '<div class="sparkline">' + sparkline(pnlPct) + '</div>' +
    '</div>';
  }).join('');
}

// ── Summary Strip ────────────────────────────────────────────
function renderSummary(data) {
  var acct  = data.account || {};
  var port  = data.portfolio || {};
  var risk  = data.risk || {};
  var ccy   = acct.currency || 'AUD';

  // Equity
  var eq    = acct.equity;
  var eqEl  = document.getElementById('stat-equity');
  eqEl.textContent = fmtCcy(eq, ccy);
  if (risk.halted) {
    var dot = document.createElement('span');
    dot.className = 'halted-dot';
    dot.title = 'Trading halted';
    eqEl.appendChild(dot);
  }

  // Today P&L
  var today = port.today_pnl_aud != null ? port.today_pnl_aud : 0;
  var todEl = document.getElementById('stat-today');
  todEl.textContent = (today >= 0 ? '+' : '') + fmtCcy(today, 'AUD');
  todEl.className   = 'stat-value ' + pnlClass(today);

  // Total positions (all markets)
  var atlas    = (port.open_positions || []).length;
  var manUSD   = ((data.manual_portfolio || {}).positions || []).length;
  var manASX   = (((data.markets || {}).asx || {}).manual_positions || {}).positions;
  var manASXn  = manASX ? manASX.length : 0;
  document.getElementById('stat-positions').textContent = atlas + manUSD + manASXn;

  // Win rate
  var wr = port.win_rate;
  document.getElementById('stat-winrate').textContent =
    (wr != null && wr > 0) ? wr.toFixed(0) + '%' : '—';
}

// ── Equity Chart ─────────────────────────────────────────────
function drawChart(curve) {
  window._chartData = curve;
  var canvas = document.getElementById('equity-canvas');
  if (!canvas || !curve || !curve.length) return;

  var dpr = window.devicePixelRatio || 1;
  var w   = canvas.offsetWidth;
  var h   = 200;
  canvas.width  = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';

  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  var isDark = document.documentElement.getAttribute('data-theme') !== 'light';
  var lineColor = isDark ? '#4ade80' : '#16a34a';

  var vals  = curve.map(function(d) { return d.equity; });
  var dates = curve.map(function(d) { return d.date; });
  var minV  = Math.min.apply(null, vals);
  var maxV  = Math.max.apply(null, vals);
  var range = maxV - minV || 1;

  var pad = { t: 10, r: 10, b: 36, l: 60 };
  var cw  = w - pad.l - pad.r;
  var ch  = h - pad.t - pad.b;

  function xOf(i) { return pad.l + (curve.length === 1 ? cw / 2 : (i / (curve.length - 1)) * cw); }
  function yOf(v) { return pad.t + ch - ((v - minV) / range) * ch; }

  ctx.clearRect(0, 0, w, h);

  // Y-axis labels (3-4 values)
  ctx.fillStyle = isDark ? '#71717a' : '#71717a';
  ctx.font = '11px JetBrains Mono, monospace';
  ctx.textAlign = 'right';
  var ySteps = 3;
  for (var yi = 0; yi <= ySteps; yi++) {
    var yv = minV + (yi / ySteps) * range;
    var yp = yOf(yv);
    ctx.fillText('$' + Math.round(yv).toLocaleString(), pad.l - 6, yp + 4);
    ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.l, yp); ctx.lineTo(pad.l + cw, yp); ctx.stroke();
  }

  // X-axis date labels (~5 evenly spaced)
  ctx.textAlign = 'center';
  var xCount = Math.min(6, curve.length);
  var step   = Math.floor((curve.length - 1) / Math.max(xCount - 1, 1));
  for (var xi = 0; xi < curve.length; xi += step) {
    var xp = xOf(xi);
    var dl = dates[xi] || '';
    var parts = dl.split('-');
    var label = parts.length === 3 ? parts[1] + '/' + parts[2] : dl;
    ctx.fillStyle = isDark ? '#71717a' : '#71717a';
    ctx.fillText(label, xp, h - 8);
  }

  if (curve.length === 0) return;

  // Gradient fill
  var grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + ch);
  grad.addColorStop(0, isDark ? 'rgba(74,222,128,0.18)' : 'rgba(22,163,74,0.12)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');

  // Draw path
  ctx.beginPath();
  if (curve.length === 1) {
    // Single dot
    ctx.arc(xOf(0), yOf(vals[0]), 4, 0, Math.PI * 2);
    ctx.fillStyle = lineColor;
    ctx.fill();
    return;
  }

  ctx.moveTo(xOf(0), yOf(vals[0]));
  for (var i = 1; i < curve.length; i++) {
    ctx.lineTo(xOf(i), yOf(vals[i]));
  }

  // Fill
  ctx.lineTo(xOf(curve.length - 1), pad.t + ch);
  ctx.lineTo(xOf(0), pad.t + ch);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line (animate draw-in on first render)
  ctx.beginPath();
  ctx.moveTo(xOf(0), yOf(vals[0]));
  for (var j = 1; j < curve.length; j++) {
    ctx.lineTo(xOf(j), yOf(vals[j]));
  }
  ctx.strokeStyle = lineColor;
  ctx.lineWidth   = 2;
  ctx.lineJoin    = 'round';
  ctx.lineCap     = 'round';
  ctx.stroke();

  // Store layout for hover
  canvas._chart = { pad: pad, cw: cw, ch: ch, vals: vals, dates: dates, minV: minV, range: range, curve: curve };
}

// Chart hover tooltip
(function() {
  var canvas  = document.getElementById('equity-canvas');
  var tooltip = document.getElementById('chart-tooltip');
  var animDone = false;

  function onMove(e) {
    if (!canvas._chart) return;
    var c  = canvas._chart;
    var rect = canvas.getBoundingClientRect();
    var mx   = e.clientX - rect.left;
    var n    = c.curve.length;
    if (n < 2) return;
    var idx = Math.round((mx - c.pad.l) / c.cw * (n - 1));
    idx = Math.max(0, Math.min(n - 1, idx));
    var val  = c.curve[idx].equity;
    var date = c.curve[idx].date || '';
    tooltip.style.opacity  = '1';
    tooltip.style.left     = (mx + 12) + 'px';
    tooltip.style.top      = '40px';
    tooltip.textContent    = date + '  $' + Math.round(val).toLocaleString();
  }

  function onLeave() { tooltip.style.opacity = '0'; }

  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseleave', onLeave);

  // Draw-in animation on first load
  window._animateChart = function(curve) {
    if (animDone) { drawChart(curve); return; }
    animDone = true;
    var progress = 0;
    var start = null;
    var dur = 500;
    function step(ts) {
      if (!start) start = ts;
      progress = Math.min((ts - start) / dur, 1);
      var partial = curve.slice(0, Math.max(1, Math.round(progress * curve.length)));
      drawChart(partial);
      if (progress < 1) requestAnimationFrame(step);
      else drawChart(curve);
    }
    requestAnimationFrame(step);
  };
})();

// ── Return Badge ─────────────────────────────────────────────
function renderReturnBadge(data) {
  var curve = data.equity_curve || [];
  if (!curve.length) return;
  var first = curve[0].equity;
  var last  = curve[curve.length - 1].equity;
  if (!first) return;
  var retPct = ((last - first) / first) * 100;
  var badge  = document.getElementById('return-badge');
  badge.textContent = fmtPct(retPct);
  badge.className   = 'return-badge' + (retPct < 0 ? ' negative' : '');
}

// ── Live Price Updates ───────────────────────────────────────
var POLL_INTERVAL = 15000;
var _pollTimer    = null;
var _marketData   = null;

function isAnyMarketOpen() {
  return MARKETS.some(function(mk) { return marketState(mk).open; });
}

function flashCard(card, isPositive) {
  card.classList.add(isPositive ? 'flash-pos' : 'flash-neg');
  setTimeout(function() {
    card.classList.remove('flash-pos', 'flash-neg');
  }, 300);
}

function applyPrices(quotes) {
  var cards = document.querySelectorAll('#positions-grid .pos-card');
  cards.forEach(function(card) {
    var ticker = card.getAttribute('data-ticker');
    if (!ticker || !quotes[ticker]) return;
    var q = quotes[ticker];
    if (!q.price) return;

    // Update displayed price only (no P&L recalculation)
    var priceEl = card.querySelector('.live-price[data-ticker="' + ticker + '"]');
    if (priceEl) {
      // Determine currency from data-entry context (assume USD for US stocks, AUD for .AX)
      var ccy = ticker.endsWith('.AX') ? 'AUD' : 'USD';
      priceEl.textContent = fmtCcy(q.price, ccy);
      flashCard(card, (q.change_pct || 0) >= 0);
    }
  });
}

function startPricePolling() {
  if (_pollTimer) return;
  function poll() {
    if (!isAnyMarketOpen()) return;
    fetch('/api/prices?t=' + Date.now(), { credentials: 'same-origin' })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(quotes) { if (quotes) applyPrices(quotes); })
      .catch(function() {});
  }
  _pollTimer = setInterval(poll, POLL_INTERVAL);
}

// ── Main Init ────────────────────────────────────────────────
async function init() {
  try {
    var resp = await fetch('/data/dashboard-data.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();
    _marketData = data;

    renderSummary(data);
    renderReturnBadge(data);

    var curve = data.equity_curve || [];
    window._animateChart(curve);

    renderPositions(data);
    initClocks();
    startPricePolling();

  } catch (e) {
    console.error('Atlas dashboard load failed:', e);
    document.getElementById('positions-grid').innerHTML =
      '<div class="empty-state">Failed to load data — ' + e.message + '</div>';
  }
}

window.addEventListener('resize', function() {
  if (window._chartData) drawChart(window._chartData);
});

init();
</script>
</body>
</html>
