<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas-ASX Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
:root {
  --bg:#0d1117; --card:#161b22; --card-border:#30363d;
  --text:#e6edf3; --text-dim:#8b949e; --accent:#58a6ff;
  --green:#3fb950; --red:#f85149; --yellow:#d29922;
  --orange:#db6d28; --purple:#bc8cff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:16px}

/* Loading bar */
.loading-bar{position:fixed;top:0;left:0;width:100%;height:3px;z-index:9999;background:transparent}
.loading-bar.active{background:linear-gradient(90deg,var(--accent),var(--green),var(--accent));background-size:200% 100%;animation:loadSlide 1.5s linear infinite}
.loading-bar.done{background:var(--green);animation:loadFade 0.5s forwards}
@keyframes loadSlide{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes loadFade{to{opacity:0}}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;transform:translateX(120%);transition:transform 0.3s;max-width:400px}
.toast.show{transform:translateX(0)}
.toast.error{background:#f8514922;border:1px solid var(--red);color:var(--red)}
.toast.success{background:#3fb95022;border:1px solid var(--green);color:var(--green)}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:var(--card);border:1px solid var(--card-border);border-radius:12px;margin-bottom:12px;flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:16px}
.logo{font-size:24px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:12px;color:var(--text-dim);font-weight:400}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase}
.badge-version{background:rgba(88,166,255,0.15);color:var(--accent)}
.badge-status{background:rgba(63,185,80,0.15);color:var(--green)}
.badge-pending{background:rgba(210,153,34,0.15);color:var(--yellow)}
.badge-rejected{background:rgba(248,81,73,0.15);color:var(--red)}
.header-right{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text-dim)}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* Status Bar */
.status-bar{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:10px 20px;background:var(--card);border:1px solid var(--card-border);border-radius:10px;margin-bottom:16px;font-size:12px;color:var(--text-dim)}
.status-item{display:flex;align-items:center;gap:6px;padding:2px 0}
.status-label{color:var(--text-dim)}
.status-value{color:var(--text);font-weight:600}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.status-dot.green{background:var(--green)} .status-dot.yellow{background:var(--yellow)} .status-dot.red{background:var(--red)}
.status-separator{width:1px;height:20px;background:var(--card-border)}
.btn-refresh{background:rgba(88,166,255,0.12);color:var(--accent);border:1px solid rgba(88,166,255,0.3);border-radius:6px;padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-left:auto}
.btn-refresh:hover{background:rgba(88,166,255,0.25)}
.btn-refresh.loading{opacity:0.6;pointer-events:none}
.countdown{font-size:11px;color:var(--text-dim);margin-right:4px;min-width:28px;text-align:right}

/* Summary Cards */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:20px;transition:border-color 0.3s,box-shadow 0.3s}
.card-label{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.card-value{font-size:28px;font-weight:700;transition:color 0.3s}
.card-sub{font-size:13px;margin-top:4px;color:var(--text-dim)}
.card-value.green{color:var(--green)} .card-value.red{color:var(--red)} .card-value.neutral{color:var(--text)}
@keyframes cardFlash{0%{border-color:var(--accent);box-shadow:0 0 8px rgba(88,166,255,0.3)}100%{border-color:var(--card-border);box-shadow:none}}
.card.flash{animation:cardFlash 1.2s ease-out}

/* P&L Breakdown */
.pnl-breakdown{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:20px;margin-bottom:16px}
.pnl-breakdown-title{font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.pnl-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(48,54,61,0.5)}
.pnl-row:last-child{border-bottom:none}
.pnl-row-label{font-size:14px;color:var(--text-dim);display:flex;align-items:center;gap:8px}
.pnl-row-value{font-size:18px;font-weight:700}
.pnl-row-sub{font-size:12px;color:var(--text-dim);margin-left:8px;font-weight:400}
.pnl-row.total{padding-top:14px;margin-top:4px;border-top:2px solid var(--card-border)}
.pnl-row.total .pnl-row-label{color:var(--text);font-weight:600}
.pnl-row.total .pnl-row-value{font-size:22px}
.pnl-info{margin-top:12px;padding:10px 14px;background:rgba(88,166,255,0.06);border:1px solid rgba(88,166,255,0.15);border-radius:8px;font-size:12px;color:var(--text-dim);line-height:1.6}

/* Sections */
.section{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:24px;margin-bottom:16px}
.section-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.section-title{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.section-title .icon{font-size:18px}
.section-chevron{font-size:18px;color:var(--text-dim);transition:transform 0.3s;padding:4px 8px;line-height:1}
.section-chevron.collapsed{transform:rotate(-90deg)}
.section-body{overflow:hidden;transition:max-height 0.4s ease,opacity 0.3s ease}
.section-body.collapsed{max-height:0 !important;opacity:0;padding-top:0}
.section-body.expanded{opacity:1;padding-top:16px}

/* Tables */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;border-bottom:1px solid var(--card-border);color:var(--text-dim);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
th.sortable{cursor:pointer;user-select:none;position:relative;padding-right:20px}
th.sortable:hover{color:var(--accent)}
th.sortable .sort-icon{position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:10px;opacity:0.4}
th.sortable.asc .sort-icon,th.sortable.desc .sort-icon{opacity:1;color:var(--accent)}
td{padding:10px 12px;border-bottom:1px solid rgba(48,54,61,0.5);white-space:nowrap}
tr:hover{background:rgba(88,166,255,0.04)}
.pnl-pos{color:var(--green);font-weight:600} .pnl-neg{color:var(--red);font-weight:600}

/* Strategy Badges */
.strat-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.strat-badge.trend_following{background:rgba(88,166,255,0.15);color:var(--accent)}
.strat-badge.mean_reversion{background:rgba(188,140,255,0.15);color:var(--purple)}
.strat-badge.momentum_breakout{background:rgba(219,109,40,0.15);color:var(--orange)}
.strat-badge.opening_gap{background:rgba(63,185,80,0.15);color:var(--green)}

/* Confidence Bar */
.conf-bar{width:60px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;display:inline-block;vertical-align:middle;margin-left:6px}
.conf-fill{height:100%;border-radius:3px;background:var(--accent)}

/* Charts */
.chart-row{display:flex;gap:16px;align-items:stretch}
.chart-equity{flex:0 0 65%;min-width:0} .chart-donut{flex:0 0 35%;min-width:0;display:flex;flex-direction:column}
.chart-donut-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.chart-wrap{position:relative;height:340px;width:100%}
.chart-wrap-dd{position:relative;height:80px;width:100%}
.chart-toggle{background:transparent;border:1px solid var(--card-border);color:var(--text-dim);padding:3px 10px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s}
.chart-toggle:hover{border-color:var(--accent);color:var(--accent)}
.chart-toggle.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chart-wrap-donut{position:relative;height:260px;width:100%;flex:1}

/* Collapsible */
.collapsible-toggle{cursor:pointer;color:var(--accent);font-size:13px;background:none;border:none;padding:8px 0;display:flex;align-items:center;gap:6px}
.collapsible-toggle:hover{text-decoration:underline}
.collapsible-content{display:none;margin-top:12px} .collapsible-content.open{display:block}

/* Rationale toggle */
.rationale-toggle{cursor:pointer;color:var(--accent);font-size:12px;background:none;border:none;padding:0;line-height:1;transition:transform 0.2s}
.rationale-toggle.open{transform:rotate(90deg)}
.rationale-row td{padding:8px 12px 12px 36px;white-space:normal;color:var(--text-dim);font-size:12px;line-height:1.5;border-bottom:1px solid rgba(48,54,61,0.5);background:rgba(255,255,255,0.02)}

/* Risk Monitor */
.risk-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(48,54,61,0.5)}
.risk-label{font-size:13px;color:var(--text-dim);min-width:140px}
.risk-bar-wrap{flex:1;margin:0 16px;height:8px;background:rgba(255,255,255,0.08);border-radius:4px}
.risk-bar{height:100%;border-radius:4px;transition:width 0.6s ease}
.risk-value{font-size:14px;font-weight:600;min-width:80px;text-align:right}

/* Strategy Cards */
.strat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.strat-card{background:rgba(255,255,255,0.03);border:1px solid var(--card-border);border-radius:10px;padding:16px}
.strat-name{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.strat-stat{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.strat-stat-label{color:var(--text-dim)}

/* Backtest empty state */
.empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:14px}
.empty-icon{font-size:32px;margin-bottom:8px}
.bt-empty-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:12px}
.bt-empty-card{background:rgba(255,255,255,0.03);border:1px solid var(--card-border);border-radius:8px;padding:12px;text-align:center}
.bt-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;margin-bottom:4px}
.bt-value{font-size:20px;font-weight:700}
.bt-value.green{color:var(--green)} .bt-value.red{color:var(--red)} .bt-value.neutral{color:var(--text)}

/* Tooltips */
.tooltip-wrap{position:relative;cursor:help}
.tooltip-wrap:hover .tooltip-content{display:block}
.tooltip-content{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--card-border);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--text-dim);white-space:normal;min-width:250px;max-width:400px;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,0.4);line-height:1.5}

/* Animated number */
.anim-num{transition:opacity 0.15s}
.anim-num.changing{opacity:0.3}

/* Mobile */
@media(max-width:1200px){.chart-row{flex-direction:column} .chart-equity,.chart-donut{flex:1 1 100%}}
@media(max-width:900px){.cards{grid-template-columns:repeat(2,1fr)} .header{padding:12px 16px}}
@media(max-width:600px){.cards{grid-template-columns:1fr} .card-value{font-size:22px} .container{padding:8px} .section{padding:16px} th,td{padding:8px 6px;font-size:11px} .pnl-row-value{font-size:15px}}
</style>
</head>
<body>
<div class="loading-bar" id="loading-bar"></div>
<div class="toast" id="toast"></div>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div><span class="logo">Atlas-ASX</span><div class="logo-sub" id="dashboard-mode">Paper Trading Dashboard</div></div>
      <span class="badge badge-version" id="config-version"></span>
      <span class="badge" id="broker-badge" style="display:none"></span>
    </div>
    <div class="header-right">
      <span id="last-updated"></span>
      <span class="pulse" id="connection-pulse"></span>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-item"><span id="status-dot" class="status-dot green"></span><span class="status-label">Data:</span><span class="status-value" id="status-freshness">Loading...</span></div>
    <div class="status-separator"></div>
    <div class="status-item"><span class="status-label">Trade Date:</span><span class="status-value" id="status-trade-date">&mdash;</span></div>
    <div class="status-separator"></div>
    <div class="status-item"><span class="status-label">Plan:</span><span class="status-value" id="status-plan">&mdash;</span></div>
    <div class="status-separator"></div>
    <div class="status-item"><span class="status-label">Signals:</span><span class="status-value" id="status-signals">0</span></div>
    <span class="countdown" id="countdown">60s</span>
    <button class="btn-refresh" id="btn-refresh" onclick="refresh()">&#8635; Refresh Now</button>
  </div>

  <!-- Summary Cards -->
  <div class="cards" id="summary-cards"></div>

  <!-- P&L Breakdown -->
  <div class="pnl-breakdown" id="pnl-breakdown"></div>

  <!-- Charts Row -->
  <div class="section">
    <div class="section-header" data-section="charts" onclick="toggleSection('body-charts')">
      <div class="section-title"><span class="icon">&#128200;</span> Portfolio Performance</div>
      <span class="section-chevron" id="chev-charts">&#9660;</span>
    </div>
    <div class="section-body expanded" id="body-charts">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px">
        <button class="chart-toggle active" id="btn-mode-dollar" onclick="setChartMode('dollar')">$ Dollar</button>
        <button class="chart-toggle" id="btn-mode-pct" onclick="setChartMode('pct')">% Return</button>
        <span style="margin-left:auto"></span>
        <button class="chart-toggle" data-range="1m" onclick="setRange('1m')">1M</button>
        <button class="chart-toggle" data-range="3m" onclick="setRange('3m')">3M</button>
        <button class="chart-toggle" data-range="6m" onclick="setRange('6m')">6M</button>
        <button class="chart-toggle" data-range="1y" onclick="setRange('1y')">1Y</button>
        <button class="chart-toggle" data-range="live" onclick="setRange('live')">Live Only</button>
        <button class="chart-toggle active" data-range="all" onclick="setRange('all')">All</button>
      </div>
      <div class="chart-row">
        <div class="chart-equity">
          <div class="chart-wrap"><canvas id="equityChart"></canvas></div>
          <div class="chart-wrap-dd"><canvas id="drawdownChart"></canvas></div>
        </div>
        <div class="chart-donut">
          <div class="chart-donut-title"><span>&#127856;</span> Position Allocation</div>
          <div class="chart-wrap-donut"><canvas id="allocationChart"></canvas></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Open Positions -->
  <div class="section">
    <div class="section-header" data-section="positions" onclick="toggleSection('body-positions')">
      <div class="section-title"><span class="icon">&#128188;</span> Open Positions <span class="badge badge-version" id="pos-count"></span></div>
      <span class="section-chevron" id="chev-positions">&#9660;</span>
    </div>
    <div class="section-body expanded" id="body-positions">
      <div class="table-wrap" id="positions-table"></div>
    </div>
  </div>

  <!-- Trade Plan -->
  <div class="section">
    <div class="section-header" data-section="plan" onclick="toggleSection('body-plan')">
      <div class="section-title"><span class="icon">&#128203;</span> Today's Trade Plan <span class="badge" id="plan-badge"></span></div>
      <span class="section-chevron" id="chev-plan">&#9660;</span>
    </div>
    <div class="section-body expanded" id="body-plan">
      <div id="plan-content"></div>
    </div>
  </div>

  <!-- Watchlist -->
  <div class="section">
    <div class="section-header" data-section="watchlist" onclick="toggleSection('body-watchlist')">
      <div class="section-title"><span class="icon">&#128065;</span> Watchlist <span class="badge badge-version" id="wl-count"></span> <span style="font-size:12px;color:var(--text-dim);font-weight:400">&mdash; Next best signals</span></div>
      <span class="section-chevron" id="chev-watchlist">&#9660;</span>
    </div>
    <div class="section-body expanded" id="body-watchlist">
      <div class="table-wrap" id="watchlist-content"></div>
    </div>
  </div>

  <!-- Trade History -->
  <div class="section">
    <div class="section-header" data-section="history" onclick="toggleSection('body-history')">
      <div class="section-title"><span class="icon">&#128214;</span> Trade History <span class="badge badge-version" id="closed-count"></span></div>
      <span class="section-chevron" id="chev-history">&#9660;</span>
    </div>
    <div class="section-body expanded" id="body-history">
      <div class="table-wrap" id="closed-content"></div>
    </div>
  </div>

  <!-- Strategy Performance -->
  <div class="section">
    <div class="section-header" data-section="strategy" onclick="toggleSection('body-strategy')">
      <div class="section-title"><span class="icon">&#127942;</span> Strategy Performance</div>
      <span class="section-chevron" id="chev-strategy">&#9660;</span>
    </div>
    <div class="section-body expanded" id="body-strategy">
      <div id="strat-content"></div>
    </div>
  </div>

  <!-- Risk Monitor -->
  <div class="section">
    <div class="section-header" data-section="risk" onclick="toggleSection('body-risk')">
      <div class="section-title"><span class="icon">&#9888;&#65039;</span> Risk Monitor</div>
      <span class="section-chevron" id="chev-risk">&#9660;</span>
    </div>
    <div class="section-body expanded" id="body-risk">
      <div id="risk-content"></div>
    </div>
  </div>

  <!-- Backtest Metrics -->
  <div class="section">
    <div class="section-header" data-section="backtest" onclick="toggleSection('body-backtest')">
      <div class="section-title"><span class="icon">&#128202;</span> Backtest Metrics</div>
      <span class="section-chevron" id="chev-backtest">&#9660;</span>
    </div>
    <div class="section-body expanded" id="body-backtest">
      <div id="backtest-content"></div>
    </div>
  </div>

</div>

<script>
// ── State ──
let equityChart = null, drawdownChart = null, allocationChart = null;
let chartMode = 'dollar', chartRange = 'all';
const REFRESH_INTERVAL = 60;
let previousCardValues = {};
let previousData = null;
let rationaleMap = {};
let countdown = 60;
let countdownInterval = null;

// ── Utilities ──
function fmt$(v, dec) {
  if (dec === undefined) dec = 2;
  if (v == null) return '\u2014';
  var s = v < 0 ? '-' : '';
  return s + '$' + Math.abs(v).toLocaleString('en-AU', {minimumFractionDigits: dec, maximumFractionDigits: dec});
}
function fmtPct(v, dec) {
  if (dec === undefined) dec = 1;
  if (v == null) return '\u2014';
  return (v >= 0 ? '+' : '') + v.toFixed(dec) + '%';
}
function pnlClass(v) { return v > 0 ? 'pnl-pos' : v < 0 ? 'pnl-neg' : ''; }
function pnlColor(v) { return v > 0 ? 'green' : v < 0 ? 'red' : 'neutral'; }

function stratBadge(strategy) {
  if (!strategy) return '';
  var cls = strategy.replace(/\s+/g, '_').toLowerCase();
  var label = strategy.replace(/_/g, ' ');
  return '<span class="strat-badge ' + cls + '">' + label + '</span>';
}

function relativeTime(dateStr) {
  if (!dateStr) return '';
  try {
    var d = new Date(dateStr.replace(/\s*(AEST|AEDT|UTC|GMT).*$/, ''));
    var now = new Date();
    var diffMs = now - d;
    var diffSec = Math.floor(diffMs / 1000);
    var diffMin = Math.floor(diffSec / 60);
    var diffHr = Math.floor(diffMin / 60);
    var diffDay = Math.floor(diffHr / 24);
    if (diffSec < 60) return 'just now';
    if (diffMin < 60) return diffMin + 'm ago';
    if (diffHr < 24) return diffHr + 'h ago';
    if (diffDay < 30) return diffDay + 'd ago';
    return d.toLocaleDateString();
  } catch(e) { return ''; }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function calcRR(entry) {
  var ep = entry.entry_price, sp = entry.stop_price, tp = entry.take_profit;
  if (!ep || !sp) return '\u2014';
  var risk = Math.abs(ep - sp);
  if (risk === 0) return '\u2014';
  if (tp == null) {
    if (entry.strategy === 'trend_following') return 'Trailing';
    return '\u2014';
  }
  return (Math.abs(tp - ep) / risk).toFixed(1) + ':1';
}


// ── Toast & Loading ──
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  requestAnimationFrame(function() { t.classList.add('show'); });
  setTimeout(function() { t.classList.remove('show'); }, 4000);
}

function setLoading(state) {
  var bar = document.getElementById('loading-bar');
  var btn = document.getElementById('btn-refresh');
  if (state === 'start') {
    bar.className = 'loading-bar active';
    btn.classList.add('loading');
    btn.innerHTML = '&#8987; Loading...';
  } else if (state === 'done') {
    bar.className = 'loading-bar done';
    btn.classList.remove('loading');
    btn.innerHTML = '&#8635; Refresh Now';
  } else {
    bar.className = 'loading-bar';
    btn.classList.remove('loading');
    btn.innerHTML = '&#8635; Refresh Now';
  }
}

// ── Sortable Tables ──
function makeSortable(tableEl) {
  if (!tableEl) return;
  var headers = tableEl.querySelectorAll('th.sortable');
  headers.forEach(function(th) {
    th.addEventListener('click', function() {
      var tbody = tableEl.querySelector('tbody');
      if (!tbody) return;
      var rows = Array.from(tbody.querySelectorAll('tr:not(.rationale-row)'));
      var isAsc = th.classList.contains('asc');
      headers.forEach(function(h) { h.classList.remove('asc','desc'); });
      th.classList.add(isAsc ? 'desc' : 'asc');
      var dir = isAsc ? -1 : 1;
      var ci = th.cellIndex;
      rows.sort(function(a, b) {
        var av = a.cells[ci] ? a.cells[ci].textContent.trim() : '';
        var bv = b.cells[ci] ? b.cells[ci].textContent.trim() : '';
        var an = parseFloat(av.replace(/[$,%+x]/g, ''));
        var bn = parseFloat(bv.replace(/[$,%+x]/g, ''));
        if (!isNaN(an) && !isNaN(bn)) return (an - bn) * dir;
        return av.localeCompare(bv) * dir;
      });
      rows.forEach(function(row) {
        var next = row.nextElementSibling;
        tbody.appendChild(row);
        if (next && next.classList.contains('rationale-row')) tbody.appendChild(next);
      });
    });
  });
}

// ── Animated Number Transition ──
function animateValue(el, newText) {
  if (el.textContent === newText) return;
  el.classList.add('changing');
  setTimeout(function() {
    el.textContent = newText;
    el.classList.remove('changing');
  }, 150);
}

// ── Fetch ──
async function fetchData() {
  try {
    setLoading('start');
    var r = await fetch('/dashboard-data.json?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var data = await r.json();
    setLoading('done');
    return data;
  } catch(e) {
    console.error('Fetch error:', e);
    setLoading('error');
    showToast('Failed to load data: ' + e.message, 'error');
    return null;
  }
}

// ── Render: Header ──
function renderHeader(d) {
  document.getElementById('config-version').textContent = d.config_version || '';
  var tsRaw = d.generated_at || d.timestamp || '';
  var ts = new Date(tsRaw.replace(/\s*(AEST|AEDT|UTC|GMT).*$/, ''));
  document.getElementById('last-updated').innerHTML = 'Updated ' + ts.toLocaleTimeString() + ' <span style="color:var(--text-dim)">(' + relativeTime(tsRaw) + ')</span>';

  // Broker mode indicator
  var broker = d.broker || {};
  var brokerBadge = document.getElementById('broker-badge');
  var modeLabel = document.getElementById('dashboard-mode');
  if (broker.is_live) {
    modeLabel.textContent = 'LIVE Trading Dashboard';
    modeLabel.style.color = 'var(--red)';
    brokerBadge.textContent = '🔴 LIVE — ' + (broker.name || 'moomoo').toUpperCase();
    brokerBadge.className = 'badge badge-rejected';
    brokerBadge.style.display = 'inline-block';
    document.getElementById('connection-pulse').style.background = 'var(--red)';
  } else if (broker.name === 'moomoo') {
    modeLabel.textContent = 'Moomoo Simulate Dashboard';
    brokerBadge.textContent = 'MOOMOO SIM';
    brokerBadge.className = 'badge badge-pending';
    brokerBadge.style.display = 'inline-block';
  } else {
    modeLabel.textContent = 'Paper Trading Dashboard';
    brokerBadge.style.display = 'none';
  }
}

// ── Render: Status Bar ──
function renderStatusBar(d) {
  var tsRaw = d.generated_at || d.timestamp || '';
  var ts = new Date(tsRaw.replace(/\s*(AEST|AEDT|UTC|GMT).*$/, ''));
  var age = (Date.now() - ts.getTime()) / 1000;
  var dot = document.getElementById('status-dot');
  var freshness = document.getElementById('status-freshness');
  if (age < 120) { dot.className = 'status-dot green'; freshness.textContent = 'Live (' + relativeTime(tsRaw) + ')'; }
  else if (age < 600) { dot.className = 'status-dot yellow'; freshness.textContent = relativeTime(tsRaw); }
  else { dot.className = 'status-dot red'; freshness.textContent = 'Stale (' + relativeTime(tsRaw) + ')'; }

  if (d.plan) {
    document.getElementById('status-trade-date').textContent = d.plan.trade_date || '\u2014';
    var st = d.plan.status || 'UNKNOWN';
    var stColor = st === 'APPROVED' ? 'var(--green)' : st === 'PENDING_APPROVAL' ? 'var(--yellow)' : 'var(--text-dim)';
    document.getElementById('status-plan').innerHTML = '<span style="color:' + stColor + '">' + st + '</span>';
    document.getElementById('status-signals').textContent = (d.plan.proposed_entries || []).length;
  }
}

// ── Render: Summary Cards ──
function renderCards(d) {
  var p = d.summary || d.portfolio || {};
  var bm = d.backtest_metrics || {};
  var rm = d.risk_monitor || {};
  var cards = [
    {id:'equity', label:'Equity', value:fmt$(p.equity), color:'neutral', sub:'Starting: '+fmt$(p.starting_equity)},
    {id:'cash', label:'Cash Available', value:fmt$(p.cash), color:'neutral', sub:fmtPct(p.cash/p.starting_equity*100-100)+' of equity'},
    {id:'pnl', label:'Net P&L', value:fmt$(p.total_pnl), color:pnlColor(p.total_pnl), sub:fmtPct(p.total_pnl_pct)},
    {id:'positions', label:'Open Positions', value:p.num_open||(Array.isArray(p.open_positions)?p.open_positions.length:p.open_positions)||0, color:'neutral', sub:'of '+(rm.positions_max||10)+' max'},
    {id:'winrate', label:'Win Rate', value:(p.win_rate||0).toFixed(1)+'%', color:(p.win_rate||0)>=50?'green':'neutral', sub:(d.closed_trades||[]).length?((d.closed_trades||[]).length+' trades'):'Backtest data'},
    {id:'maxdd', label:'Max Drawdown', value:(p.max_drawdown||0).toFixed(2)+'%', color:(p.max_drawdown||0)>5?'red':'green', sub:'Limit: '+(rm.max_daily_drawdown_pct||5)+'%/day'},
    {id:'sharpe', label:'Sharpe Ratio', value:bm.sharpe!=null?bm.sharpe.toFixed(2):'\u2014', color:bm.sharpe!=null&&bm.sharpe>=1?'green':'neutral', sub:'Backtest'},
    {id:'profitfactor', label:'Profit Factor', value:bm.profit_factor!=null?bm.profit_factor.toFixed(2):'\u2014', color:bm.profit_factor!=null&&bm.profit_factor>=2?'green':'neutral', sub:'Backtest'},
  ];

  var container = document.getElementById('summary-cards');
  if (!container.children.length) {
    var html = '';
    cards.forEach(function(c) {
      html += '<div class="card" id="card-'+c.id+'">';
      html += '<div class="card-label">'+c.label+'</div>';
      html += '<div class="card-value anim-num '+c.color+'" data-field="value">'+c.value+'</div>';
      html += '<div class="card-sub" data-field="sub">'+c.sub+'</div>';
      html += '</div>';
    });
    container.innerHTML = html;
    cards.forEach(function(c) { previousCardValues[c.id] = c.value; });
    return;
  }

  cards.forEach(function(c) {
    var el = document.getElementById('card-'+c.id);
    if (!el) return;
    var valEl = el.querySelector('[data-field="value"]');
    var subEl = el.querySelector('[data-field="sub"]');
    if (valEl && valEl.textContent !== String(c.value)) {
      animateValue(valEl, String(c.value));
      valEl.className = 'card-value anim-num ' + c.color;
      el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
    }
    if (subEl) subEl.innerHTML = c.sub;
  });
}

// ── Render: P&L Breakdown ──
function renderPnlBreakdown(d) {
  var p = d.summary || d.portfolio || {};
  var el = document.getElementById('pnl-breakdown');
  var marketPnl = p.market_pnl != null ? p.market_pnl : null;
  var totalComm = p.total_commissions != null ? p.total_commissions : null;
  var commPerTrade = p.commission_per_trade != null ? p.commission_per_trade : null;
  var totalPnl = p.total_pnl != null ? p.total_pnl : 0;
  var numOpen = p.num_open || 0;
  var closedCount = (d.closed_trades || []).length;
  var totalTrades = numOpen + closedCount;

  if (marketPnl == null && totalComm == null) { el.style.display = 'none'; return; }
  el.style.display = 'block';

  var html = '<div class="pnl-breakdown-title"><span>&#128176;</span> P&amp;L Breakdown</div>';

  html += '<div class="pnl-row">';
  html += '<div class="pnl-row-label"><span style="font-size:16px">&#128200;</span> Market P&amp;L <span class="pnl-row-sub">(unrealized price movement)</span></div>';
  html += '<div class="pnl-row-value anim-num ' + pnlColor(marketPnl) + '">' + fmt$(marketPnl) + '</div>';
  html += '</div>';

  html += '<div class="pnl-row">';
  html += '<div class="pnl-row-label"><span style="font-size:16px">&#128176;</span> Commission Costs <span class="pnl-row-sub">';
  if (commPerTrade != null && totalTrades > 0) {
    html += fmt$(commPerTrade) + ' &times; ' + totalTrades + ' trades';
  }
  html += '</span></div>';
  html += '<div class="pnl-row-value anim-num red">-' + fmt$(Math.abs(totalComm || 0)) + '</div>';
  html += '</div>';

  html += '<div class="pnl-row total">';
  html += '<div class="pnl-row-label"><span style="font-size:16px">&#127919;</span> Net P&amp;L</div>';
  html += '<div class="pnl-row-value anim-num ' + pnlColor(totalPnl) + '">' + fmt$(totalPnl) + ' <span class="pnl-row-sub">' + fmtPct(p.total_pnl_pct) + '</span></div>';
  html += '</div>';

  html += '<div class="pnl-info">';
  html += '<strong>&#9432; Why the gap?</strong> Each trade incurs a ' + fmt$(commPerTrade || 3) + ' flat commission on entry. ';
  html += 'Individual position P&amp;Ls show pure price movement only. The net P&amp;L includes all commission costs deducted from cash at entry.';
  html += '</div>';

  el.innerHTML = html;
}

// ── Chart helpers ──
function setChartMode(mode) {
  chartMode = mode;
  document.getElementById('btn-mode-dollar').classList.toggle('active', mode === 'dollar');
  document.getElementById('btn-mode-pct').classList.toggle('active', mode === 'pct');
  if (previousData) renderEquityChart(previousData);
}
function setRange(r) {
  chartRange = r;
  document.querySelectorAll('[data-range]').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-range') === r);
  });
  if (previousData) renderEquityChart(previousData);
}

// ── Render: Equity Chart ──
function renderEquityChart(d) {
  try {
    var ctx = document.getElementById('equityChart').getContext('2d');
    var ctxDD = document.getElementById('drawdownChart').getContext('2d');
    var eq = d.equity_curve || [];
    var bm = d.benchmark || [];
    var btEq = d.backtest_equity || [];
    var startEq = ((d.summary||d.portfolio)||{}).starting_equity || 5000;

    var btData = btEq.map(function(e) { return {x:e.date, y: chartMode==='pct' ? Math.round((e.equity/startEq-1)*10000)/100 : e.equity}; });
    var eqData = eq.map(function(e) { return {x:e.date, y: chartMode==='pct' ? Math.round((e.equity/startEq-1)*10000)/100 : e.equity}; });
    var bmData = bm.map(function(e) { return {x:e.date, y: chartMode==='pct' ? Math.round((e.value/startEq-1)*10000)/100 : e.value}; });

    // Time range filter
    var cutoffDate = null, now = new Date();
    if (chartRange==='1m') { cutoffDate=new Date(now); cutoffDate.setMonth(cutoffDate.getMonth()-1); }
    else if (chartRange==='3m') { cutoffDate=new Date(now); cutoffDate.setMonth(cutoffDate.getMonth()-3); }
    else if (chartRange==='6m') { cutoffDate=new Date(now); cutoffDate.setMonth(cutoffDate.getMonth()-6); }
    else if (chartRange==='1y') { cutoffDate=new Date(now); cutoffDate.setFullYear(cutoffDate.getFullYear()-1); }
    else if (chartRange==='live' && eq.length>0) { cutoffDate=new Date(eq[0].date); cutoffDate.setDate(cutoffDate.getDate()-30); }
    if (cutoffDate) {
      var cutStr = cutoffDate.toISOString().slice(0,10);
      btData=btData.filter(function(p){return p.x>=cutStr;});
      eqData=eqData.filter(function(p){return p.x>=cutStr;});
      bmData=bmData.filter(function(p){return p.x>=cutStr;});
    }

    var labelSet = {};
    btData.forEach(function(p){labelSet[p.x]=1;});
    eqData.forEach(function(p){labelSet[p.x]=1;});
    bmData.forEach(function(p){labelSet[p.x]=1;});
    var labels = Object.keys(labelSet).sort();

    var yTickCb = chartMode==='pct'
      ? function(v){return (v>=0?'+':'')+v.toFixed(1)+'%';}
      : function(v){return '$'+v.toLocaleString();};

    var liveStart = eq.length>0 ? eq[0].date : null;
    var annotations = {};
    if (liveStart) {
      annotations.liveStartLine = {
        type:'line', xMin:liveStart, xMax:liveStart,
        borderColor:'rgba(63,185,80,0.7)', borderWidth:2, borderDash:[6,4],
        label:{display:true, content:'LIVE', position:'start',
          backgroundColor:'rgba(63,185,80,0.85)', color:'#fff',
          font:{size:10,weight:'bold'}, padding:{x:6,y:3}}
      };
    }

    if (equityChart) { equityChart.destroy(); equityChart=null; }
    if (drawdownChart) { drawdownChart.destroy(); drawdownChart=null; }

    equityChart = new Chart(ctx, {
      type:'line',
      data:{
        labels:labels,
        datasets:[
          {label:'Backtest',data:btData,borderColor:'#58a6ff',backgroundColor:'rgba(88,166,255,0.08)',fill:true,tension:0.3,pointRadius:0,borderWidth:1.5,order:2},
          {label:'Live',data:eqData,borderColor:'#3fb950',backgroundColor:'rgba(63,185,80,0.15)',fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:'#3fb950',borderWidth:2.5,order:1},
          {label:'IOZ Benchmark',data:bmData,borderColor:'rgba(139,148,158,0.5)',borderDash:[5,5],fill:false,tension:0.3,pointRadius:0,borderWidth:1.5,order:3}
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,animation:{duration:600},
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{labels:{color:'#8b949e',font:{size:11},usePointStyle:true,pointStyle:'line'}},
          tooltip:{backgroundColor:'#161b22',borderColor:'#30363d',borderWidth:1,titleColor:'#e6edf3',bodyColor:'#e6edf3'},
          annotation:Object.keys(annotations).length>0?{annotations:annotations}:undefined
        },
        scales:{
          x:{type:'category',ticks:{color:'#8b949e',maxTicksLimit:10,font:{size:10},maxRotation:0},grid:{color:'rgba(48,54,61,0.3)'}},
          y:{ticks:{color:'#8b949e',font:{size:11},callback:yTickCb},grid:{color:'rgba(48,54,61,0.3)'}}
        }
      }
    });

    // Drawdown chart
    var combinedEq = btData.slice();
    eqData.forEach(function(p){if(!btData.find(function(b){return b.x===p.x;}))combinedEq.push(p);});
    combinedEq.sort(function(a,b){return a.x<b.x?-1:1;});
    var ddData=[],peak=0;
    combinedEq.forEach(function(p){if(p.y>peak)peak=p.y;var dd=peak>0?((p.y-peak)/peak)*100:0;ddData.push({x:p.x,y:Math.round(dd*100)/100});});

    drawdownChart = new Chart(ctxDD, {
      type:'line',
      data:{
        labels:ddData.map(function(p){return p.x;}),
        datasets:[{label:'Drawdown',data:ddData.map(function(p){return p.y;}),borderColor:'rgba(248,81,73,0.7)',backgroundColor:'rgba(248,81,73,0.15)',fill:true,tension:0.3,pointRadius:0,borderWidth:1}]
      },
      options:{
        responsive:true,maintainAspectRatio:false,animation:{duration:400},
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#161b22',borderColor:'#30363d',borderWidth:1,titleColor:'#e6edf3',bodyColor:'#e6edf3'}},
        scales:{x:{display:false},y:{ticks:{color:'#8b949e',font:{size:9},callback:function(v){return v.toFixed(0)+'%';}},grid:{color:'rgba(48,54,61,0.2)'},max:0}}
      }
    });
  } catch(e) {
    console.error('renderEquityChart error:',e);
  }
}

// ── Render: Allocation Donut ──
function renderAllocationChart(d) {
  var ctx = document.getElementById('allocationChart').getContext('2d');
  var positions = d.positions || (d.portfolio && d.portfolio.open_positions) || [];
  var cash = ((d.summary||d.portfolio)||{}).cash || 0;
  var labels = ['Cash'], values = [cash], colors = ['rgba(139,148,158,0.4)'];
  var posColors = ['#58a6ff','#3fb950','#bc8cff','#d29922','#db6d28','#f85149','#79c0ff','#56d364'];
  positions.forEach(function(p,i) {
    labels.push(p.ticker);
    values.push(Math.abs(p.current_price * p.shares));
    colors.push(posColors[i % posColors.length]);
  });
  if (positions.length === 0) { labels=['Cash (100%)']; values=[cash||1]; colors=['rgba(139,148,158,0.4)']; }

  if (allocationChart) {
    allocationChart.data.labels = labels;
    allocationChart.data.datasets[0].data = values;
    allocationChart.data.datasets[0].backgroundColor = colors;
    allocationChart.update('none');
    return;
  }

  allocationChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels: labels, datasets: [{ data: values, backgroundColor: colors, borderColor: '#161b22', borderWidth: 2 }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '65%',
      plugins: {
        legend: { position: 'bottom', labels: { color: '#8b949e', font: {size: 11}, padding: 12, usePointStyle: true, pointStyleWidth: 8 } },
        tooltip: {
          backgroundColor: '#161b22', borderColor: '#30363d', borderWidth: 1, titleColor: '#e6edf3', bodyColor: '#e6edf3',
          callbacks: {
            label: function(ctx) {
              var total = ctx.dataset.data.reduce(function(a,b){return a+b;}, 0);
              var pct = total > 0 ? (ctx.parsed / total * 100).toFixed(1) : 0;
              return ctx.label + ': $' + ctx.parsed.toFixed(2) + ' (' + pct + '%)';
            }
          }
        }
      }
    }
  });
}

// ── Render: Open Positions ──

    el.innerHTML = '<div class="empty"><div class="empty-icon">&#128230;</div>No open positions</div>';
    return;
  }
  var html = '<table id="tbl-positions"><thead><tr>';
  html += sortTh('Ticker');
  html += '<th>Strategy</th>';
  html += sortTh('Entry Date');
  html += sortTh('Entry');
  html += sortTh('Current');
  html += sortTh('P&amp;L');
  html += sortTh('P&amp;L %');
  html += sortTh('Comm.');
  html += sortTh('Stop');
  html += sortTh('Days');
  html += '</tr></thead><tbody>';
  pos.forEach(function(p) {
    var cls = pnlClass(p.unrealized_pnl);
    var rat = rationaleMap[p.ticker] || '';

      html += p.ticker;

    html += '<td>' + p.entry_date + ' <span style="color:var(--text-dim);font-size:11px">' + relativeTime(p.entry_date) + '</span></td>';
    html += '<td>' + fmt$(p.entry_price) + '</td>';
    html += '<td>' + fmt$(p.current_price) + '</td>';
    html += '<td class="' + cls + '">' + fmt$(p.unrealized_pnl) + '</td>';
    html += '<td class="' + cls + '">' + fmtPct(p.unrealized_pnl_pct) + '</td>';
    html += '<td style="color:var(--text-dim)">' + fmt$(p.commission || 0) + '</td>';
    html += '<td>' + fmt$(p.stop_price) + '</td>';
    html += '<td>' + p.days_held + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  el.innerHTML = html;
  makeSortable(document.getElementById('tbl-positions'));
}

// ── Render: Trade Plan ──
function renderTradePlan(d) {
  var plan = d.todays_plan || d.plan || {};
  var el = document.getElementById('plan-content');
  if (!plan || Object.keys(plan).length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">&#128196;</div>No trade plan for today</div>';
    return;
  }
  var html = '';
  // Build rationale map
  rationaleMap = {};
  var entries = plan.entries || plan.new_entries || [];
  entries.forEach(function(e) { if(e.rationale) rationaleMap[e.ticker]=e.rationale; });

  // Plan summary
  if (plan.date) html += '<div style="color:var(--text-dim);margin-bottom:8px">Plan Date: ' + plan.date + '</div>';
  if (plan.market_regime) html += '<div style="margin-bottom:12px">Market Regime: <span class="badge badge-info">' + plan.market_regime + '</span></div>';

  // Entries
  if (entries.length > 0) {
    html += '<div style="margin-bottom:16px"><h4 style="color:var(--green);margin-bottom:8px">&#128994; New Entries (' + entries.length + ')</h4>';
    html += '<table><thead><tr><th>Ticker</th><th>Strategy</th><th>Entry</th><th>Stop</th><th>Shares</th><th>Risk</th><th>Rationale</th></tr></thead><tbody>';
    entries.forEach(function(e) {
      html += '<tr><td style="font-weight:600">' + e.ticker + '</td>';
      html += '<td>' + stratBadge(e.strategy) + '</td>';
      html += '<td>' + fmt$(e.entry_price||e.limit_price) + '</td>';
      html += '<td>' + fmt$(e.stop_loss||e.stop_price) + '</td>';
      html += '<td>' + (e.shares||e.position_size||'-') + '</td>';
      html += '<td>' + fmt$(e.risk_amount||e.dollar_risk) + '</td>';
      html += '<td style="max-width:200px;font-size:11px;color:var(--text-dim)">' + escapeHtml(e.rationale||'') + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }

  // Exits
  var exits = plan.exits || plan.planned_exits || [];
  if (exits.length > 0) {
    html += '<div style="margin-bottom:16px"><h4 style="color:var(--red);margin-bottom:8px">&#128308; Planned Exits (' + exits.length + ')</h4>';
    html += '<table><thead><tr><th>Ticker</th><th>Reason</th><th>Stop</th><th>P&amp;L</th></tr></thead><tbody>';
    exits.forEach(function(e) {
      html += '<tr><td style="font-weight:600">' + e.ticker + '</td>';
      html += '<td>' + escapeHtml(e.reason||e.exit_reason||'') + '</td>';
      html += '<td>' + fmt$(e.stop_price||e.stop) + '</td>';
      html += '<td class="' + pnlClass(e.pnl||e.unrealized_pnl) + '">' + fmt$(e.pnl||e.unrealized_pnl) + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }

  // Holds
  var holds = plan.holds || [];
  if (holds.length > 0) {
    html += '<div><h4 style="color:var(--accent);margin-bottom:8px">&#128992; Hold (' + holds.length + ')</h4>';
    html += '<table><thead><tr><th>Ticker</th><th>Strategy</th><th>Stop</th><th>P&amp;L</th><th>Notes</th></tr></thead><tbody>';
    holds.forEach(function(e) {
      html += '<tr><td style="font-weight:600">' + e.ticker + '</td>';
      html += '<td>' + stratBadge(e.strategy) + '</td>';
      html += '<td>' + fmt$(e.stop_price||e.stop) + '</td>';
      html += '<td class="' + pnlClass(e.pnl||e.unrealized_pnl) + '">' + fmt$(e.pnl||e.unrealized_pnl) + '</td>';
      html += '<td style="font-size:11px;color:var(--text-dim)">' + escapeHtml(e.notes||'') + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }

  el.innerHTML = html;
}

// ── Render: Strategy Performance ──
function renderStrategyPerf(d) {
  var rawStrats = d.strategy_performance || {};
  var el = document.getElementById('strat-content');
  // Convert dict to array if needed
  var strats = Array.isArray(rawStrats) ? rawStrats : Object.entries(rawStrats).map(function(e){ var o = Object.assign({}, e[1]); o.name = e[0]; return o; });
  if (!strats || strats.length === 0) {

  var html = '<table id="tbl-strats"><thead><tr>';

  html += sortTh('Trades');
  html += sortTh('Win Rate');

  html += sortTh('Total P&amp;L');

  html += sortTh('Avg Days');
  html += '</tr></thead><tbody>';
  strats.forEach(function(s) {

// ── Render: Risk Monitor ──
function renderRiskMonitor(d) {
  var risk = d.risk || d.risk_monitor || {};
  var p = d.summary || d.portfolio || {};
  var el = document.getElementById('risk-content');

  var maxDD = p.max_drawdown || risk.max_drawdown || 0;
  var ddLimit = risk.dd_limit || 15;
  var dailyDD = risk.daily_drawdown || 0;
  var dailyLimit = risk.daily_dd_limit || 3;
  var posCount = p.num_open || 0;
  var maxPos = risk.max_positions || 10;
  var exposure = risk.exposure_pct || 0;
  var maxExposure = risk.max_exposure || 100;
  var corrRisk = risk.correlation_risk || risk.sector_concentration || 'Low';

  var html = '<div class="risk-grid">';
  // Max Drawdown bar
  html += riskBar('Max Drawdown', maxDD, ddLimit, '%', maxDD > ddLimit*0.8);
  // Daily Drawdown bar
  html += riskBar('Daily Drawdown', dailyDD, dailyLimit, '%', dailyDD > dailyLimit*0.8);
  // Position Count
  html += riskBar('Open Positions', posCount, maxPos, '', posCount >= maxPos);
  // Exposure
  html += riskBar('Portfolio Exposure', exposure, maxExposure, '%', exposure > maxExposure*0.9);
  html += '</div>';

  // Correlation/concentration
  var riskLevel = typeof corrRisk === 'string' ? corrRisk : (corrRisk > 0.7 ? 'High' : corrRisk > 0.4 ? 'Medium' : 'Low');
  var riskColor = riskLevel === 'High' ? 'var(--red)' : riskLevel === 'Medium' ? 'var(--yellow)' : 'var(--green)';
  html += '<div style="margin-top:12px;padding:8px 12px;background:var(--bg-card);border-radius:6px;display:flex;justify-content:space-between;align-items:center">';
  html += '<span style="color:var(--text-dim)">Sector Concentration Risk</span>';
  html += '<span style="color:' + riskColor + ';font-weight:600">' + riskLevel + '</span></div>';

  el.innerHTML = html;
}

function riskBar(label, value, max, unit, warning) {
  var pct = max > 0 ? Math.min((value/max)*100, 100) : 0;
  var color = warning ? 'var(--red)' : pct > 60 ? 'var(--yellow)' : 'var(--green)';
  var html = '<div class="risk-item">';
  html += '<div style="display:flex;justify-content:space-between;margin-bottom:4px">';
  html += '<span style="color:var(--text-dim);font-size:12px">' + label + '</span>';
  html += '<span style="font-size:12px;font-weight:600">' + (typeof value==='number'?value.toFixed(unit==='%'?2:0):value) + unit + ' / ' + max + unit + '</span></div>';
  html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%;background:' + color + '"></div></div>';
  html += '</div>';
  return html;
}

// ── Collapsible sections ──
function toggleSection(id) {
  var el = document.getElementById(id);
  var arrow = el.previousElementSibling.querySelector('.section-chevron');
  if (el.classList.contains('collapsed')) {
    el.classList.remove('collapsed');
    el.style.maxHeight = el.scrollHeight + 'px';
    setTimeout(function(){ el.style.maxHeight='none'; }, 400);
    if (arrow) arrow.textContent = '▲';
  } else {
    el.style.maxHeight = el.scrollHeight + 'px';
    requestAnimationFrame(function(){
      el.style.maxHeight = '0px';
      el.classList.add('collapsed');
    });
    if (arrow) arrow.textContent = '▼';
  }
}

// ── Sortable tables ──
function sortTh(label) {
  return '<th class="sortable" onclick="sortTable(this)">' + label + ' <span class="sort-icon">↕</span></th>';
}
function makeSortable(table) {
  if (!table) return;
  var ths = table.querySelectorAll('th.sortable');
  ths.forEach(function(th) {
    th.style.cursor = 'pointer';
  });
}
function sortTable(th) {
  var table = th.closest('table');
  var idx = Array.from(th.parentNode.children).indexOf(th);
  var tbody = table.querySelector('tbody');
  var rows = Array.from(tbody.querySelectorAll('tr'));
  var asc = th.getAttribute('data-sort') !== 'asc';
  th.setAttribute('data-sort', asc ? 'asc' : 'desc');

  // Reset other headers
  th.parentNode.querySelectorAll('th').forEach(function(h) {
    var icon = h.querySelector('.sort-icon');
    if (icon) icon.textContent = '↕';
  });
  var icon = th.querySelector('.sort-icon');
  if (icon) icon.textContent = asc ? '↑' : '↓';

  rows.sort(function(a, b) {
    var aText = a.children[idx] ? a.children[idx].textContent.trim() : '';
    var bText = b.children[idx] ? b.children[idx].textContent.trim() : '';
    var aNum = parseFloat(aText.replace(/[$,%+]/g, ''));
    var bNum = parseFloat(bText.replace(/[$,%+]/g, ''));
    if (!isNaN(aNum) && !isNaN(bNum)) return asc ? aNum - bNum : bNum - aNum;
    return asc ? aText.localeCompare(bText) : bText.localeCompare(aText);
  });
  rows.forEach(function(row) { tbody.appendChild(row); });
}

// ── Countdown Timer ──
function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  countdown = REFRESH_INTERVAL;
  countdownInterval = setInterval(function() {
    countdown--;
    var el = document.getElementById('countdown');
    if (el) el.textContent = countdown + 's';
    if (countdown <= 0) {
      clearInterval(countdownInterval);
      loadData();
    }
  }, 1000);
}

// ── Main render orchestrator ──
function renderAll(d) {
  renderHeader(d);
  updateStatusBar(d);
  renderSummaryCards(d);
  renderPnlBreakdown(d);
  renderEquityChart(d);
  renderAllocationChart(d);
  renderPositions(d);
  renderTradePlan(d);
  renderWatchlist(d);
  renderClosedTrades(d);
  renderStrategyPerf(d);
  renderRiskMonitor(d);
  renderBacktestMetrics(d);
  previousData = d;
}

// ── Data loading ──
function loadData() {
  fetch('/api/live-data?t=' + Date.now())
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(d) {
      renderAll(d);
      startCountdown();
    })
    .catch(function(e) {
      console.error('Fetch error:', e);
      var el = document.getElementById('status-freshness');
      if (el) el.innerHTML = '<span style="color:var(--red)">⚠ Data load failed: ' + e.message + '</span>';
      startCountdown();
    });
}

// ── Init ──
document.addEventListener('DOMContentLoaded', function() {
  loadData();
});
