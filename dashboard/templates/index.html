<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#09090b" id="meta-theme">
<title>Atlas Dashboard</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="atlas.css">
</head>
<body>
<div id="app">

  <!-- ── Header ── -->
  <header class="header">
    <div class="logo">▲ Atlas</div>
    <div class="header-right">
      <div class="market-clocks" id="market-clocks"></div>
      <button class="theme-btn" id="theme-btn" title="Toggle theme (L)">◑</button>
    </div>
  </header>

  <!-- ── Summary Strip ── -->
  <div class="summary-strip" id="summary-strip">
    <div class="stat">
      <div class="stat-label">Portfolio</div>
      <div class="stat-value" id="stat-equity">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Today</div>
      <div class="stat-value" id="stat-today">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Positions</div>
      <div class="stat-value" id="stat-positions">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Win Rate</div>
      <div class="stat-value" id="stat-winrate">—</div>
    </div>
  </div>

  <!-- ── Equity Chart ── -->
  <div class="chart-section">
    <div class="chart-header">
      <span class="chart-title">Equity Curve</span>
      <span class="return-badge" id="return-badge">+0.00%</span>
    </div>
    <canvas id="equity-canvas"></canvas>
    <div class="chart-tooltip" id="chart-tooltip"></div>
  </div>

  <!-- ── Positions Grid ── -->
  <div class="section-title" id="positions-label">Open Positions</div>
  <div class="positions-grid" id="positions-grid"></div>

</div>
<script>
'use strict';

// ── Strategy colour map ──────────────────────────────────────
var STRATEGY_COLORS = {
  momentum_breakout: '#f97316',
  mean_reversion:    '#6366f1',
  trend_following:   '#22c55e',
  opening_gap:       '#eab308',
  sector_rotation:   '#a855f7',
  short_term_mr:     '#06b6d4',
  connors_rsi2:      '#f43f5e',
  manual:            '#71717a'
};

// ── Theme ────────────────────────────────────────────────────
var THEMES = ['dark', 'light', 'auto'];
var currentTheme = localStorage.getItem('atlas-theme') || 'auto';

function applyTheme(t) {
  currentTheme = t;
  var eff = t === 'auto'
    ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
    : t;
  document.documentElement.setAttribute('data-theme', eff);
  document.getElementById('meta-theme').content = eff === 'light' ? '#fafafa' : '#09090b';
  localStorage.setItem('atlas-theme', t);
}

document.getElementById('theme-btn').onclick = function() {
  var idx = (THEMES.indexOf(currentTheme) + 1) % THEMES.length;
  applyTheme(THEMES[idx]);
  if (window._chartData) drawChart(window._chartData);
};

document.addEventListener('keydown', function(e) {
  if (e.key === 'l' || e.key === 'L') {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    var idx = (THEMES.indexOf(currentTheme) + 1) % THEMES.length;
    applyTheme(THEMES[idx]);
    if (window._chartData) drawChart(window._chartData);
  }
});

applyTheme(currentTheme);

// ── Formatting ───────────────────────────────────────────────
function fmtNum(v, dec) {
  if (v == null || isNaN(v)) return '—';
  return v.toLocaleString(undefined, {
    minimumFractionDigits: dec != null ? dec : 2,
    maximumFractionDigits: dec != null ? dec : 2
  });
}

function fmtCcy(v, ccy) {
  if (v == null || isNaN(v)) return '—';
  var sym = (ccy || '').toUpperCase() === 'AUD' ? 'A$' : '$';
  return sym + fmtNum(Math.abs(v));
}

function fmtPct(v) {
  if (v == null || isNaN(v)) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}

function pnlClass(v) { return v > 0 ? 'green' : v < 0 ? 'red' : ''; }

// ── Market Clocks ────────────────────────────────────────────
var MARKETS = [
  { id: 'asx',  name: 'ASX',  tz: 'Australia/Sydney', oh: 10, om: 0, ch: 16, cm: 0 },
  { id: 'nyse', name: 'NYSE', tz: 'America/New_York',  oh: 9,  om: 30, ch: 16, cm: 0 }
];

function wallTime(tz) {
  var parts = {};
  new Intl.DateTimeFormat('en-US', {
    timeZone: tz, hour: '2-digit', minute: '2-digit',
    second: '2-digit', hour12: false, weekday: 'short'
  }).formatToParts(new Date()).forEach(function(p) { parts[p.type] = p.value; });
  return {
    h: parseInt(parts.hour === '24' ? '0' : parts.hour),
    m: parseInt(parts.minute), s: parseInt(parts.second),
    wd: parts.weekday
  };
}

function marketState(mk) {
  var t = wallTime(mk.tz);
  var now = t.h * 3600 + t.m * 60 + t.s;
  var opn = mk.oh * 3600 + mk.om * 60;
  var cls = mk.ch * 3600 + mk.cm * 60;
  var we  = t.wd === 'Sat' || t.wd === 'Sun';
  if (we) {
    var dOff = t.wd === 'Sat' ? 2 : 1;
    return { open: false, secs: (86400 - now) + (dOff - 1) * 86400 + opn };
  }
  if (now < opn) return { open: false, secs: opn - now };
  if (now < cls) return { open: true,  secs: cls - now };
  var dOff2 = t.wd === 'Fri' ? 3 : 1;
  return { open: false, secs: (86400 - now) + (dOff2 - 1) * 86400 + opn };
}

function fmtSecs(s) {
  if (s <= 0) return '0s';
  var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  if (h >= 48) return Math.floor(h / 24) + 'd';
  if (h > 0)   return h + 'h ' + (m < 10 ? '0' : '') + m + 'm';
  return m + 'm ' + (s % 60) + 's';
}

function initClocks() {
  var el = document.getElementById('market-clocks');
  el.innerHTML = '';
  MARKETS.forEach(function(mk) {
    var div = document.createElement('div');
    div.className = 'market-clock';
    div.id = 'clock-' + mk.id;
    div.innerHTML = '<span class="clock-name">' + mk.name + '</span>' +
      '<span class="clock-dot" id="dot-' + mk.id + '"></span>' +
      '<span id="time-' + mk.id + '">—</span>';
    el.appendChild(div);
  });
  tickClocks();
  setInterval(tickClocks, 1000);
}

function tickClocks() {
  MARKETS.forEach(function(mk) {
    var st = marketState(mk);
    var timeEl = document.getElementById('time-' + mk.id);
    var dotEl  = document.getElementById('dot-' + mk.id);
    if (!timeEl) return;
    timeEl.textContent = fmtSecs(st.secs);
    dotEl.className = 'clock-dot' + (st.open ? ' open' : '');
  });
}

// ── Sparkline SVG ────────────────────────────────────────────
function renderSparkline(prices, pnlPct) {
  var w = 120, h = 36;
  var color = (pnlPct || 0) >= 0 ? 'var(--green)' : 'var(--red)';
  var colorFill = (pnlPct || 0) >= 0 ? 'var(--green-soft)' : 'var(--red-soft)';

  if (!prices || prices.length < 2) {
    return '<svg viewBox="0 0 120 36" preserveAspectRatio="none" style="width:100%;height:36px">' +
      '<line x1="0" y1="18" x2="120" y2="18" stroke="' + color + '" stroke-width="1" stroke-opacity="0.2"/></svg>';
  }

  var minV = Math.min.apply(null, prices);
  var maxV = Math.max.apply(null, prices);
  var range = maxV - minV || 1;
  var pad = 2;

  var pts = prices.map(function(v, i) {
    var x = (i / (prices.length - 1)) * w;
    var y = pad + ((maxV - v) / range) * (h - 2 * pad);
    return x.toFixed(1) + ',' + y.toFixed(1);
  });

  // Build fill path (area under curve)
  var fillPts = pts.slice();
  fillPts.push(w + ',' + h);
  fillPts.push('0,' + h);

  return '<svg viewBox="0 0 120 36" preserveAspectRatio="none" style="width:100%;height:36px">' +
    '<polygon points="' + fillPts.join(' ') + '" fill="' + colorFill + '" />' +
    '<polyline points="' + pts.join(' ') +
    '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
    '</svg>';
}

// ── Position Cards ───────────────────────────────────────────
function renderPositions(data) {
  var grid = document.getElementById('positions-grid');
  var label = document.getElementById('positions-label');

  var positions = (data.positions || []).slice();
  positions.sort(function(a, b) { return Math.abs(b.pnl_local || 0) - Math.abs(a.pnl_local || 0); });

  label.textContent = 'Open Positions (' + positions.length + ')';

  if (!positions.length) {
    var strategies = 7;
    grid.innerHTML = '<div class="empty-state">No open positions — ' +
      strategies + ' strategies scanning for signals</div>';
    return;
  }

  grid.innerHTML = positions.map(function(p) {
    var pnl      = p.pnl_local || 0;
    var pnlPct   = p.pnl_pct || 0;
    var isPos    = pnl >= 0;
    var mktLabel = p.market === 'asx' ? 'ASX' : (p.market === 'sp500' ? 'SP500' : 'USD');
    var ccy      = (p.currency && p.currency.toUpperCase() === 'AUD') ? 'AUD' : 'USD';
    var strat    = p.strategy || 'manual';
    var stratColor = STRATEGY_COLORS[strat] || '#71717a';
    var pnlDisp  = p.pnl_display || ((isPos ? '+' : '') + fmtCcy(pnl, ccy));
    var stratLabel = strat.replace(/_/g, ' ');

    return '<div class="pos-card' + (isPos ? '' : ' negative') + '" ' +
      'data-ticker="' + (p.ticker || '') + '">' +
      '<div class="card-top">' +
        '<span class="card-ticker">' + (p.ticker || '—') + '</span>' +
        '<span class="market-pill">' + mktLabel + '</span>' +
      '</div>' +
      '<span class="strategy-pill" style="background:' + stratColor + '15;color:' + stratColor + ';border:1px solid ' + stratColor + '30">' + stratLabel + '</span>' +
      '<div class="card-prices">' +
        '<span><span class="label">Entry</span><span class="val">' + fmtCcy(p.entry_price, ccy) + '</span></span>' +
        '<span><span class="label">Current</span>' +
          '<span class="val live-price" data-ticker="' + (p.ticker || '') + '">' + fmtCcy(p.current_price, ccy) + '</span>' +
        '</span>' +
        (p.stop_price ? '<span><span class="label">Stop</span><span class="val" style="color:var(--red)">' + fmtCcy(p.stop_price, ccy) + '</span></span>' : '') +
      '</div>' +
      '<div class="card-pnl ' + pnlClass(pnl) + '" data-ticker="' + (p.ticker || '') + '">' +
        pnlDisp +
        ' <span style="font-size:12px;opacity:0.6;font-weight:400">(' + fmtPct(pnlPct) + ')</span>' +
      '</div>' +
      '<div class="card-meta">' +
        (p.days_held ? p.days_held + 'd held' : '') +
        (p.sector && p.sector !== 'Unknown' ? (p.days_held ? ' · ' : '') + p.sector : '') +
      '</div>' +
      '<div class="sparkline">' + renderSparkline(p.sparkline || [], pnlPct) + '</div>' +
    '</div>';
  }).join('');
}

// ── Summary Strip ────────────────────────────────────────────
function renderSummary(data) {
  var s = data.summary || {};

  // Equity
  var eqEl = document.getElementById('stat-equity');
  eqEl.textContent = fmtCcy(s.total_equity_aud, 'AUD');
  if (s.halted) {
    var dot = document.createElement('span');
    dot.className = 'halted-dot';
    dot.title = 'Trading halted';
    eqEl.appendChild(dot);
  }

  // Today P&L
  var today = s.today_pnl_aud || 0;
  var todEl = document.getElementById('stat-today');
  todEl.textContent = (today >= 0 ? '+' : '-') + fmtCcy(today, 'AUD');
  todEl.className   = 'stat-value ' + pnlClass(today);

  // Position count
  document.getElementById('stat-positions').textContent = s.open_position_count || 0;

  // Win rate
  var wr = s.win_rate_pct;
  document.getElementById('stat-winrate').textContent =
    (wr != null && wr > 0) ? wr.toFixed(0) + '%' : '—';
}

// ── Equity Chart ─────────────────────────────────────────────
function drawChart(curve) {
  window._chartData = curve;
  var canvas = document.getElementById('equity-canvas');
  if (!canvas || !curve || !curve.length) return;

  var dpr = window.devicePixelRatio || 1;
  var w   = canvas.offsetWidth;
  var h   = canvas.offsetHeight || 240;
  canvas.width  = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';

  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  var isDark = document.documentElement.getAttribute('data-theme') !== 'light';
  var lineColor = isDark ? '#22c55e' : '#16a34a';
  var gridColor = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.06)';
  var labelColor = isDark ? '#52525b' : '#a1a1aa';

  var vals  = curve.map(function(d) { return d.equity_aud || d.equity || 0; });
  var dates = curve.map(function(d) { return d.date; });
  var minV  = Math.min.apply(null, vals);
  var maxV  = Math.max.apply(null, vals);

  // Add 5% padding to Y range
  var yRange = maxV - minV || 1;
  var yPad   = yRange * 0.08;
  minV -= yPad;
  maxV += yPad;
  var range = maxV - minV;

  var pad = { t: 16, r: 16, b: 40, l: 64 };
  var cw  = w - pad.l - pad.r;
  var ch  = h - pad.t - pad.b;

  function xOf(i) { return pad.l + (curve.length === 1 ? cw / 2 : (i / (curve.length - 1)) * cw); }
  function yOf(v) { return pad.t + ch - ((v - minV) / range) * ch; }

  ctx.clearRect(0, 0, w, h);

  // ── Grid lines and Y-axis labels ──
  ctx.font = '11px JetBrains Mono, monospace';
  ctx.textAlign = 'right';
  var ySteps = 4;
  for (var yi = 0; yi <= ySteps; yi++) {
    var yv = minV + (yi / ySteps) * range;
    var yp = yOf(yv);

    // Grid line
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 4]);
    ctx.beginPath();
    ctx.moveTo(pad.l, yp);
    ctx.lineTo(pad.l + cw, yp);
    ctx.stroke();
    ctx.setLineDash([]);

    // Label
    ctx.fillStyle = labelColor;
    ctx.fillText('$' + Math.round(yv).toLocaleString(), pad.l - 10, yp + 4);
  }

  // ── X-axis date labels ──
  ctx.textAlign = 'center';
  var xCount = Math.min(6, curve.length);
  var step   = Math.max(1, Math.floor((curve.length - 1) / Math.max(xCount - 1, 1)));
  for (var xi = 0; xi < curve.length; xi += step) {
    var xp = xOf(xi);
    var dl = dates[xi] || '';
    var dParts = dl.split('-');
    var monthNames = ['', 'Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var xLabel = dParts.length === 3
      ? monthNames[parseInt(dParts[1])] + ' ' + parseInt(dParts[2])
      : dl;
    ctx.fillStyle = labelColor;
    ctx.fillText(xLabel, xp, h - 12);

    // Vertical grid
    if (xi > 0 && xi < curve.length - 1) {
      ctx.strokeStyle = gridColor;
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 4]);
      ctx.beginPath();
      ctx.moveTo(xp, pad.t);
      ctx.lineTo(xp, pad.t + ch);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  if (curve.length === 0) return;

  // ── Single point ──
  if (curve.length === 1) {
    ctx.beginPath();
    ctx.arc(xOf(0), yOf(vals[0]), 4, 0, Math.PI * 2);
    ctx.fillStyle = lineColor;
    ctx.fill();
    return;
  }

  // ── Area gradient fill ──
  ctx.beginPath();
  ctx.moveTo(xOf(0), yOf(vals[0]));
  for (var i = 1; i < curve.length; i++) {
    ctx.lineTo(xOf(i), yOf(vals[i]));
  }
  ctx.lineTo(xOf(curve.length - 1), pad.t + ch);
  ctx.lineTo(xOf(0), pad.t + ch);
  ctx.closePath();

  var grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + ch);
  grad.addColorStop(0, isDark ? 'rgba(34,197,94,0.15)' : 'rgba(22,163,74,0.10)');
  grad.addColorStop(0.6, isDark ? 'rgba(34,197,94,0.04)' : 'rgba(22,163,74,0.03)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fill();

  // ── Line ──
  ctx.beginPath();
  ctx.moveTo(xOf(0), yOf(vals[0]));
  for (var j = 1; j < curve.length; j++) {
    ctx.lineTo(xOf(j), yOf(vals[j]));
  }
  ctx.strokeStyle = lineColor;
  ctx.lineWidth   = 2;
  ctx.lineJoin    = 'round';
  ctx.lineCap     = 'round';
  ctx.stroke();

  // ── Data point dots ──
  for (var k = 0; k < curve.length; k++) {
    ctx.beginPath();
    ctx.arc(xOf(k), yOf(vals[k]), 3, 0, Math.PI * 2);
    ctx.fillStyle = isDark ? '#131316' : '#ffffff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(xOf(k), yOf(vals[k]), 3, 0, Math.PI * 2);
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Store layout for hover
  canvas._chart = { pad: pad, cw: cw, ch: ch, vals: vals, dates: dates, minV: minV, range: range, curve: curve };
}

// ── Chart hover tooltip ──
(function() {
  var canvas  = document.getElementById('equity-canvas');
  var tooltip = document.getElementById('chart-tooltip');

  function onMove(e) {
    if (!canvas._chart) return;
    var c  = canvas._chart;
    var rect = canvas.getBoundingClientRect();
    var mx   = e.clientX - rect.left;
    var n    = c.curve.length;
    if (n < 2) return;
    var idx = Math.round((mx - c.pad.l) / c.cw * (n - 1));
    idx = Math.max(0, Math.min(n - 1, idx));
    var val  = c.curve[idx].equity_aud || c.curve[idx].equity || 0;
    var date = c.curve[idx].date || '';

    // Format date nicely
    var dp = date.split('-');
    var monthNames = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var niceDate = dp.length === 3 ? monthNames[parseInt(dp[1])] + ' ' + parseInt(dp[2]) + ', ' + dp[0] : date;

    tooltip.style.opacity  = '1';
    // Position tooltip, keep it within bounds
    var tLeft = mx + 16;
    if (tLeft + 180 > rect.width) tLeft = mx - 180;
    tooltip.style.left     = tLeft + 'px';
    tooltip.style.top      = '50px';
    tooltip.innerHTML      = '<div style="color:var(--text-2);font-size:10px;margin-bottom:2px">' + niceDate + '</div>' +
                             '<div style="font-size:14px;font-weight:600">$' + Math.round(val).toLocaleString() + '</div>';
  }

  function onLeave() { tooltip.style.opacity = '0'; }

  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseleave', onLeave);

  // Animate chart entrance
  window._animateChart = function(curve) {
    drawChart(curve);
    canvas.style.opacity = '0';
    canvas.style.transform = 'translateY(8px)';
    requestAnimationFrame(function() {
      canvas.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      canvas.style.opacity = '1';
      canvas.style.transform = 'none';
    });
  };
})();

// ── Return Badge ─────────────────────────────────────────────
function renderReturnBadge(data) {
  var s = data.summary || {};
  var badge = document.getElementById('return-badge');
  var retPct = s.total_pnl_pct;
  if (retPct == null) {
    var curve = data.equity_curve || [];
    if (!curve.length) return;
    var first = curve[0].equity_aud;
    var last  = curve[curve.length - 1].equity_aud;
    if (!first) return;
    retPct = ((last - first) / first) * 100;
  }
  badge.textContent = fmtPct(retPct);
  badge.className   = 'return-badge' + (retPct < 0 ? ' negative' : '');
}

// ── Live Price Updates ───────────────────────────────────────
var POLL_INTERVAL = 15000;
var _pollTimer    = null;

function isAnyMarketOpen() {
  return MARKETS.some(function(mk) { return marketState(mk).open; });
}

function flashCard(card, isPositive) {
  card.classList.add(isPositive ? 'flash-pos' : 'flash-neg');
  setTimeout(function() {
    card.classList.remove('flash-pos', 'flash-neg');
  }, 400);
}

function applyPrices(resp) {
  if (!resp || !resp.ok) return;
  var positions = resp.positions || {};

  if (resp.today_pnl_display) {
    var todEl = document.getElementById('stat-today');
    todEl.textContent = resp.today_pnl_display;
    todEl.className = 'stat-value ' + pnlClass(resp.today_pnl_aud || 0);
  }

  var cards = document.querySelectorAll('#positions-grid .pos-card');
  cards.forEach(function(card) {
    var ticker = card.getAttribute('data-ticker');
    if (!ticker || !positions[ticker]) return;
    var q = positions[ticker];
    if (!q.price) return;

    var ccy = ticker.endsWith('.AX') ? 'AUD' : 'USD';

    var priceEl = card.querySelector('.live-price[data-ticker="' + ticker + '"]');
    if (priceEl) priceEl.textContent = fmtCcy(q.price, ccy);

    var pnlEl = card.querySelector('.card-pnl[data-ticker="' + ticker + '"]');
    if (pnlEl && q.pnl_display != null) {
      var isPos = (q.pnl_local || 0) >= 0;
      pnlEl.className = 'card-pnl ' + (isPos ? 'green' : 'red');
      pnlEl.innerHTML = q.pnl_display +
        ' <span style="font-size:12px;opacity:0.6;font-weight:400">(' + fmtPct(q.pnl_pct) + ')</span>';
      card.className = 'pos-card' + (isPos ? '' : ' negative');
    }

    flashCard(card, (q.pnl_local || 0) >= 0);
  });
}

function startPricePolling() {
  if (_pollTimer) return;
  function poll() {
    if (!isAnyMarketOpen()) return;
    fetch('/api/prices?t=' + Date.now(), { credentials: 'same-origin' })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(quotes) { if (quotes) applyPrices(quotes); })
      .catch(function() {});
  }
  _pollTimer = setInterval(poll, POLL_INTERVAL);
}

// ── Main Init ────────────────────────────────────────────────
async function init() {
  try {
    var resp = await fetch('/simple-dashboard-data.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();

    renderSummary(data);
    renderReturnBadge(data);

    var curve = data.equity_curve || [];
    window._animateChart(curve);

    renderPositions(data);
    initClocks();
    startPricePolling();

  } catch (e) {
    console.error('Atlas dashboard load failed:', e);
    document.getElementById('positions-grid').innerHTML =
      '<div class="empty-state">Failed to load data — ' + e.message + '</div>';
  }
}

window.addEventListener('resize', function() {
  if (window._chartData) drawChart(window._chartData);
});

init();
</script>
</body>
</html>
