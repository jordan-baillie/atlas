<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#09090b" id="meta-theme">
<title>Atlas Dashboard</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="atlas.css?v=7">
<link rel="stylesheet" href="chat.css?v=1">
<style>
/* ── Header regime indicator ── */
.header-left { display: flex; align-items: center; gap: 16px; }

.regime-indicator {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 14px;
}
.regime-dot { width: 8px; height: 8px; border-radius: 50%; }
.regime-label { font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.regime-sizing { color: var(--text-3); font-size: 10px; }

/* Regime dot colours */
.regime-dot.bull-risk-on   { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.4); }
.regime-dot.bull-risk-off  { background: #eab308; }
.regime-dot.transition-uncertain { background: #71717a; }
.regime-dot.bear-risk-off  { background: #f43f5e; box-shadow: 0 0 6px rgba(244,63,94,0.4); }
.regime-dot.bear-capitulation { background: #991b1b; box-shadow: 0 0 6px rgba(153,27,27,0.5); }
.regime-dot.recovery-early { background: #06b6d4; }

/* ── Regime state badge (sidebar card clone, kept for renderRegimeInline compat.) ── */
.regime-state {
  font-family: var(--mono); font-size: 14px; font-weight: 600;
  padding: 6px 14px; border-radius: 8px; display: inline-block; margin-bottom: 12px;
}
.regime-state.bull-risk-on   { background: rgba(34,197,94,0.12);  color: #22c55e; }
.regime-state.bull-risk-off  { background: rgba(234,179,8,0.12);  color: #eab308; }
.regime-state.transition-uncertain { background: rgba(113,113,122,0.12); color: #a1a1aa; }
.regime-state.bear-risk-off  { background: rgba(244,63,94,0.12);  color: #f43f5e; }
.regime-state.bear-capitulation { background: rgba(153,27,27,0.15); color: #fca5a5; }
.regime-state.recovery-early { background: rgba(6,182,212,0.12);  color: #06b6d4; }

/* Timeline section */
.timeline-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  margin-bottom: 14px;
}
#regime-timeline-canvas { width: 100%; height: 32px; display: block; border-radius: 4px; }
.timeline-legend {
  display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px;
  font-family: var(--mono); font-size: 10px; color: var(--text-3);
}
.tl-item { display: flex; align-items: center; gap: 4px; }
.tl-dot  { width: 8px; height: 8px; border-radius: 2px; }

/* Stat primary sizing override */
.stat-primary .stat-value { font-size: 1.85rem; }
.stat-primary .stat-label { font-size: 11px; }

@media (max-width: 900px) {
  .regime-indicator { display: none; }
}
</style>
</head>
<body>
<div id="app">

  <!-- ── Header ── -->
  <header class="header">
    <div class="header-left">
      <div class="logo">▲ Atlas</div>
      <div class="regime-indicator" id="regime-indicator">
        <span class="regime-dot" id="regime-dot"></span>
        <span class="regime-label" id="regime-label">—</span>
        <span class="regime-sizing" id="regime-sizing"></span>
      </div>
    </div>
    <div class="header-right">
      <div class="market-clock-strip" id="market-clock-strip"></div>
      <button class="theme-btn" id="theme-btn" title="Toggle theme (L)">◑</button>
    </div>
  </header>

  <!-- ── Compact Summary Strip (4 stats) ── -->
  <div class="summary-strip compact" id="summary-strip">
    <div class="stat stat-primary">
      <div class="stat-label">Portfolio</div>
      <div class="stat-value" id="stat-equity">—</div>
    </div>
    <div class="stat stat-primary">
      <div class="stat-label">Today P&amp;L</div>
      <div class="stat-value" id="stat-today">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Positions</div>
      <div class="stat-value" id="stat-positions">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Margin Used</div>
      <div class="stat-value" id="stat-margin">—</div>
    </div>
  </div>

  <!-- ── Two-Panel Main Area ── -->
  <div class="two-panel">

    <!-- Left: Portfolio view -->
    <div class="panel-portfolio">

      <!-- Equity Chart -->
      <div class="chart-section" id="chart-section">
        <div class="chart-header">
          <div class="chart-legend">
            <span class="chart-title">Equity Curve</span>
            <span class="chart-legend-item">
              <span class="chart-legend-line solid"></span>Portfolio
            </span>
            <span class="chart-legend-item">
              <span class="chart-legend-line dotted"></span>SPY
            </span>
          </div>
          <span class="return-badge" id="return-badge">—</span>
        </div>
        <canvas id="equity-canvas"></canvas>
        <div class="chart-tooltip" id="chart-tooltip"></div>
      </div>

      <!-- Open Positions -->
      <div class="section-header" id="positions-label">Open Positions</div>
      <div class="positions-grid" id="positions-grid"></div>

      <!-- Recent Orders (collapsed) -->
      <details class="orders-collapse" id="orders-section">
        <summary>Recent Orders</summary>
        <div class="orders-scroll">
          <table class="orders-table">
            <thead>
              <tr>
                <th>Symbol</th>
                <th>Side</th>
                <th>Qty</th>
                <th>Type</th>
                <th>Price</th>
                <th>Status</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody id="orders-tbody"></tbody>
          </table>
        </div>
      </details>

    </div><!-- /panel-portfolio -->

    <!-- Right: AI Chat -->
    <div class="panel-chat" id="chat-panel">
      <div class="chat-header">
        <span class="chat-title">Atlas AI</span>
        <select id="chat-session-select" title="Switch session"></select>
        <button id="chat-new-session" title="New chat">+</button>
      </div>
      <div class="chat-messages" id="chat-messages">
        <!-- Chat messages render here -->
      </div>
      <div class="chat-input-area">
        <textarea id="chat-input" placeholder="Ask Atlas AI…" rows="1"></textarea>
        <button id="chat-send" title="Send (Enter)">↑</button>
      </div>
      <div class="chat-status" id="chat-status">
        <span id="chat-connection-status">connecting…</span>
        <span id="chat-model">sonnet</span>
        <span id="chat-cost">$0.0000</span>
      </div>
    </div><!-- /panel-chat -->

  </div><!-- /two-panel -->

  <!-- ── 90-Day Regime Timeline ── -->
  <div class="timeline-section" id="timeline-section">
    <div class="section-header">90-Day Regime History</div>
    <canvas id="regime-timeline-canvas"></canvas>
    <div class="timeline-legend" id="timeline-legend"></div>
  </div>

  <!-- Hidden elements kept for renderRegimeInline compatibility (not displayed) -->
  <span id="regime-state-badge"  style="display:none"></span>
  <span id="regime-scores"       style="display:none"></span>
  <span id="regime-universes"    style="display:none"></span>
  <span id="regime-strategies"   style="display:none"></span>

</div><!-- /app -->

<script>
'use strict';

// ── Strategy colour map ───────────────────────────────────────────────────
var STRATEGY_COLORS = {
  momentum_breakout: '#f97316',
  mean_reversion:    '#6366f1',
  trend_following:   '#22c55e',
  opening_gap:       '#eab308',
  sector_rotation:   '#a855f7',
  short_term_mr:     '#06b6d4',
  connors_rsi2:      '#f43f5e',
  manual:            '#71717a'
};

// ── Theme ─────────────────────────────────────────────────────────────────
var THEMES = ['dark', 'light', 'auto'];
var currentTheme = localStorage.getItem('atlas-theme') || 'auto';

function applyTheme(t) {
  currentTheme = t;
  var eff = t === 'auto'
    ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
    : t;
  document.documentElement.setAttribute('data-theme', eff);
  document.getElementById('meta-theme').content = eff === 'light' ? '#fafafa' : '#09090b';
  localStorage.setItem('atlas-theme', t);
}

document.getElementById('theme-btn').onclick = function () {
  applyTheme(THEMES[(THEMES.indexOf(currentTheme) + 1) % THEMES.length]);
  redrawCharts();
};

document.addEventListener('keydown', function (e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'l' || e.key === 'L') {
    applyTheme(THEMES[(THEMES.indexOf(currentTheme) + 1) % THEMES.length]);
    redrawCharts();
  }
});

applyTheme(currentTheme);

// ── Formatting ────────────────────────────────────────────────────────────
function fmtNum(v, dec) {
  if (v == null || isNaN(v)) return '—';
  dec = dec != null ? dec : 2;
  return Math.abs(v).toLocaleString(undefined, {
    minimumFractionDigits: dec,
    maximumFractionDigits: dec
  });
}

function fmtCcy(v, dec) {
  if (v == null || isNaN(v)) return '—';
  dec = dec != null ? dec : 2;
  return '$' + Math.abs(v).toLocaleString(undefined, {
    minimumFractionDigits: dec,
    maximumFractionDigits: dec
  });
}

function fmtSignedCcy(v, dec) {
  if (v == null || isNaN(v)) return '—';
  dec = dec != null ? dec : 2;
  var sign = v >= 0 ? '+$' : '-$';
  return sign + Math.abs(v).toLocaleString(undefined, {
    minimumFractionDigits: dec,
    maximumFractionDigits: dec
  });
}

function fmtPct(v) {
  if (v == null || isNaN(v)) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}

function pnlClass(v) { return v > 0 ? 'green' : v < 0 ? 'red' : ''; }

function fmtDuration(secs) {
  if (secs <= 0) return '0m';
  var h = Math.floor(secs / 3600);
  var m = Math.floor((secs % 3600) / 60);
  if (h >= 48) return Math.floor(h / 24) + 'd';
  if (h > 0)   return h + 'h' + (m < 10 ? '0' : '') + m + 'm';
  return m + 'm';
}

function daysHeld(entryDate) {
  if (!entryDate) return 0;
  return Math.max(0, Math.floor((Date.now() - new Date(entryDate)) / 86400000));
}

var MONTH_NAMES = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                   'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

function fmtDateShort(dateStr) {
  if (!dateStr) return '';
  var p = dateStr.split('-');
  if (p.length !== 3) return dateStr;
  return MONTH_NAMES[parseInt(p[1])] + ' ' + parseInt(p[2]);
}

function fmtRelativeTime(dtStr) {
  if (!dtStr) return '—';
  var dt = new Date(dtStr.replace(' ', 'T'));
  if (isNaN(dt.getTime())) return dtStr;
  var diffSecs = Math.floor((Date.now() - dt) / 1000);
  if (diffSecs < 60)  return diffSecs + 's ago';
  var diffMins = Math.floor(diffSecs / 60);
  if (diffMins < 60)  return diffMins + 'm ago';
  var diffH = Math.floor(diffMins / 60);
  if (diffH < 24)     return diffH + 'h ago';
  return fmtDateShort((dtStr.split('T')[0] || dtStr.split(' ')[0]));
}

// ── Market Clock ──────────────────────────────────────────────────────────
var _marketClockData = null;
var _clockInterval   = null;

function renderMarketClock(mc) {
  _marketClockData = mc;
  var el = document.getElementById('market-clock-strip');
  if (!el) return;
  if (!mc) { el.innerHTML = ''; return; }

  el.innerHTML =
    '<div class="market-clock" id="nyse-clock">' +
      '<span class="clock-name">NYSE</span>' +
      '<span class="clock-dot" id="nyse-dot"></span>' +
      '<span id="nyse-time">—</span>' +
    '</div>';

  updateClock();
  if (!_clockInterval) {
    _clockInterval = setInterval(updateClock, 1000);
  }
}

function updateClock() {
  var mc = _marketClockData;
  if (!mc) return;
  var dotEl  = document.getElementById('nyse-dot');
  var timeEl = document.getElementById('nyse-time');
  if (!timeEl || !dotEl) return;

  var now = new Date();
  dotEl.className = 'clock-dot' + (mc.is_open ? ' open' : '');

  if (mc.is_open) {
    var closeSecs = Math.max(0, Math.floor((new Date(mc.next_close) - now) / 1000));
    timeEl.innerHTML = '<span class="clock-open">OPEN</span> ' + fmtDuration(closeSecs);
  } else {
    var openSecs = Math.max(0, Math.floor((new Date(mc.next_open) - now) / 1000));
    timeEl.textContent = 'opens in ' + fmtDuration(openSecs);
  }
}

// ── Summary Strip (4-stat compact) ───────────────────────────────────────
function renderSummary(data) {
  var acc = data.account || {};
  var s   = data.summary  || {};

  // Portfolio equity
  var eq = document.getElementById('stat-equity');
  if (eq) eq.textContent = fmtCcy(acc.equity);

  // Today P&L
  var today  = s.today_pnl || 0;
  var todEl  = document.getElementById('stat-today');
  if (todEl) {
    todEl.textContent = fmtSignedCcy(today);
    todEl.className   = 'stat-value ' + pnlClass(today);
  }

  // Positions open / max
  var maxPos = s.max_positions || 10;
  var posEl  = document.getElementById('stat-positions');
  if (posEl) posEl.textContent = (s.open_positions || 0) + ' / ' + maxPos;

  // Margin used
  var margin   = acc.margin_usage_pct || 0;
  var marginEl = document.getElementById('stat-margin');
  if (marginEl) {
    marginEl.textContent = margin.toFixed(1) + '%';
    marginEl.className   = 'stat-value' + (margin > 50 ? ' red' : margin > 30 ? ' amber' : '');
  }
}

// ── Return Badge ──────────────────────────────────────────────────────────
function renderReturnBadge(data) {
  var badge   = document.getElementById('return-badge');
  if (!badge) return;
  var bench   = data.benchmark || {};
  var portRet  = (data.summary || {}).total_pnl_pct || 0;
  var portSign = portRet >= 0 ? '+' : '';

  if (bench.return_pct != null) {
    var spyRet    = bench.return_pct;
    var alpha     = portRet - spyRet;
    var alphaSign = alpha >= 0 ? '+' : '';
    badge.textContent = portSign + portRet.toFixed(1) + '% (' + alphaSign + alpha.toFixed(1) + '% vs SPY)';
  } else {
    badge.textContent = portSign + portRet.toFixed(1) + '%';
  }

  badge.className = 'return-badge' + (portRet < 0 ? ' negative' : '');
}

// ── Equity Chart ──────────────────────────────────────────────────────────
var _equityChartData = null;

function drawEquityChart(portfolioHistory, benchmarkCurve, animate) {
  _equityChartData = { portfolioHistory: portfolioHistory, benchmarkCurve: benchmarkCurve };

  var canvas = document.getElementById('equity-canvas');
  if (!canvas) return;

  var dpr = window.devicePixelRatio || 1;
  var w   = canvas.offsetWidth  || 800;
  var h   = canvas.offsetHeight || 240;
  canvas.width  = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';

  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  var isDark     = document.documentElement.getAttribute('data-theme') !== 'light';
  var lineColor  = isDark ? '#22c55e' : '#16a34a';
  var benchColor = '#eab308';
  var gridColor  = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.06)';
  var labelColor = isDark ? '#52525b' : '#a1a1aa';

  if (!portfolioHistory || portfolioHistory.length < 3) {
    var noDataH = 80;
    canvas.style.height = noDataH + 'px';
    w = canvas.offsetWidth || 800;
    canvas.width = w * dpr;
    canvas.height = noDataH * dpr;
    canvas.style.width = w + 'px';
    ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, noDataH);
    ctx.fillStyle = labelColor;
    ctx.font = '13px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Building history… (' + (portfolioHistory ? portfolioHistory.length : 0) + '/3 days)', w / 2, noDataH / 2);
    return;
  }
  canvas.style.height = '200px';

  var portVals  = portfolioHistory.map(function (d) { return d.equity || 0; });
  var portDates = portfolioHistory.map(function (d) { return d.date; });
  var n         = portfolioHistory.length;

  var benchMap   = {};
  if (benchmarkCurve && benchmarkCurve.length) {
    benchmarkCurve.forEach(function (d) { benchMap[d.date] = d.equity; });
  }
  var portStart  = portVals[0] || 1;
  var benchStart = benchMap[portDates[0]] ||
                   (benchmarkCurve && benchmarkCurve.length ? benchmarkCurve[0].equity : null);
  var benchScale = benchStart ? portStart / benchStart : 1;

  var benchVals = portDates.map(function (date) {
    var bv = benchMap[date];
    return bv != null ? bv * benchScale : null;
  });

  var allVals = portVals.slice();
  benchVals.forEach(function (v) { if (v != null) allVals.push(v); });
  var minV   = Math.min.apply(null, allVals);
  var maxV   = Math.max.apply(null, allVals);
  var yRange = maxV - minV || 1;
  minV -= yRange * 0.08;
  maxV += yRange * 0.08;
  var range  = maxV - minV;

  var pad = { t: 16, r: 16, b: 40, l: 70 };
  var cw  = w - pad.l - pad.r;
  var ch  = h - pad.t - pad.b;

  function xOf(i) { return pad.l + (n === 1 ? cw / 2 : (i / (n - 1)) * cw); }
  function yOf(v) { return pad.t + ch - ((v - minV) / range) * ch; }

  ctx.clearRect(0, 0, w, h);

  // Grid + Y labels
  ctx.font = '11px JetBrains Mono, monospace';
  ctx.textAlign = 'right';
  for (var yi = 0; yi <= 4; yi++) {
    var yv = minV + (yi / 4) * range;
    var yp = yOf(yv);
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 4]);
    ctx.beginPath(); ctx.moveTo(pad.l, yp); ctx.lineTo(pad.l + cw, yp); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = labelColor;
    ctx.fillText('$' + Math.round(yv).toLocaleString(), pad.l - 8, yp + 4);
  }

  // X labels
  ctx.textAlign = 'center';
  var xLabelCount = Math.min(6, n);
  var xStep = Math.max(1, Math.floor((n - 1) / Math.max(xLabelCount - 1, 1)));
  for (var xi = 0; xi < n; xi += xStep) {
    var xp = xOf(xi);
    ctx.fillStyle = labelColor;
    ctx.fillText(fmtDateShort(portDates[xi]), xp, h - 10);
    if (xi > 0 && xi < n - 1) {
      ctx.strokeStyle = gridColor;
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 4]);
      ctx.beginPath(); ctx.moveTo(xp, pad.t); ctx.lineTo(xp, pad.t + ch); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Benchmark line (amber dotted)
  var hasBench = benchVals.some(function (v) { return v != null; });
  if (hasBench) {
    ctx.beginPath();
    var firstB = true;
    for (var bi = 0; bi < n; bi++) {
      if (benchVals[bi] == null) continue;
      if (firstB) { ctx.moveTo(xOf(bi), yOf(benchVals[bi])); firstB = false; }
      else         { ctx.lineTo(xOf(bi), yOf(benchVals[bi])); }
    }
    ctx.strokeStyle = benchColor;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Portfolio area fill
  ctx.beginPath();
  ctx.moveTo(xOf(0), yOf(portVals[0]));
  for (var fi = 1; fi < n; fi++) ctx.lineTo(xOf(fi), yOf(portVals[fi]));
  ctx.lineTo(xOf(n - 1), pad.t + ch);
  ctx.lineTo(xOf(0), pad.t + ch);
  ctx.closePath();
  var grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + ch);
  grad.addColorStop(0,    isDark ? 'rgba(34,197,94,0.14)' : 'rgba(22,163,74,0.10)');
  grad.addColorStop(0.65, isDark ? 'rgba(34,197,94,0.03)' : 'rgba(22,163,74,0.02)');
  grad.addColorStop(1,   'transparent');
  ctx.fillStyle = grad;
  ctx.fill();

  // Portfolio line
  ctx.beginPath();
  ctx.moveTo(xOf(0), yOf(portVals[0]));
  for (var li = 1; li < n; li++) ctx.lineTo(xOf(li), yOf(portVals[li]));
  ctx.strokeStyle = lineColor;
  ctx.lineWidth   = 2;
  ctx.lineJoin    = 'round';
  ctx.lineCap     = 'round';
  ctx.stroke();

  // Dots
  var innerFill = isDark ? '#131316' : '#ffffff';
  for (var di = 0; di < n; di++) {
    ctx.beginPath();
    ctx.arc(xOf(di), yOf(portVals[di]), 3, 0, Math.PI * 2);
    ctx.fillStyle = innerFill; ctx.fill();
    ctx.beginPath();
    ctx.arc(xOf(di), yOf(portVals[di]), 3, 0, Math.PI * 2);
    ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5; ctx.stroke();
  }

  canvas._chart = {
    pad: pad, cw: cw, ch: ch,
    portVals: portVals, portDates: portDates, benchVals: benchVals,
    minV: minV, range: range, curve: portfolioHistory
  };

  if (animate) {
    canvas.style.opacity   = '0';
    canvas.style.transform = 'translateY(8px)';
    requestAnimationFrame(function () {
      canvas.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      canvas.style.opacity    = '1';
      canvas.style.transform  = 'none';
    });
  }
}

// ── Chart hover tooltip ───────────────────────────────────────────────────
(function () {
  var canvas  = document.getElementById('equity-canvas');
  var tooltip = document.getElementById('chart-tooltip');

  function onMove(e) {
    if (!canvas._chart) return;
    var c    = canvas._chart;
    var rect = canvas.getBoundingClientRect();
    var mx   = e.clientX - rect.left;
    var n    = c.curve.length;
    if (n < 2) return;
    var idx = Math.round((mx - c.pad.l) / c.cw * (n - 1));
    idx = Math.max(0, Math.min(n - 1, idx));

    var pt     = c.curve[idx];
    var portEq = pt.equity || 0;
    var pnl    = pt.day_pnl || 0;
    var bv     = c.benchVals[idx];

    var dp = (pt.date || '').split('-');
    var niceDate = dp.length === 3
      ? MONTH_NAMES[parseInt(dp[1])] + ' ' + parseInt(dp[2]) + ', ' + dp[0]
      : pt.date;

    var html = '<div class="tt-date">' + niceDate + '</div>';
    html += '<div class="tt-row"><span>Portfolio</span><span style="color:var(--green)">$' +
            Math.round(portEq).toLocaleString() + '</span></div>';
    if (bv != null) {
      html += '<div class="tt-row"><span>SPY bench</span><span style="color:#eab308">$' +
              Math.round(bv).toLocaleString() + '</span></div>';
    }
    if (pnl !== 0) {
      var pc = pnl > 0 ? 'var(--green)' : 'var(--red)';
      html += '<div class="tt-row"><span>Day P&amp;L</span><span style="color:' + pc + '">' +
              fmtSignedCcy(pnl) + '</span></div>';
    }

    tooltip.innerHTML   = html;
    tooltip.style.opacity = '1';
    var tLeft = mx + 16;
    if (tLeft + 185 > rect.width) tLeft = mx - 195;
    tooltip.style.left = tLeft + 'px';
    tooltip.style.top  = '48px';
  }

  function onLeave() { if (tooltip) tooltip.style.opacity = '0'; }

  if (canvas) {
    canvas.addEventListener('mousemove', onMove);
    canvas.addEventListener('mouseleave', onLeave);
  }
})();

// ── Orders Table ──────────────────────────────────────────────────────────
function renderOrders(orders) {
  var tbody = document.getElementById('orders-tbody');
  if (!tbody) return;

  var rows = (orders || []).slice(0, 10);
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="orders-empty">No recent orders</td></tr>';
    return;
  }

  function orderTypeAbbrev(t) {
    return { market: 'MKT', limit: 'LMT', stop: 'STP', stop_limit: 'STP-L',
             trailing_stop: 'TRAIL', market_on_close: 'MOC', limit_on_close: 'LOC' }[t]
      || (t || '').toUpperCase().slice(0, 5);
  }

  function orderPrice(o) {
    if (o.type === 'trailing_stop') {
      if (o.trail_price  && o.trail_price  > 0) return fmtCcy(o.trail_price);
      if (o.stop_price   && o.stop_price   > 0) return fmtCcy(o.stop_price);
      return '—';
    }
    if (o.type === 'limit' || o.type === 'limit_on_close') {
      return o.limit_price && o.limit_price > 0 ? fmtCcy(o.limit_price) : '—';
    }
    if (o.stop_price   && o.stop_price   > 0) return fmtCcy(o.stop_price);
    if (o.filled_price && o.filled_price > 0) return fmtCcy(o.filled_price);
    return '—';
  }

  function statusDot(status) {
    var cls = {
      new: 'dot-amber', accepted: 'dot-amber', pending_new: 'dot-amber',
      filled: 'dot-green', partially_filled: 'dot-green',
      rejected: 'dot-red',
      canceled: 'dot-gray', expired: 'dot-gray', replaced: 'dot-gray'
    }[status] || 'dot-gray';
    return '<span class="status-dot ' + cls + '"></span>';
  }

  tbody.innerHTML = rows.map(function (o) {
    var sideClass = o.side === 'buy' ? 'side-buy' : 'side-sell';
    return '<tr>' +
      '<td class="sym-cell">' + (o.symbol || '—') + '</td>' +
      '<td><span class="side-badge ' + sideClass + '">' + (o.side || '').toUpperCase() + '</span></td>' +
      '<td>' + (o.qty || '—') + '</td>' +
      '<td>' + orderTypeAbbrev(o.type) + '</td>' +
      '<td>' + orderPrice(o) + '</td>' +
      '<td>' + statusDot(o.status) + '<span class="status-text">' + (o.status || '') + '</span></td>' +
      '<td>' + fmtRelativeTime(o.submitted_at) + '</td>' +
    '</tr>';
  }).join('');
}

// ── Sparkline SVG ─────────────────────────────────────────────────────────
function renderSparkline(prices, pnlPct) {
  var w = 120, h = 36, pad = 2;
  var color     = (pnlPct || 0) >= 0 ? 'var(--green)' : 'var(--red)';
  var colorFill = (pnlPct || 0) >= 0 ? 'var(--green-soft)' : 'var(--red-soft)';

  if (!prices || prices.length < 2) {
    return '<svg viewBox="0 0 120 36" preserveAspectRatio="none" style="width:100%;height:36px">' +
      '<line x1="0" y1="18" x2="120" y2="18" stroke="' + color + '" stroke-width="1" stroke-opacity="0.2"/></svg>';
  }

  var minV  = Math.min.apply(null, prices);
  var maxV  = Math.max.apply(null, prices);
  var range = maxV - minV || 1;

  var pts = prices.map(function (v, i) {
    var x = (i / (prices.length - 1)) * w;
    var y = pad + ((maxV - v) / range) * (h - 2 * pad);
    return x.toFixed(1) + ',' + y.toFixed(1);
  });

  var fill = pts.slice().concat([w + ',' + h, '0,' + h]);

  return '<svg viewBox="0 0 120 36" preserveAspectRatio="none" style="width:100%;height:36px">' +
    '<polygon points="' + fill.join(' ') + '" fill="' + colorFill + '"/>' +
    '<polyline points="' + pts.join(' ') +
    '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
    '</svg>';
}

// ── Position Cards ────────────────────────────────────────────────────────
function renderPositions(data) {
  var grid  = document.getElementById('positions-grid');
  var label = document.getElementById('positions-label');

  var positions = (data.positions || []).slice();
  positions.sort(function (a, b) {
    return Math.abs(b.unrealized_pnl || 0) - Math.abs(a.unrealized_pnl || 0);
  });

  if (label) label.textContent = 'Open Positions (' + positions.length + ')';

  if (!positions.length) {
    var nStrats = Object.keys(STRATEGY_COLORS).length - 1;
    grid.innerHTML = '<div class="empty-state">No open positions — ' +
      nStrats + ' strategies scanning for signals</div>';
    return;
  }

  grid.innerHTML = positions.map(function (p) {
    var pnl       = p.unrealized_pnl     || 0;
    var pnlPct    = p.unrealized_pnl_pct || 0;
    var isPos     = pnl >= 0;
    var strat     = p.strategy || 'manual';
    var stratColor = STRATEGY_COLORS[strat] || '#71717a';
    var stratLabel = strat.replace(/_/g, '\u00A0');
    var days      = daysHeld(p.entry_date);
    var intraPnl  = p.intraday_pnl     || 0;
    var intraPct  = p.intraday_pnl_pct || 0;
    var isIntraPos = intraPnl >= 0;

    return '<div class="pos-card' + (isPos ? '' : ' negative') + '" ' +
        'data-ticker="' + (p.ticker || '') + '" ' +
        'style="--strat-color:' + stratColor + '">' +

      '<div class="card-top">' +
        '<span class="card-ticker">' + (p.ticker || '—') + '</span>' +
        '<span class="strategy-pill" style="' +
          'background:' + stratColor + '18;' +
          'color:' + stratColor + ';' +
          'border:1px solid ' + stratColor + '40' +
        '">' + stratLabel + '</span>' +
      '</div>' +

      '<div class="card-prices">' +
        '<span><span class="label">Entry</span>' +
          '<span class="val">' + fmtCcy(p.entry_price) + '</span></span>' +
        '<span><span class="label">Current</span>' +
          '<span class="val live-price" data-ticker="' + (p.ticker || '') + '">' +
            fmtCcy(p.current_price) + '</span></span>' +
        (p.stop_price ? '<span><span class="label">Stop</span>' +
          '<span class="val stop-val">' + fmtCcy(p.stop_price) + '</span></span>' : '') +
      '</div>' +

      '<div class="card-pnl ' + pnlClass(pnl) + '" data-ticker="' + (p.ticker || '') + '">' +
        (isPos ? '+$' : '-$') + fmtNum(Math.abs(pnl)) +
        ' <span class="pnl-pct">(' + fmtPct(pnlPct) + ')</span>' +
      '</div>' +

      '<div class="card-bottom-row">' +
        '<div class="intraday-badge ' + (intraPnl === 0 ? 'neutral' : isIntraPos ? 'pos' : 'neg') + '">' +
          'Today: ' + (intraPnl >= 0 ? '+$' : '-$') + fmtNum(Math.abs(intraPnl)) +
          ' (' + (intraPct >= 0 ? '+' : '') + intraPct.toFixed(2) + '%)' +
        '</div>' +
        (p.lastday_price ? '<div class="prev-close">Prev: ' + fmtCcy(p.lastday_price) + '</div>' : '') +
      '</div>' +

      '<div class="card-meta">' +
        (days > 0 ? days + 'd held' : 'today') +
        (p.sector && p.sector !== 'Unknown' ? ' · ' + p.sector : '') +
      '</div>' +

      '<div class="sparkline">' + renderSparkline(p.sparkline || [], pnlPct) + '</div>' +
    '</div>';
  }).join('');
}

// ── Chart Redraw (on theme change / resize) ───────────────────────────────
function redrawCharts() {
  if (_equityChartData) drawEquityChart(_equityChartData.portfolioHistory, _equityChartData.benchmarkCurve, false);
  if (_regimeHistory)   drawRegimeTimelineBottom(_regimeHistory);

// ── Live Price Flash ──────────────────────────────────────────────────────
function flashCard(card, isPositive) {
  card.classList.add(isPositive ? 'flash-pos' : 'flash-neg');
  setTimeout(function () { card.classList.remove('flash-pos', 'flash-neg'); }, 400);
}

function applyPrices(resp) {
  if (!resp) return;

  var pnlVal = resp.today_pnl != null ? resp.today_pnl : null;
  if (pnlVal != null || resp.today_pnl_display) {
    var todEl = document.getElementById('stat-today');
    if (todEl) {
      todEl.textContent = resp.today_pnl_display || fmtSignedCcy(pnlVal);
      if (pnlVal != null) todEl.className = 'stat-value ' + pnlClass(pnlVal);
    }
  }

  var positions = resp.positions || {};
  var cards = document.querySelectorAll('#positions-grid .pos-card');
  cards.forEach(function (card) {
    var ticker = card.getAttribute('data-ticker');
    if (!ticker || !positions[ticker]) return;
    var q = positions[ticker];

    if (q.price) {
      var priceEl = card.querySelector('.live-price[data-ticker="' + ticker + '"]');
      if (priceEl) priceEl.textContent = fmtCcy(q.price);
    }

    var uPnl = q.unrealized_pnl != null ? q.unrealized_pnl : (q.pnl_local || null);
    if (uPnl != null) {
      var pnlEl = card.querySelector('.card-pnl[data-ticker="' + ticker + '"]');
      if (pnlEl) {
        var isPos  = uPnl >= 0;
        var uPnlPct = q.unrealized_pnl_pct || q.pnl_pct || 0;
        pnlEl.className = 'card-pnl ' + (isPos ? 'green' : 'red');
        pnlEl.innerHTML = (isPos ? '+$' : '-$') + fmtNum(Math.abs(uPnl)) +
          ' <span class="pnl-pct">(' + fmtPct(uPnlPct) + ')</span>';
        card.className = 'pos-card' + (isPos ? '' : ' negative');
      }
      flashCard(card, uPnl >= 0);
    }
  });
}

// ── SSE Live Stream ───────────────────────────────────────────────────────
var _evtSource   = null;
var _streamRetries = 0;
var _staticData  = null;

function connectStream() {
  if (_evtSource) return;

  _evtSource = new EventSource('/api/stream');

  _evtSource.addEventListener('snapshot', function (e) {
    try {
      var snap = JSON.parse(e.data);
      if (snap.error) { console.warn('Stream error:', snap.error); return; }
      _streamRetries = 0;
      applyLiveSnapshot(snap);
    } catch (err) {
      console.error('Stream parse error:', err);
    }
  });

  _evtSource.onerror = function () {
    _evtSource.close();
    _evtSource = null;
    _streamRetries++;
    var delay = Math.min(5000 * _streamRetries, 30000);
    setTimeout(connectStream, delay);
  };
}

function applyLiveSnapshot(snap) {
  if (snap.market_clock) renderMarketClock(snap.market_clock);

  if (snap.account && snap.summary) {
    var liveData = { account: snap.account, summary: snap.summary };
    renderSummary(liveData);
    liveData.benchmark = _staticData ? _staticData.benchmark : null;
    renderReturnBadge(liveData);
  }

  if (snap.positions) {
    var staticPositions = _staticData ? (_staticData.positions || []) : [];
    var metaMap = {};
    staticPositions.forEach(function (p) { if (p.ticker) metaMap[p.ticker] = p; });

    snap.positions.forEach(function (p) {
      var meta = metaMap[p.ticker];
      if (!meta) return;
      if (!p.sparkline || !p.sparkline.length) p.sparkline = meta.sparkline;
      if (!p.strategy || p.strategy === 'unknown') p.strategy = meta.strategy;
      if (!p.sector || p.sector === 'Unknown') p.sector = meta.sector;
      if (!p.stop_price && meta.stop_price) p.stop_price = meta.stop_price;
      if (!p.entry_date && meta.entry_date) p.entry_date = meta.entry_date;
    });

    renderPositions({ positions: snap.positions });
    // Note: donut chart removed in Phase 3 — strategy allocation accessible via chat
  }

  if (snap.orders) renderOrders(snap.orders);
}

// ── Regime Rendering ──────────────────────────────────────────────────────
var _regimeHistory = null;

function renderRegimeInline(r) {
  var state = r.regime_state || 'unknown';
  var cls   = state.replace(/_/g, '-');
  var display = state.replace(/_/g, ' ').toUpperCase();

  var dot    = document.getElementById('regime-dot');
  var label  = document.getElementById('regime-label');
  var sizing = document.getElementById('regime-sizing');
  if (dot)    dot.className = 'regime-dot ' + cls;
  if (label)  { label.textContent = display; label.style.color = getRegimeColor(state); }
  if (sizing) sizing.textContent = r.sizing_multiplier ? (r.sizing_multiplier * 100).toFixed(0) + '% size' : '';

  // Hidden compat elements (not displayed but kept for any script hooks)
  var badge = document.getElementById('regime-state-badge');
  if (badge) { badge.className = 'regime-state ' + cls; badge.textContent = display; }
}

function getRegimeColor(state) {
  return {
    bull_risk_on: '#22c55e', bull_risk_off: '#eab308',
    transition_uncertain: '#a1a1aa', bear_risk_off: '#f43f5e',
    bear_capitulation: '#fca5a5', recovery_early: '#06b6d4'
  }[state] || '#71717a';
}

function drawRegimeTimelineBottom(history) {
  var canvas = document.getElementById('regime-timeline-canvas');
  if (!canvas || !history || !history.length) return;
  var COLORS = {
    'bull_risk_on': '#22c55e', 'bull_risk_off': '#eab308',
    'transition_uncertain': '#71717a', 'bear_risk_off': '#f43f5e',
    'bear_capitulation': '#991b1b', 'recovery_early': '#06b6d4'
  };
  var dpr = window.devicePixelRatio || 1;
  var w = canvas.offsetWidth || 800, h = 32;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  var data = history.slice().reverse();
  var bw = w / data.length;
  data.forEach(function (d, i) {
    ctx.fillStyle = COLORS[d.regime_state] || '#71717a';
    ctx.fillRect(i * bw, 0, Math.ceil(bw), h);
  });
  var legend = document.getElementById('timeline-legend');
  if (legend) {
    var LABELS = {
      bull_risk_on: 'Bull On', bull_risk_off: 'Bull Off',
      transition_uncertain: 'Uncertain', bear_risk_off: 'Bear Off',
      bear_capitulation: 'Capitulation', recovery_early: 'Recovery'
    };
    legend.innerHTML = Object.keys(COLORS).map(function (k) {
      return '<span class="tl-item"><span class="tl-dot" style="background:' + COLORS[k] + '"></span>' + LABELS[k] + '</span>';
    }).join('');
  }
}

// ── Main Init ─────────────────────────────────────────────────────────────
async function init() {
  try {
    var resp = await fetch('/api/dashboard-data');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    _staticData = await resp.json();

    renderMarketClock(_staticData.market_clock);
    renderSummary(_staticData);
    renderReturnBadge(_staticData);

    var portfolioHistory = _staticData.portfolio_history || [];
    var benchCurve       = (_staticData.benchmark || {}).curve || [];
    drawEquityChart(portfolioHistory, benchCurve, true);

    renderOrders(_staticData.recent_orders || []);
    renderPositions(_staticData);

    connectStream();

    Promise.all([
      fetch('/api/regime/current').then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; }),
      fetch('/api/regime/history?days=90').then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; }),
    ]).then(function (results) {
      var regime  = results[0];
      var history = results[1];
      if (regime)  renderRegimeInline(regime);
      if (history) { _regimeHistory = history; drawRegimeTimelineBottom(history); }
    });

  } catch (e) {
    console.error('Atlas dashboard load failed:', e);
    var grid = document.getElementById('positions-grid');
    if (grid) grid.innerHTML =
      '<div class="empty-state">Failed to load data — ' + e.message + '</div>';
  }
}

window.addEventListener('resize', function () { redrawCharts(); });

init();
