# config/auto_fix_deny.yaml
# Hard-coded NEVER list. Loaded at classifier init. Code-enforced at three layers:
#   1. Triage classifier (core/triage.py)
#   2. Fix-author prompt preamble (Phase 2)
#   3. Multi-team domain.write glob enforcement (Phase 2)
# See reports/auto-error-remediation-validation-2026-04-29.md §4 + Appendix A

# Phase 1 is read-only — these patterns drive ESCALATE classification.
# Phase 2+ adds the prompt + domain enforcement layers.

file_globs:
  # Trading-path code
  - "brokers/**"
  - "risk/**"
  - "regime/**"
  - "signals/**"
  - "strategies/**"
  - "portfolio/**"
  - "overlay/**"
  - "monitor/lifecycle.py"
  - "monitor/evaluator.py"
  - "core/reconcile.py"
  - "plans/**"
  - "approve/**"
  - "**/kill_switch*.py"
  - "**/live_executor*.py"
  - "**/plan*.py"
  - "**/approve*.py"
  - "**/halt*.py"
  # Trading config + state
  - "config/active/**"
  - "config/active_config.json"
  - "config/global_risk.json"
  - "data/atlas.db*"
  - "data/HALT"
  - ".live_halt"
  - "data/state/**"
  - "brokers/state/**"
  - "data/stops_held_state.json"
  - "data/pdt_deferred_state.json"
  # Trading-path scripts
  - "scripts/eod_settlement.py"
  - "scripts/intraday_monitor.py"
  - "scripts/director_cron.py"
  - "scripts/execute_approved.py"
  - "scripts/sync_protective_orders.py"
  - "scripts/reconcile_*.py"
  - "scripts/auto_reoptimize.py"
  - "scripts/cli.py"
  - "scripts/pi-cron.sh"
  # Telegram bot (has /halt /unhalt /approve /reject)
  - "services/telegram_bot.py"
  # Schema, migrations, DB access layer
  - "db/atlas_db.py"
  - "db/schema.sql"
  - "db/migrations/**"
  - "scripts/migrations/**"
  - "**/*.sql"
  # Secrets, auth
  - ".atlas-secrets.json"
  - ".env*"
  # Test files for trading-path modules
  - "tests/conftest.py"
  - "tests/test_kill_switch*.py"
  - "tests/test_live_executor*.py"
  - "tests/test_broker*.py"
  - "tests/test_risk*.py"
  - "tests/test_reconcile*.py"
  - "tests/test_overlay*.py"
  - "tests/test_regime*.py"
  - "tests/test_plan*.py"
  - "tests/test_signals*.py"
  - "tests/test_settlement*.py"
  - "tests/test_monitor*.py"
  # Systemd / cron
  - "systemd/atlas-*.service"
  - "systemd/atlas-*.timer"
  - "/etc/systemd/system/atlas-*"
  - "**/*.cron"

error_class_patterns:
  - "BrokerError"
  - "OrderRejected"
  - "PreflightError"
  - "InsufficientFunds"
  - "PDTViolation"
  - "PositionMismatch"
  - "ReconcileDriftError"
  - "RiskBudgetExceeded"
  - "DrawdownBreach"
  - "OverlayError"
  - "RegimeError"
  - "KillSwitchTriggered"
  - "RiskLimitBreached"
  - "LeverageCapBreached"
  - "CircuitBreaker"
  - "HaltError"
  - "CapitalAtRisk"
  - "MemoryError"
  - "OperationalError"

message_patterns:                      # Case-insensitive substring match
  - "broker"
  - "order"
  - "fill"
  - "position"
  - "balance"
  - "drawdown"
  - "PDT"
  - "pattern day trader"
  - "HALT"
  - "kill switch"
  - "reconcile"
  - "drift"
  - "mismatch"
  - "VAR"
  - "ruin"
  - "sector cap"
  - "gross exposure"
  - "overlay"
  - "regime"
  - "Alpaca"
  - "40310"                            # Specific Alpaca race-condition error
  - "credential"
  - "secret"
  - "auth"
  - "token"
  - "stop_price=0"
  - "uncovered position"
  - "take_profit=NULL"
  - "No space left"
  - "database is locked"
  - "database is malformed"

function_names_blocked:                # AST check — diff cannot modify these functions
  # Loaded from config/safety_critical_functions.txt
  __ref__: config/safety_critical_functions.txt
